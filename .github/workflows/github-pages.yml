name: GitHub Pages Deployment

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check worker JS syntax (src)
        run: node --check src/index.js

      - name: Check worker JS syntax (cloudflare-worker)
        run: node --check cloudflare-worker/worker.js

      - name: Check public JS syntax
        run: |
          node --check public/script.js
          node --check public/diagnostics.js

      - name: Check naimean-api worker JS syntax
        run: |
          node --check naimean-api/src/worker.js
          node --check naimean-api/src/agents/naimean-agent.js

      - name: Run worker unit tests
        run: node --test cloudflare-worker/worker.test.js src/index.test.js

      - name: Validate wrangler.toml files are parseable
        run: |
          # Confirm both wrangler.toml files exist and contain required fields
          grep -q 'name' wrangler.toml
          grep -q 'main' wrangler.toml
          grep -q 'compatibility_date' wrangler.toml
          grep -q '\[\[routes\]\]' wrangler.toml
          grep -q 'pattern = "naimean.com/\*"' wrangler.toml
          grep -q 'pattern = "www.naimean.com/\*"' wrangler.toml
          grep -q 'pattern = "uploads.naimean.com/\*"' wrangler.toml
          grep -q 'name' cloudflare-worker/wrangler.toml
          grep -q 'main' cloudflare-worker/wrangler.toml
          grep -q 'compatibility_date' cloudflare-worker/wrangler.toml
          # Validate compatibility_date format is YYYY-MM-DD in both configs
          grep -qE 'compatibility_date = "[0-9]{4}-[0-9]{2}-[0-9]{2}"' wrangler.toml
          grep -qE 'compatibility_date = "[0-9]{4}-[0-9]{2}-[0-9]{2}"' cloudflare-worker/wrangler.toml
          # Confirm run_worker_first is present so proxy routes are worker-handled
           grep -q 'run_worker_first' wrangler.toml
           # Confirm CORES R2 bucket binding is declared for EmulatorJS core archives
           grep -q 'binding = "CORES"' wrangler.toml
           grep -q 'bucket_name = "retroarch-cores"' wrangler.toml
           # Confirm D1 database binding is declared in the counter worker config
           grep -q '\[\[d1_databases\]\]' cloudflare-worker/wrangler.toml
           grep -q 'binding = "DB"' cloudflare-worker/wrangler.toml
           grep -q 'database_name = "barrelroll-counter-db"' cloudflare-worker/wrangler.toml
           grep -q 'database_id = "22277fbe-031d-4cad-8937-245309e981cd"' cloudflare-worker/wrangler.toml
           # Confirm the D1 schema migration file exists
           test -f cloudflare-worker/schema.sql
          # Validate naimean-api wrangler.toml required fields
          grep -q 'name' naimean-api/wrangler.toml
          grep -q 'main' naimean-api/wrangler.toml
          grep -qE 'compatibility_date = "[0-9]{4}-[0-9]{2}-[0-9]{2}"' naimean-api/wrangler.toml
          grep -q '\[\[d1_databases\]\]' naimean-api/wrangler.toml
          grep -q '\[\[routes\]\]' naimean-api/wrangler.toml
          grep -q 'pattern = "naimean.com/api/\*"' naimean-api/wrangler.toml
          # Confirm the naimean-api migration file exists
          test -f naimean-api/migrations/0000_create_entries.sql

      - name: Validate expected schema tables are declared
        run: |
          grep -q 'CREATE TABLE IF NOT EXISTS rickroll_counter' cloudflare-worker/schema.sql
          grep -q 'CREATE TABLE IF NOT EXISTS layout_overrides' cloudflare-worker/schema.sql
          grep -q 'CREATE TABLE IF NOT EXISTS registered_users' cloudflare-worker/schema.sql
          grep -q 'CREATE TABLE IF NOT EXISTS entries' naimean-api/migrations/0000_create_entries.sql

      - name: Check route alignment (proxy paths + worker routes)
        run: node scripts/check-route-alignment.js

      - name: Verify arcade runtime files
        run: node scripts/check-arcade-runtime.js

      - name: Verify site assets
        run: |
          test -f public/index.html
          test -f public/script.js
          test -f public/styles.css
          test -d public/assets/uploads
          ls public/assets/video/joinourdiscord.*.mp4

  deployment-check:
    if: github.event_name == 'pull_request'
    needs: lint-and-check
    runs-on: ubuntu-latest
    concurrency:
      group: "deployment-check-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify site assets
        run: |
          test -f public/index.html
          test -d public/assets/uploads
          ls public/assets/video/joinourdiscord.*.mp4

      - name: Setup Pages
        uses: actions/configure-pages@v6

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  deploy:
    if: github.event_name != 'pull_request'
    needs: lint-and-check
    runs-on: ubuntu-latest
    concurrency:
      group: "github-pages-deploy"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify site assets
        run: |
          test -f public/index.html
          test -d public/assets/uploads
          ls public/assets/video/joinourdiscord.*.mp4

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-workers:
    if: github.event_name != 'pull_request'
    needs: lint-and-check
    runs-on: ubuntu-latest
    concurrency:
      group: "cloudflare-workers-deploy"
      cancel-in-progress: false
    environment:
      name: cloudflare-workers
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Cloudflare account ID is configured
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN. Set it as an Actions secret."
            exit 1
          fi

          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID. Set it as an Actions secret or variable."
            exit 1
          fi

      - name: Download EmulatorJS core binaries
        run: node scripts/download-ejs-cores.js

      - name: Upload EmulatorJS cores to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          FORCE: 1
          PURGE: 1
          TYPO_BUCKET: ${{ vars.R2_TYPO_BUCKET }}
        run: node scripts/upload-cores-to-r2.js

      - name: Clear existing naimeanv2 routes (prevent Wrangler 4 error 10020)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=naimean.com" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "Warning: could not look up zone ID for naimean.com — skipping route cleanup"
            exit 0
          fi
          ROUTE_IDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[] | select(.script == "naimeanv2") | .id')
          for id in $ROUTE_IDS; do
            echo "Deleting route $id"
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes/$id" \
              -H "Authorization: Bearer $CF_API_TOKEN"
          done
          echo "Route cleanup complete."

      - name: Deploy edge router worker (naimeanv2)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: .

      - name: Deploy counter worker (barrelrollcounter-worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: cloudflare-worker

      - name: Deploy naimean-api worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: naimean-api
