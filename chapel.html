<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chapel</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #000;
      /* enable smooth momentum scrolling on iOS */
      -webkit-overflow-scrolling: touch;
    }

    body {
      background: #000;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 1s ease;
    }

    body.loaded {
      opacity: 1;
    }

    .chapel-outer {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .chapel-wrapper {
      position: relative;
      width: 100%;
    }

    /* Subtle relight pass over the marked arch areas. */
    .chapel-relight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      background:
        radial-gradient(ellipse 12% 11% at 8% 58%, rgba(255, 186, 92, 0.14), transparent 72%),
        radial-gradient(ellipse 14% 13% at 10% 69%, rgba(255, 184, 88, 0.16), transparent 74%),
        radial-gradient(ellipse 9% 9% at 24% 66%, rgba(255, 190, 96, 0.13), transparent 72%),
        radial-gradient(ellipse 14% 12% at 34% 46%, rgba(255, 196, 104, 0.18), transparent 72%),
        radial-gradient(ellipse 26% 15% at 50% 45%, rgba(255, 190, 96, 0.15), transparent 74%),
        radial-gradient(ellipse 10% 9% at 68% 49%, rgba(255, 196, 104, 0.17), transparent 72%),
        radial-gradient(ellipse 9% 10% at 79% 62%, rgba(255, 190, 96, 0.14), transparent 72%),
        radial-gradient(ellipse 11% 12% at 92% 67%, rgba(255, 184, 88, 0.16), transparent 74%);
      mix-blend-mode: screen;
      opacity: 1;
      filter: blur(12px);
    }

    /* Warm light bloom and subtle shafts rising from the stained glass area. */
    .stained-glass-light {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: screen;
      opacity: 0.82;
    }

    .stained-glass-light::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 18% 10% at 50% 84%, rgba(255, 187, 92, 0.34), transparent 70%),
        radial-gradient(ellipse 10% 6% at 50% 82%, rgba(255, 236, 185, 0.14), transparent 72%),
        radial-gradient(ellipse 36% 22% at 50% 69%, rgba(255, 182, 92, 0.08), transparent 78%);
      filter: blur(10px);
    }

    .stained-glass-light::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(353deg, transparent 41%, rgba(255, 202, 118, 0.10) 50%, transparent 60%),
        linear-gradient(0deg, transparent 40%, rgba(255, 213, 140, 0.08) 50%, transparent 61%),
        linear-gradient(7deg, transparent 42%, rgba(255, 184, 96, 0.09) 51%, transparent 61%);
      filter: blur(24px);
      mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.95) 18%, rgba(0, 0, 0, 0.75) 38%, transparent 72%);
      -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.95) 18%, rgba(0, 0, 0, 0.75) 38%, transparent 72%);
    }

    /* Narrow seam softener just above center. */
    .chapel-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(to bottom,
        transparent 37.8%,
        rgba(0, 0, 0, 0.10) 38.9%,
        rgba(0, 0, 0, 0.22) 40.0%,
        rgba(0, 0, 0, 0.12) 41.1%,
        transparent 42.3%
      );
    }

    .chapel-img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Pulsing power button — positioned over the C64's power button on the altar */
    .chapel-power-btn {
      position: absolute;
      left: 53.9%;
      top: 85.6%;
      width: 1.1%;
      aspect-ratio: 1;
      background: #1ed760;
      border: 1.5px solid #1ed760;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9;
      pointer-events: none;
      box-shadow: 0 0 6px #000a;
    }

    .chapel-power-light {
      width: 55%;
      height: 55%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347 60%, #ff6600 100%);
      box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff;
      display: block;
      animation: chapel-power-pulse 1.6s infinite ease-in-out;
    }

    @keyframes chapel-power-pulse {
      0%   { box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff; filter: brightness(1); }
      50%  { box-shadow: 0 0 14px 6px #ff6600, 0 0 2px 1px #fff; filter: brightness(1.18); }
      100% { box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff; filter: brightness(1); }
    }

    /* Invisible button over the computer/altar screen in the chapel image.
       The monitor is centered horizontally and sits in the mid-section of the image. */
    .screen-btn {
      position: absolute;
      left: 28%;
      top: 78.4%;
      width: 44%;
      height: 7.8%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Page transition fade overlay */
    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 100;
    }

    .fade-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="fade-overlay" id="fade-overlay"></div>
  <audio id="congregation-audio" src="assets/congregation.mp3" preload="auto"></audio>

  <div class="chapel-outer">
    <div class="chapel-wrapper">
      <img src="assets/chapel_stacked.png" alt="The Chapel" class="chapel-img" />
      <div class="chapel-relight" aria-hidden="true"></div>
      <div class="stained-glass-light" aria-hidden="true"></div>
      <div class="chapel-power-btn" aria-hidden="true">
        <span class="chapel-power-light"></span>
      </div>
      <button class="screen-btn" id="screen-btn" aria-label="Enter the chapel"></button>
    </div>
  </div>

  <script>
    // Robust scroll to bottom — retry until images are painted (fixes mobile)
    var congregationAudio = document.getElementById('congregation-audio');
    var congregationStarted = false;

    function startCongregationAudio() {
      if (congregationStarted) {
        return;
      }

      congregationStarted = true;
      congregationAudio.currentTime = 0;

      var playPromise = congregationAudio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {
          congregationStarted = false;
        });
      }
    }

    function bindCongregationFallback() {
      function handleFirstInteraction() {
        startCongregationAudio();
        document.removeEventListener('pointerdown', handleFirstInteraction);
        document.removeEventListener('keydown', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);
      }

      document.addEventListener('pointerdown', handleFirstInteraction);
      document.addEventListener('keydown', handleFirstInteraction);
      document.addEventListener('touchstart', handleFirstInteraction);
    }

    function scrollToBottom() {
      var target = document.body.scrollHeight - window.innerHeight;
      window.scrollTo(0, target);
    }

    window.addEventListener('load', function () {
      scrollToBottom();
      // Retry a few times in case layout shifts as images decode on mobile
      setTimeout(scrollToBottom, 100);
      setTimeout(scrollToBottom, 300);
      setTimeout(function () {
        scrollToBottom();
        startCongregationAudio();
        bindCongregationFallback();
        document.body.classList.add('loaded');
      }, 500);
    });

    function navigateToSite() {
      var overlay = document.getElementById('fade-overlay');
      overlay.classList.add('fading');
      setTimeout(function () {
        window.location.assign('https://naimean.com');
      }, 900);
    }

    // Invisible button click → naimean.com
    document.getElementById('screen-btn').addEventListener('click', navigateToSite);

    // Enter key → same behavior
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        navigateToSite();
      }
    });
  </script>
</body>
</html>
