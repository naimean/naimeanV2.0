name = "barrelrollcounter-worker"
main = "worker.js"
compatibility_date = "2026-04-18"

# ⚠️  Before deploying, replace <DATABASE_ID> below with the actual ID shown in
#     the Cloudflare dashboard under Workers & Pages → D1 → barrelroll-counter-db → Database ID.
#
# Then run once to initialise the tables:
#   wrangler d1 execute barrelroll-counter-db --file=cloudflare-worker/schema.sql
#
# Set the router secret (never commit the value — it is stored by Cloudflare):
#   wrangler secret put ROUTER_SECRET
#
# And deploy with:
#   wrangler deploy

[[d1_databases]]
binding = "DB"
database_name = "barrelroll-counter-db"
database_id = "22277fbe-031d-4cad-8937-245309e981cd"
