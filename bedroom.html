<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedroom</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      height: 100%;
      overflow: hidden;
    }

    body {
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    body.loaded {
      opacity: 1;
    }

    .bedroom-scroller {
      width: 100%;
      height: 100dvh;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .bedroom-track {
      display: flex;
      align-items: stretch;
      height: 100%;
      min-width: max-content;
    }

    .bedroom-img {
      width: auto;
      height: 100%;
      flex: 0 0 auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="bedroom-scroller" id="bedroom-scroller">
    <div class="bedroom-track">
      <img src="assets/bedroom1.png" alt="Bedroom" class="bedroom-img" id="bedroom-img" />
    </div>
  </div>
  <script>
    var DOOR_CENTER_RATIO = 0.5;

    function centerOnDoor() {
      var scroller = document.getElementById('bedroom-scroller');
      var img = document.getElementById('bedroom-img');
      if (!scroller || !img) {
        return;
      }

      var maxScroll = Math.max(0, scroller.scrollWidth - scroller.clientWidth);
      var target = (img.clientWidth * DOOR_CENTER_RATIO) - (scroller.clientWidth / 2);
      scroller.scrollLeft = Math.min(maxScroll, Math.max(0, target));
    }

    window.addEventListener('load', function () {
      var img = document.getElementById('bedroom-img');
      if (img && !img.complete) {
        img.addEventListener('load', centerOnDoor, { once: true });
      } else {
        centerOnDoor();
      }
      requestAnimationFrame(centerOnDoor);
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    });

    window.addEventListener('resize', centerOnDoor);
  </script>
</body>
</html>
