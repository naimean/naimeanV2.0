name = "naimeanv2"
main = "src/index.js"
compatibility_date = "2026-04-18"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/get", "/hit", "/increment", "/auth", "/go", "/layout"]

[[services]]
binding = "COUNTER"
service = "barrelrollcounter-worker"
