name = "naimeanv2"
main = "src/index.js"
compatibility_date = "2026-04-18"
compatibility_flags = ["nodejs_compat"]

# Set required secrets before first deploy (never commit values — stored by Cloudflare):
#
#   Apple Music developer token (generated from your Apple Developer account .p8 key):
#     wrangler secret put APPLE_MUSIC_TOKEN
#
# The token is injected server-side into jukebox.html as window.NAIMEAN_APPLE_MUSIC_DEVELOPER_TOKEN.

[[routes]]
pattern = "naimean.com/*"
zone_name = "naimean.com"

[[routes]]
pattern = "www.naimean.com/*"
zone_name = "naimean.com"

[[routes]]
pattern = "uploads.naimean.com/*"
zone_name = "naimean.com"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/get", "/hit", "/increment", "/auth", "/go", "/layout", "/icon", "/assets/retroarch/cores/", "/jukebox"]

[[services]]
binding = "COUNTER"
service = "barrelrollcounter-worker"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "radley-gallery"

[[r2_buckets]]
binding = "CORES"
bucket_name = "retroarch-cores"

[[d1_databases]]
binding = "naimean-db"
database_name = "naimean-db"
database_id = "0871f90d-f7e3-467a-a1f9-4e74ac8aef42"
