<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCADE</title>
  <link rel="icon" type="image/jpeg" href="assets/images/commodore64.v20260424.jpg">
  <link rel="stylesheet" href="css/arcade-shell.css">
</head>
<body>
  <!-- ── Top bar ─────────────────────────────────────────────────────────────── -->
  <div class="shell-bar">
    <div class="shell-bar-title" id="bar-title">&#9658; ARCADE</div>
    <button id="btn-fs">FULLSCREEN</button>
    <button id="btn-restart" style="display:none">RESTART</button>
    <button id="btn-change-system" style="display:none">CHANGE SYSTEM</button>
    <button id="btn-back" style="display:none">&#8592; BACK</button>
    <button id="btn-debug">DEBUG</button>
    <a href="/" style="color:#8ef0b2;font-size:12px;border:1px solid #555;padding:2px 8px;text-decoration:none;font-family:monospace;">&#8962; HOME</a>
  </div>

  <!-- ── Timeout warning banner ─────────────────────────────────────────────── -->
  <div id="timeout-banner"></div>

  <!-- ── Main content ────────────────────────────────────────────────────────── -->
  <div class="shell-content">

    <!-- Screen: system picker -->
    <div class="shell-screen" id="screen-system">
      <div id="system-grid" class="system-grid"></div>
    </div>

    <!-- Screen: boot animation -->
    <div class="shell-screen" id="screen-boot">
      <div id="boot-content"></div>
    </div>

    <!-- Screen: ROM picker -->
    <div class="shell-screen" id="screen-picker">
      <div class="picker-header" id="picker-header">SELECT ROM</div>
      <div id="rom-list"></div>
    </div>

    <!-- Screen: emulator -->
    <div class="shell-screen" id="screen-game">
      <div id="game-wrap">
        <div id="game"></div>
      </div>
    </div>

    <!-- Screen: error -->
    <div class="shell-screen" id="screen-error">
      <div class="error-title" id="error-title">&#9888; ERROR</div>
      <pre class="error-table" id="error-table"></pre>
      <div class="error-fix" id="error-fix"></div>
      <button class="error-retry-btn" id="error-retry-btn" type="button">&#8635; RETRY</button>
    </div>

  </div>

  <!-- ── Debugger panel ──────────────────────────────────────────────────────── -->
  <div id="debug-panel">
    <div class="dbg-state" id="debug-state">STATE: IDLE</div>
    <ul id="debug-log-list"></ul>
  </div>

  <script src="js/arcade-shell.js"></script>
</body>
</html>
