<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Auth</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #060c08;
      color: #8ef0b2;
      font-family: 'VT323', 'IBM Plex Mono', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-card {
      border: 1px solid rgba(142, 240, 178, 0.8);
      padding: 18px 20px;
      border-radius: 10px;
      background: rgba(12, 20, 14, 0.9);
      box-shadow: 0 0 18px rgba(142, 240, 178, 0.25);
      text-align: center;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="auth-card" id="auth-card">
    Completing Discord sign-in...
  </div>
  <script>
    (function() {
      const POPUP_CLOSE_STATUS_DELAY_MS = 1200;
      const params = new URLSearchParams(window.location.search);
      const nextRaw = params.get('next') || '/';
      const fromRaw = params.get('from') || '/';
      const authOutcome = (params.get('auth') || '').trim().toLowerCase() || 'unknown';
      const authSuccess = authOutcome === 'success';

      function sanitizePath(raw) {
        const fallback = '/';
        if (typeof raw !== 'string' || !raw.trim()) {
          return fallback;
        }
        try {
          const url = new URL(raw, window.location.origin);
          if (url.origin !== window.location.origin) {
            return fallback;
          }
          return url.pathname + url.search + url.hash;
        } catch (_) {
          return fallback;
        }
      }

      const nextPath = sanitizePath(nextRaw);
      const fromPath = sanitizePath(fromRaw);
      const message = {
        type: 'naimean-auth-result',
        status: authOutcome,
        nextPath,
        fromPath,
      };

      const card = document.getElementById('auth-card');
      function setCardText(text) {
        if (card) {
          card.textContent = text;
        }
      }

      const hasOpener = typeof window.opener === 'object' && window.opener && window.opener !== window;
      if (hasOpener) {
        try {
          window.opener.postMessage(message, window.location.origin);
        } catch (_) {}
        setCardText(authSuccess
          ? 'Authentication complete. Closing this window...'
          : 'Authentication did not complete. You can close this window.');
        // Give the opener time to receive the message before closing.
        setTimeout(() => {
          try { window.close(); } catch (_) {}
        }, 350);
        if (authSuccess) {
          // Some browsers ignore window.close() even for popup windows. In that case,
          // leave the popup on this completion page instead of navigating it away from
          // the opener-controlled workflow.
          setTimeout(() => {
            if (!window.closed) {
              setCardText('Authentication complete. You can close this window.');
            }
          }, POPUP_CLOSE_STATUS_DELAY_MS);
        }
      } else {
        // Full-page redirect fallback (popup was blocked or opener is unavailable).
        // Only proceed to the destination on success; otherwise return to the
        // page the user came from so they are not sent to a protected page.
        if (authSuccess) {
          const joiner = nextPath.includes('?') ? '&' : '?';
          window.location.replace(`${nextPath}${joiner}auth=${encodeURIComponent(authOutcome)}`);
        } else {
          window.location.replace(fromPath);
        }
      }
    })();
  </script>
</body>
</html>
