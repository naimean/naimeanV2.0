<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedroom Antechamber</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      min-height: 100%;
    }

    :root {
      --top-blue-hotspot-left: 0%;
      --top-blue-hotspot-top: 0%;
      --top-blue-hotspot-width: 33%;
      --top-blue-hotspot-height: 18%;
      --doorway-hotspot-left: calc(40% - 80px);
      --doorway-hotspot-top: 30%;
      --doorway-hotspot-width: 20%;
      --doorway-hotspot-height: 55%;
      --bottom-hotspot-height: 12%;
      --nav-fade-duration: 0.9s;
    }

    body {
      opacity: 0;
      transition: opacity var(--nav-fade-duration) ease;
    }

    body.loaded {
      opacity: 1;
    }

    .bedroom-antechamber-outer {
      position: relative;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }

    .bedroom-antechamber-img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .trapdoor-up-btn {
      position: absolute;
      left: var(--top-blue-hotspot-left);
      top: var(--top-blue-hotspot-top);
      width: var(--top-blue-hotspot-width);
      height: var(--top-blue-hotspot-height);
      background: transparent;
      opacity: 0;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
    }

    .bedroom-enter-btn {
      position: absolute;
      left: var(--doorway-hotspot-left);
      top: var(--doorway-hotspot-top);
      width: var(--doorway-hotspot-width);
      height: var(--doorway-hotspot-height);
      background: transparent;
      opacity: 0;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .lower-level-btn {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: var(--bottom-hotspot-height);
      background: transparent;
      opacity: 0;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 3;
      -webkit-tap-highlight-color: transparent;
    }

    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--nav-fade-duration) ease;
      z-index: 100;
    }

    .fade-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="fade-overlay" id="fade-overlay"></div>
  <div class="bedroom-antechamber-outer">
    <img src="assets/bedroom_antechamber.png?v=20260419" alt="Bedroom Antechamber" class="bedroom-antechamber-img" />
    <button class="trapdoor-up-btn" id="trapdoor-up-btn" aria-label="Go back up through the trap door"></button>
    <button class="bedroom-enter-btn" id="bedroom-enter-btn" aria-label="Enter the bedroom"></button>
    <button class="lower-level-btn" id="lower-level-btn" aria-label="Descend to the first level"></button>
  </div>
  <script>
    let isNavigatingBackUp = false;
    let isNavigatingToBedroom = false;
    let isNavigatingToFirstLevel = false;
    const fadeOverlay = document.getElementById('fade-overlay');

    function parseCssDurationToMs(durationValue) {
      const firstDuration = String(durationValue || '').split(',')[0].trim();
      if (firstDuration.endsWith('ms')) {
        const milliseconds = parseFloat(firstDuration);
        return Number.isFinite(milliseconds) && milliseconds > 0 ? milliseconds : 0;
      }
      if (firstDuration.endsWith('s')) {
        const seconds = parseFloat(firstDuration);
        return Number.isFinite(seconds) && seconds > 0 ? seconds * 1000 : 0;
      }
      return 0;
    }

    function getNavFadeDurationMs() {
      if (!fadeOverlay) {
        return 0;
      }
      const transitionDuration = getComputedStyle(fadeOverlay).transitionDuration;
      return parseCssDurationToMs(transitionDuration);
    }

    function fadeOutAndNavigate(pathname) {
      if (fadeOverlay) {
        fadeOverlay.classList.add('fading');
      }
      setTimeout(function () {
        window.location.assign(pathname);
      }, getNavFadeDurationMs());
    }

    function navigateBackUp() {
      if (isNavigatingBackUp || isNavigatingToBedroom || isNavigatingToFirstLevel) {
        return;
      }
      isNavigatingBackUp = true;
      fadeOutAndNavigate('chapel.html');
    }

    function navigateToBedroom() {
      if (isNavigatingToBedroom || isNavigatingBackUp || isNavigatingToFirstLevel) {
        return;
      }
      isNavigatingToBedroom = true;
      window.location.assign('bedroom.html');
    }

    function navigateToFirstLevel() {
      if (isNavigatingToFirstLevel || isNavigatingBackUp || isNavigatingToBedroom) {
        return;
      }
      isNavigatingToFirstLevel = true;
      window.location.assign('level_one.html');
    }

    function playDoorClosingSound() {
      const audioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!audioContextCtor) {
        return;
      }

      const ctx = new audioContextCtor();
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.24, now);
      master.connect(ctx.destination);

      function scheduleTone(type, startFreq, endFreq, startOffset, duration, peakGain, lowpassFrequency) {
        const osc = ctx.createOscillator();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        const startTime = now + startOffset;
        const endTime = startTime + duration;

        osc.type = type;
        osc.frequency.setValueAtTime(startFreq, startTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, endTime);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(lowpassFrequency, startTime);
        filter.frequency.exponentialRampToValueAtTime(Math.max(160, lowpassFrequency * 0.28), endTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        osc.start(startTime);
        osc.stop(endTime + 0.02);
      }

      function scheduleNoiseBurst(startOffset, duration, peakGain) {
        const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
        const channel = buffer.getChannelData(0);
        for (let i = 0; i < channel.length; i += 1) {
          channel[i] = (Math.random() * 2 - 1) * (1 - (i / channel.length));
        }

        const source = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        const startTime = now + startOffset;
        const endTime = startTime + duration;

        source.buffer = buffer;
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(540, startTime);
        filter.Q.setValueAtTime(0.9, startTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        source.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        source.start(startTime);
        source.stop(endTime + 0.01);
      }

      scheduleTone('square', 152, 64, 0, 0.22, 0.12, 1300);
      scheduleTone('sine', 88, 44, 0.04, 0.28, 0.16, 780);
      scheduleNoiseBurst(0.015, 0.13, 0.09);

      setTimeout(function () {
        ctx.close();
      }, 900);
    }

    window.addEventListener('load', function () {
      playDoorClosingSound();
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    });

    document.getElementById('trapdoor-up-btn').addEventListener('click', navigateBackUp);
    document.getElementById('bedroom-enter-btn').addEventListener('click', navigateToBedroom);
    document.getElementById('lower-level-btn').addEventListener('click', navigateToFirstLevel);
  </script>
</body>
</html>
