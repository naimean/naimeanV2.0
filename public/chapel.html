<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chapel</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #000;
      /* enable smooth momentum scrolling on iOS */
      -webkit-overflow-scrolling: touch;
    }

    body {
      background: #000;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 1s ease;
    }

    @supports (min-height: 100dvh) {
      body {
        min-height: 100dvh;
      }
    }

    body.loaded {
      opacity: 1;
    }

    .chapel-outer {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .chapel-wrapper {
      position: relative;
      width: 100%;
      --chapel-light-elements-upshift: 200px;
      --chapel-seam-bloom-upshift: 50px;
      --chapel-medial-bloom-center-offset: 10px;
      --chapel-medial-bloom-upshift: 50px;
      --chapel-light-intensity-scale: 1.07;
      --chapel-light-global-offset-x: 0px;
      --chapel-light-global-offset-y: 0px;
      --chapel-selected-element-z-index: 121;
    }

    .chapel-stitch {
      width: 100%;
    }

    /* Warm seam harmonizer to lift stitched ceiling seams and smooth the vault gradient. */
    .chapel-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(to bottom,
        transparent 4.0%,
        rgba(232, 166, 94, 0.0175) 10.0%,
        rgba(246, 178, 104, 0.0525) 20.0%,
        rgba(232, 166, 94, 0.024) 34.0%,
        rgba(244, 177, 106, 0.065) 48.0%,
        rgba(250, 186, 114, 0.0825) 58.0%,
        rgba(236, 170, 101, 0.045) 66.0%,
        rgba(214, 148, 86, 0.0175) 74.0%,
        transparent 82.0%
      );
    }

    .chapel-img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .chapel-trans-rick {
      position: absolute;
      left: calc(46.1% + 20px);
      top: calc(54.8% + 200px);
      width: clamp(42px, 9.2%, 80px);
      height: auto;
      transform: translate(-50%, -100%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .chapel-trans-rick.is-visible {
      z-index: 20;
    }

    /* Pulsing power button — positioned over the C64's power button on the altar */
    .chapel-power-btn {
      position: absolute;
      left: 53.9%;
      top: 58.36%;
      width: 1.1%;
      aspect-ratio: 1;
      background: #1ed760;
      border: 1.5px solid #1ed760;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9;
      pointer-events: none;
      box-shadow: 0 0 6px #000a;
      transform: translate(var(--chapel-light-global-offset-x), var(--chapel-light-global-offset-y));
    }

    .chapel-power-light {
      width: 55%;
      height: 55%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347 60%, #ff6600 100%);
      box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff;
      display: block;
      animation: chapel-power-pulse 1.6s infinite ease-in-out;
    }

    @keyframes chapel-power-pulse {
      0%   { box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff; filter: brightness(var(--chapel-light-intensity-scale)); }
      50%  { box-shadow: 0 0 14px 6px #ff6600, 0 0 2px 1px #fff; filter: brightness(calc(1.18 * var(--chapel-light-intensity-scale))); }
      100% { box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff; filter: brightness(var(--chapel-light-intensity-scale)); }
    }

    /* Invisible hotspot over the chapel computer screen to return to index. */
    .chapel-return-btn {
      position: absolute;
      left: calc(44.6% - 22px);
      top: calc(52.0% + 52px);
      width: calc(12% + 12px);
      height: calc(7% - 110px);
      background: transparent;
      opacity: 1;
      pointer-events: auto;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .chapel-tv-counter {
      position: absolute;
      right: calc(45.2% + 6px);
      top: calc(53.55% + 34px);
      min-width: 1.8ch;
      min-height: 2.2%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      z-index: 8;
      color: #ffffff;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: clamp(6px, 0.76vw, 9px);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-align: right;
      text-shadow: 0 0 3px rgba(150, 210, 255, 0.85);
      white-space: nowrap;
    }

    @media (min-width: 900px) {
      .chapel-trans-rick {
        left: calc(46.1% + 25px);
        top: calc(54.8% + 210px);
      }

      /* Desktop-only requested offset: hitbox moved 10px left and 30px down. */
      .chapel-return-btn {
        left: calc(46.4% - 25px);
        top: calc(53.2% + 82px);
      }

      /* Desktop tweak: shift counter further left and down from base placement. */
      .chapel-tv-counter {
        right: calc(45.2% + 6px + 11px);
        top: calc(53.55% + 34px + 52px);
      }
    }

    .invisible-hotspot-btn {
      position: absolute;
      background: transparent;
      opacity: 1;
      pointer-events: auto;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .chapel-return-btn,
    .invisible-hotspot-btn {
      outline: 2px dashed rgba(255, 255, 255, 0.95);
      outline-offset: -1px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.8);
    }

    /* Invisible hotspot over the trap door square area. */
    .trapdoor-btn {
      left: calc(33% - 70px);
      top: calc(77% + 15px);
      width: calc(34% + 140px);
      height: max(calc(16% - 190px), 24px);
      outline: none;
      box-shadow: none;
    }

    .trapdoor-btn:focus,
    .trapdoor-btn:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 2px;
      box-shadow: none;
    }

    .congregation-btn:focus-visible {
      opacity: 1;
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 2px;
      background: rgba(255, 255, 255, 0.2);
    }

    #crusty-button {
      left: calc(16% - 127px);
      top: calc(76.5% - 455px);
      width: calc(8% + 75px);
      height: max(calc(17% - 200px), 24px);
    }

    #goose-button {
      left: calc(31% - 25px);
      top: calc(77.5% - 494px);
      width: calc(8% + 10px);
      height: max(calc(16% - 376px), 24px);
    }

    #rick-button {
      left: calc(69.5% + 68px);
      top: calc(76.5% - 485px);
      width: 8%;
      height: max(calc(17% - 365px), 24px);
    }

    #morty-button {
      left: calc(54.5% + 102px);
      top: calc(77.5% - 457px);
      width: 8%;
      height: max(calc(16% - 390px), 24px);
    }

    #chapel-return-btn,
    #crusty-button,
    #goose-button,
    #rick-button,
    #morty-button {
      border: none;
      outline: none;
      box-shadow: none;
    }

    .congregation-btn-crusty {
      left: calc(16% - 115px);
      top: calc(76.5% - 415px);
      width: calc(8% + 65px);
      height: max(calc(17% - 300px), 24px);
    }

    .congregation-btn-goose {
      left: calc(31% - 40px);
      top: calc(77.5% - 450px);
      width: calc(8% + 30px);
      height: max(calc(16% - 330px), 24px);
    }

    .congregation-btn-rick {
      left: calc(54.5% + 57px);
      top: calc(76.5% - 500px);
      width: calc(8% + 28px);
      height: max(calc(17% - 350px), 24px);
    }

    .congregation-btn-morty {
      left: calc(69.5% + 95px);
      top: calc(77.5% - 420px);
      width: calc(8% + 25px);
      height: max(calc(16% - 350px), 24px);
    }

    @media (max-width: 430px) {
      .chapel-return-btn {
        left: 42.39%;
        top: 53.40%;
        width: 13.21%;
        height: 4.03%;
      }

      .trapdoor-btn {
        left: 25.96%;
        top: 77.40%;
        width: 48.09%;
        height: 10.88%;
      }

      #crusty-button {
        left: 3.22%;
        top: 64.23%;
        width: 15.55%;
        height: 11.61%;
      }

      #goose-button {
        left: 28.49%;
        top: 64.18%;
        width: 9.01%;
        height: 5.86%;
      }

      #rick-button {
        left: 76.34%;
        top: 63.42%;
        width: 8.00%;
        height: 7.16%;
      }

      #morty-button {
        left: 64.76%;
        top: 65.18%;
        width: 8.00%;
        height: 5.48%;
      }
    }

    /* Page transition fade overlay */
    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 100;
    }

    .fade-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }

    /* Warm bloom overlays for stitched seam dark spots.
       Use lighten so overlap does not stack brightness additively. */
    .torch-bloom {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      transform: translate(
        calc(-50% + var(--chapel-light-global-offset-x)),
        calc(-50% + var(--chapel-light-global-offset-y))
      );
      mix-blend-mode: lighten;
      filter: blur(9px);
      z-index: 4;
      opacity: calc(var(--torch-bloom-intensity, 1) * var(--torch-bloom-boost, 1) * var(--chapel-light-intensity-scale, 1));
      transition: opacity 180ms linear;
      background: radial-gradient(
        circle,
        rgba(255, 190, 80, 0.11) 0%,
        rgba(240, 145, 45, 0.06) 38%,
        rgba(210, 110, 25, 0.02) 68%,
        transparent 82%
      );
    }

    .sauce-drip-lane {
      position: absolute;
      left: calc(50% + 50px);
      top: calc(12% - 50px);
      width: 18px;
      height: 72%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 6;
    }

    .sauce-drip {
      position: absolute;
      left: 50%;
      top: 0;
      width: 10px;
      height: 18px;
      border-radius: 50% 50% 65% 65%;
      background: radial-gradient(circle at 35% 26%, rgba(255, 196, 150, 0.78) 0%, rgba(167, 24, 15, 0.94) 65%, rgba(105, 10, 7, 0.98) 100%);
      filter: drop-shadow(0 0 4px rgba(129, 18, 10, 0.7));
      opacity: 0;
      transform: translate(-50%, 0) scale(0.6);
      will-change: transform, opacity;
    }

    .sauce-drip.is-dripping {
      animation: sauce-drip-fall 1.6s ease-in forwards;
    }

    @keyframes sauce-drip-fall {
      0% {
        opacity: 0;
        top: 0;
        transform: translate(-50%, 0) scale(0.5);
      }
      10% {
        opacity: 0.95;
        top: 2%;
        transform: translate(-50%, 0) scale(0.82, 1.2);
      }
      80% {
        opacity: 0.98;
        top: calc(100% - 124px);
        transform: translate(-50%, 0) scale(0.9, 1.26);
      }
      100% {
        opacity: 0;
        top: calc(100% - 150px);
        transform: translate(-50%, 0) scale(1.02, 0.82);
      }
    }

    @media (max-width: 899px) {
      .chapel-trans-rick {
        left: calc((46.1% + 20px) - 5px);
        top: calc((54.8% + 200px) - 75px);
      }

      .sauce-drip-lane {
        left: calc(50% + 50px - 40px + 8px);
      }

      .sauce-drip {
        width: 5px;
        height: 9px;
      }

      @keyframes sauce-drip-fall {
        80% {
          opacity: 0.98;
          top: calc(100% - (124px - 80px));
          transform: translate(-50%, 0) scale(0.9, 1.26);
        }
        100% {
          opacity: 0;
          top: calc(100% - (150px - 80px));
          transform: translate(-50%, 0) scale(1.02, 0.82);
        }
      }
    }

    @media (max-width: 430px) {
      .chapel-trans-rick {
        left: calc((46.1% + 20px) - 5px);
        top: calc((54.8% + 200px) - 85px);
      }
    }

    .hotspot-tool {
      position: fixed;
      right: 12px;
      top: var(--hotspot-tool-top, 12px);
      z-index: 120;
      width: min(260px, calc(100vw - 24px));
      background: rgba(0, 0, 0, 0.88);
      border: 1px solid rgba(210, 210, 210, 0.6);
      color: #fff;
      font: 12px/1.3 'IBM Plex Mono', 'Courier New', monospace;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      visibility: hidden;
      pointer-events: none;
    }

    /* Tools are shown when body has the .hotspot-tools-active class.
       Toggle with Ctrl+Shift+H or via NaimeanLayout.toggle() in the console. */
    body.hotspot-tools-active .hotspot-tool {
      visibility: visible;
      pointer-events: auto;
    }

    #hotspot-move-tool {
      --hotspot-tool-top: 12px;
    }

    #hotspot-size-tool {
      --hotspot-tool-top: 220px;
    }

    #hotspot-viewport-tool {
      --hotspot-tool-top: 440px;
    }

    #hotspot-font-tool {
      --hotspot-tool-top: 600px;
    }

    .hotspot-tool-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hotspot-tool select,
    .hotspot-tool button {
      font: inherit;
    }

    .hotspot-tool select {
      width: 100%;
      background: #111;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.45);
      padding: 4px;
    }

    .hotspot-tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
    }

    .hotspot-tool-grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
    }

    .hotspot-tool button {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.45);
      padding: 4px;
      cursor: pointer;
    }

    .hotspot-tool button:hover,
    .hotspot-tool button:focus-visible {
      background: #2a2a2a;
      outline: 1px solid rgba(255, 255, 255, 0.8);
    }

    .hotspot-tool-meta {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.82);
      word-break: break-word;
    }

    .hotspot-tool-save {
      background: #0d3320 !important;
      border-color: #1a5c30 !important;
      color: #8ef0b2 !important;
      grid-column: 1 / -1;
    }

    .hotspot-tool-save:hover,
    .hotspot-tool-save:focus-visible {
      background: #164d2a !important;
    }

    /* Dashed highlight on the currently selected hotspot element. */
    .hotspot-selected {
      outline: 2px dashed rgba(255, 220, 0, 0.9) !important;
      outline-offset: 2px !important;
      z-index: var(--chapel-selected-element-z-index) !important;
    }

    body.hotspot-tools-active .hotspot-selected {
      pointer-events: auto !important;
      cursor: grab !important;
      /* Disable browser panning/zoom gestures on the selected element while it is being dragged. */
      touch-action: none;
    }

    body.hotspot-tools-active .hotspot-selected.hotspot-dragging {
      cursor: grabbing !important;
    }

    /* Viewport simulator: constrains chapel-outer to mimic a narrow device. */
    body.viewport-simulated .chapel-outer {
      max-width: var(--simulated-viewport-width, 820px);
    }

    .hotspot-viewport-active {
      background: #1a3a1a !important;
      border-color: #4a8a4a !important;
    }

    .hotspot-viewport-probe-shell {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
      min-height: 92px;
      max-height: 260px;
      overflow: auto;
      padding: 6px;
    }

    .hotspot-viewport-probe-empty {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.72);
    }

    .hotspot-viewport-probe-canvas {
      position: relative;
      display: none;
      min-width: 100%;
    }

    .hotspot-viewport-probe-canvas.is-ready {
      display: block;
    }

    .hotspot-viewport-probe-frame {
      border: 0;
      display: block;
      transform-origin: top left;
      background: #000;
      pointer-events: none;
    }

    .layout-probe-body .hotspot-tool {
      display: none !important;
    }

    .layout-probe-body .hotspot-viewport-probe-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 130;
    }

    .layout-probe-body .hotspot-viewport-probe-box {
      position: absolute;
      border: 1px solid rgba(255, 230, 120, 0.95);
      background: rgba(255, 230, 120, 0.08);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.58);
    }

    .layout-probe-body .hotspot-viewport-probe-box[data-hotspot-id="chapel-return-btn"] {
      border-color: rgba(0, 220, 255, 0.95);
      background: rgba(0, 220, 255, 0.08);
    }

    .layout-probe-body .hotspot-viewport-probe-box[data-hotspot-id="trapdoor-btn"] {
      border-color: rgba(255, 120, 120, 0.95);
      background: rgba(255, 120, 120, 0.08);
    }

    .layout-probe-body .hotspot-viewport-probe-label {
      position: absolute;
      left: 0;
      top: 0;
      transform: translateY(-100%);
      padding: 1px 4px;
      background: rgba(0, 0, 0, 0.86);
      color: #fff;
      font: 10px/1.2 'IBM Plex Mono', 'Courier New', monospace;
      white-space: nowrap;
    }

  </style>
</head>
<body>
  <div class="fade-overlay" id="fade-overlay"></div>
  <audio id="congregation-audio" src="assets/congregation.mp3" preload="auto"></audio>
  <audio id="congregation-audio-crusty" src="assets/krusty_laugh.mp3" preload="auto"></audio>
  <audio id="congregation-audio-goose" src="assets/goose_honk.mp3" preload="auto"></audio>
  <audio id="congregation-audio-rick" src="assets/rick_nope.mp3" preload="auto"></audio>
  <audio id="congregation-audio-morty" src="assets/morty_aw_jeez.mp3" preload="auto"></audio>
  <video id="rock-roll-continuation-media" src="assets/notarickroll.mp4" playsinline preload="auto" style="display:none" aria-hidden="true"></video>

    <div class="chapel-outer">
      <div class="chapel-wrapper">
        <img src="assets/chapel_stacked.png" alt="The Chapel" class="chapel-img" />
        <img src="assets/trans_rick.gif" alt="" class="chapel-trans-rick" id="chapel-trans-rick" hidden aria-hidden="true" />
        <div class="chapel-power-btn" id="chapel-power-btn" aria-hidden="true">
          <span class="chapel-power-light"></span>
        </div>
      <div class="chapel-tv-counter" id="chapel-tv-counter" aria-live="polite">01</div>
      <button class="chapel-return-btn" id="chapel-return-btn" aria-label="Return to home"></button>
      <button class="invisible-hotspot-btn trapdoor-btn" id="trapdoor-btn" aria-label="Enter the descent"></button>
      <button class="invisible-hotspot-btn congregation-btn" id="crusty-button" aria-label="Play Crusty laugh"></button>
      <button class="invisible-hotspot-btn congregation-btn" id="goose-button" aria-label="Play Goose honk"></button>
      <button class="invisible-hotspot-btn congregation-btn" id="morty-button" aria-label="Play Morty aw jeez"></button>
      <button class="invisible-hotspot-btn congregation-btn" id="rick-button" aria-label="Play Rick nope"></button>
      <div class="sauce-drip-lane" id="sauce-drip-lane" aria-hidden="true">
        <div class="sauce-drip" id="sauce-drip"></div>
      </div>
      <section class="hotspot-tool" id="hotspot-move-tool" aria-label="Move invisible hotspot tool">
        <h2 class="hotspot-tool-title">Move Tool</h2>
        <select id="move-tool-target" data-hotspot-target>
          <option value="__none__">no hotspot</option>
          <option value="chapel-return-btn">return hotspot</option>
          <option value="trapdoor-btn">trapdoor hotspot</option>
          <option value="crusty-button">crusty hotspot</option>
          <option value="goose-button">goose hotspot</option>
          <option value="morty-button">morty hotspot</option>
          <option value="rick-button">rick hotspot</option>
          <option value="chapel-trans-rick">trans rick</option>
          <option value="chapel-tv-counter">tv counter</option>
          <option value="chapel-power-btn">power button</option>
          <option value="chapel-trans-rick">trans rick</option>
          <option value="sauce-drip-lane">sauce drip lane</option>
          <option value="chapel-seam-bloom-left-upper">seam light 1</option>
          <option value="chapel-seam-bloom-right-upper">seam light 2</option>
          <option value="chapel-seam-bloom-center-upper">seam light 3</option>
          <option value="chapel-seam-bloom-left-lower">seam light 4</option>
          <option value="chapel-seam-bloom-right-lower">seam light 5</option>
          <option value="chapel-seam-bloom-center-lower">seam light 6</option>
        </select>
        <div class="hotspot-tool-grid">
          <button type="button" data-move-prop="top" data-move-step="-2">up</button>
          <button type="button" data-move-prop="top" data-move-step="2">down</button>
          <button type="button" data-move-prop="left" data-move-step="-2">left</button>
          <button type="button" data-move-prop="left" data-move-step="2">right</button>
        </div>
        <div class="hotspot-tool-grid">
          <button type="button" data-hotspot-action="show">show</button>
          <button type="button" data-hotspot-action="hide">hide</button>
        </div>
        <div class="hotspot-tool-grid">
          <button type="button" class="hotspot-tool-save" id="hotspot-save-btn">💾 Save all</button>

        <div class="hotspot-tool-meta" id="move-tool-meta" aria-live="polite">Select an element to view dimensions.</div>
