  <script src="auth.js"></script>
  <script src="diagnostics.js"></script>
  <script>
    // Robust scroll to bottom — retry until images are painted (fixes mobile)
    // Source image heights in pixels, measured from tracked assets:
    // - 2529px: pre-stitch assets/chapel_stacked.png height
    // - 3709px: current stitched assets/chapel_stacked.png height
    // Their ratio marks the stitch boundary used for the initial floor anchor.
    const ORIGINAL_CHAPEL_HEIGHT = 2529;
    const STITCHED_CHAPEL_HEIGHT = 3709;
    const ORIGINAL_CHAPEL_HEIGHT_RATIO = ORIGINAL_CHAPEL_HEIGHT / STITCHED_CHAPEL_HEIGHT;

    const congregationAudio = document.getElementById('congregation-audio');
    const rockRollContinuationMedia = document.getElementById('rock-roll-continuation-media');
    const chapelTvCounter = document.getElementById('chapel-tv-counter');
    const chapelTransRick = document.getElementById('chapel-trans-rick');
    const chapelWrapper = document.querySelector('.chapel-wrapper');
    const chapelImage = document.querySelector('.chapel-img');
    const torchBlooms = Array.from(document.querySelectorAll('.torch-bloom'));
    congregationAudio.volume = 0.04;
    const ROCK_ROLL_CONTINUATION_KEY = 'naimean-rock-roll-continuation';
    const ROCK_ROLL_CONTINUATION_PENDING_KEY = 'naimean-rock-roll-continuation-pending';
    const DISCORD_INVITE_REDIRECT_PENDING_KEY = 'naimean-discord-invite-redirect-pending';
    const DISCORD_WIDGET_ID = '1487898909224341534';
    const DISCORD_WIDGET_API_URL = `https://discord.com/api/guilds/${DISCORD_WIDGET_ID}/widget.json`;
    const DISCORD_INVITE_RESOLVE_TIMEOUT_MS = 2000;
    const DISCORD_INVITE_LAUNCH_DELAY_MS = 1000;
    const LOCAL_RICKROLL_COUNT_KEY = 'naimean-rickroll-count-fallback';
    const LEGACY_RICKROLL_COUNTER_BASE_URL = 'https://barrelrollcounter-worker.naimean.workers.dev';
    const INDEX_FADE_IN_KEY = 'naimean-index-fade-in';
    const ROCK_ROLL_START_VOLUME_FACTOR = 0.5;
    const ROCK_ROLL_START_DELAY_MS = 2000;
    const ROCK_ROLL_FADE_DURATION_MS = 5000;
    const LUMINANCE_RED_WEIGHT = 0.2126;
    const LUMINANCE_GREEN_WEIGHT = 0.7152;
    const LUMINANCE_BLUE_WEIGHT = 0.0722;
    const BLOOM_BASE_INTENSITY = 0.24;
    const BLOOM_LUMINANCE_MULTIPLIER = 0.66;
    const BLOOM_MIN_INTENSITY = 0.16;
    const BLOOM_MAX_INTENSITY = 0.9;
    const BLOOM_RESIZE_DEBOUNCE_MS = 120;
    const HOTSPOT_TOOL_NONE_TARGET = '__none__';
    const HOTSPOT_TOOL_DEFAULT_TARGET = HOTSPOT_TOOL_NONE_TARGET;
    const HOTSPOT_TOOL_DRAG_HELP_TEXT = 'drag on page to move';
    const HOTSPOT_LAYOUT_PAGE = 'chapel';
    const HOTSPOT_VIEWPORT_WIDTHS = [375, 390, 430, 768, 1024, 1280, 1440];
    const HOTSPOT_LAYOUT_PROBE_QUERY_PARAM = 'layoutProbe';
    const HOTSPOT_COUNTER_ID = 'chapel-tv-counter';
    const HOTSPOT_COUNTER_FONT_SIZE_MIN_PX = 4;
    const HOTSPOT_COUNTER_FONT_SIZE_MAX_PX = 120;
    const HOTSPOT_STYLE_PROPERTY_NAMES = ['top', 'left', 'width', 'height', 'fontSize'];
    const HOTSPOT_IDS = [
      'chapel-return-btn',
      'trapdoor-btn',
      'crusty-button',
      'goose-button',
      'morty-button',
      'rick-button',
      'chapel-trans-rick',
      HOTSPOT_COUNTER_ID,
      'chapel-power-btn',
      'sauce-drip-lane',
      'chapel-seam-bloom-left-upper',
      'chapel-seam-bloom-right-upper',
      'chapel-seam-bloom-center-upper',
      'chapel-seam-bloom-left-lower',
      'chapel-seam-bloom-right-lower',
      'chapel-seam-bloom-center-lower',
    ];
    const SAUCE_DRIP_MIN_INTERVAL_MS = 10000;
    const SAUCE_DRIP_MAX_INTERVAL_MS = 15000;
    const SAUCE_DRIP_ANIMATION_MS = 1600;
    let congregationStarted = false;
    let isNavigatingFromChapel = false;
    let rockRollContinuationActive = false;
    let rockRollContinuationPlaybackState = null;
    let rockRollContinuationRetryBound = false;
    let rockRollContinuationPending = false;
    let torchBloomSampleCanvas = null;
    let torchBloomSampleContext = null;
    let torchBloomIntensityBound = false;
    let sauceDripTimerId = null;
    let activeSimulatedViewportWidth = null;
    let activeLayoutLoadRequestId = 0;
    let activeViewportProbeMessage = null;
    let activeViewportProbeToken = '';
    const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    const sauceDrip = document.getElementById('sauce-drip');
    const wrongAudio = new Audio('assets/wrong.mp3');
    wrongAudio.preload = 'auto';
    wrongAudio.load();
    const defaultLayoutInlineStyles = new Map();
    const isLayoutProbeMode = new URLSearchParams(window.location.search).get(HOTSPOT_LAYOUT_PROBE_QUERY_PARAM) === '1';

    function parseNumericValue(value) {
      const numericValue = Number.parseFloat(value);
      return Number.isFinite(numericValue) ? numericValue : 0;
    }

    function resolveNearestHotspotViewportWidth(width) {
      const numericWidth = Number(width);
      if (!Number.isFinite(numericWidth) || numericWidth <= 0) {
        return HOTSPOT_VIEWPORT_WIDTHS[HOTSPOT_VIEWPORT_WIDTHS.length - 1];
      }

      return HOTSPOT_VIEWPORT_WIDTHS.reduce(function (closestWidth, candidateWidth) {
        const candidateDistance = Math.abs(candidateWidth - numericWidth);
        const closestDistance = Math.abs(closestWidth - numericWidth);
        return candidateDistance < closestDistance ? candidateWidth : closestWidth;
      }, HOTSPOT_VIEWPORT_WIDTHS[0]);
    }

    function getCurrentHotspotViewportWidth() {
      if (Number.isFinite(activeSimulatedViewportWidth) && activeSimulatedViewportWidth > 0) {
        return activeSimulatedViewportWidth;
      }

      return resolveNearestHotspotViewportWidth(window.innerWidth || document.documentElement.clientWidth || 0);
    }

    function getCurrentHotspotLayoutPageKey() {
      return `${HOTSPOT_LAYOUT_PAGE}--vp-${getCurrentHotspotViewportWidth()}`;
    }

    function createSafeAreaProbe() {
      const safeAreaProbe = document.createElement('div');
      safeAreaProbe.setAttribute('aria-hidden', 'true');
      safeAreaProbe.style.cssText = [
        'position:fixed',
        'left:0',
        'top:0',
        'width:0',
        'height:0',
        'overflow:hidden',
        'visibility:hidden',
        'pointer-events:none',
        'padding-top:env(safe-area-inset-top, 0px)',
        'padding-right:env(safe-area-inset-right, 0px)',
        'padding-bottom:env(safe-area-inset-bottom, 0px)',
        'padding-left:env(safe-area-inset-left, 0px)',
      ].join(';');
      document.body.appendChild(safeAreaProbe);
      return safeAreaProbe;
    }

    function captureDefaultLayoutInlineStyles() {
      HOTSPOT_IDS.forEach(function (id) {
        if (defaultLayoutInlineStyles.has(id)) {
          return;
        }

        const target = document.getElementById(id);
        if (!target) {
          return;
        }

        defaultLayoutInlineStyles.set(id, {
          top: target.style.top,
          left: target.style.left,
          width: target.style.width,
          height: target.style.height,
          fontSize: target.style.fontSize,
        });
      });
    }

    function restoreDefaultLayoutInlineStyles() {
      HOTSPOT_IDS.forEach(function (id) {
        const target = document.getElementById(id);
        const defaults = defaultLayoutInlineStyles.get(id);
        if (!target || !defaults) {
          return;
        }

        HOTSPOT_STYLE_PROPERTY_NAMES.forEach(function (property) {
          const value = defaults[property];
          if (value) {
            target.style[property] = value;
          } else {
            target.style.removeProperty(resolveHotspotCssPropertyName(property));
          }
        });

        delete target.dataset.layoutFontSizePct;
      });
    }

    function resolveHotspotCssPropertyName(property) {
      return property.replace(/[A-Z]/g, function (match) {
        return '-' + match.toLowerCase();
      });
    }

    function applyResponsiveLayoutFontOverrides() {
      if (!chapelWrapper || !chapelWrapper.offsetWidth) {
        return;
      }

      document.querySelectorAll('[data-layout-font-size-pct]').forEach(function (target) {
        const fontSizePct = parseNumericValue(target.dataset.layoutFontSizePct);
        if (fontSizePct <= 0) {
          return;
        }
        target.style.fontSize = `${(chapelWrapper.offsetWidth * fontSizePct) / 100}px`;
      });
    }

    function setCounterFontSize(nextFontSizePx) {
      if (!chapelTvCounter || !Number.isFinite(nextFontSizePx)) {
        return;
      }

      const clampedFontSizePx = Math.min(HOTSPOT_COUNTER_FONT_SIZE_MAX_PX, Math.max(HOTSPOT_COUNTER_FONT_SIZE_MIN_PX, nextFontSizePx));
      delete chapelTvCounter.dataset.layoutFontSizePct;
      chapelTvCounter.style.fontSize = `${clampedFontSizePx}px`;
    }

    function adjustCounterFontSize(deltaPx) {
      if (!chapelTvCounter) {
        return;
      }

      const currentFontSizePx = parseNumericValue(window.getComputedStyle(chapelTvCounter).fontSize);
      setCounterFontSize(currentFontSizePx + deltaPx);
    }

    function resetCounterFontSize() {
      if (!chapelTvCounter) {
        return;
      }

      delete chapelTvCounter.dataset.layoutFontSizePct;
      chapelTvCounter.style.removeProperty('font-size');
    }

    function resolveTargetLayoutMetrics(target) {
      if (!target || !chapelWrapper) {
        return null;
      }

      const computed = window.getComputedStyle(target);
      const wrapperRect = chapelWrapper.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const leftValue = Number.parseFloat(computed.left);
      const topValue = Number.parseFloat(computed.top);
      const widthValue = Number.parseFloat(computed.width);
      const heightValue = Number.parseFloat(computed.height);

      return {
        left: Number.isFinite(leftValue) ? leftValue : targetRect.left - wrapperRect.left,
        top: Number.isFinite(topValue) ? topValue : targetRect.top - wrapperRect.top,
        width: Number.isFinite(widthValue) && widthValue > 0 ? widthValue : targetRect.width,
        height: Number.isFinite(heightValue) && heightValue > 0 ? heightValue : targetRect.height,
        hasExplicitLeft: Number.isFinite(leftValue),
        hasExplicitTop: Number.isFinite(topValue),
      };
    }

    function normalizeTargetLayoutPosition(target) {
      const metrics = resolveTargetLayoutMetrics(target);
      if (!metrics) {
        return null;
      }

      // Convert right/bottom-resolved elements to explicit left/top pixels so the
      // move buttons and direct dragging both update a consistent coordinate system.
      target.style.left = `${metrics.left}px`;
      target.style.top = `${metrics.top}px`;
      if (!metrics.hasExplicitLeft) {
        target.style.right = 'auto';
      }
      if (!metrics.hasExplicitTop) {
        target.style.bottom = 'auto';
      }
      return metrics;
    }

    function getHotspotTargetById(targetId) {
      if (!targetId || targetId === HOTSPOT_TOOL_NONE_TARGET) {
        return null;
      }
      return document.getElementById(targetId);
    }

    function getSelectedHotspotId() {
      const firstSelector = document.querySelector('[data-hotspot-target]');
      return firstSelector ? firstSelector.value : HOTSPOT_TOOL_DEFAULT_TARGET;
    }

    function getNextSauceDripDelayMs() {
      const intervalRange = SAUCE_DRIP_MAX_INTERVAL_MS - SAUCE_DRIP_MIN_INTERVAL_MS;
      const randomOffset = Math.floor(Math.random() * (intervalRange + 1));
      return SAUCE_DRIP_MIN_INTERVAL_MS + randomOffset;
    }

    function clearSauceDripTimer() {
      if (sauceDripTimerId !== null) {
        window.clearTimeout(sauceDripTimerId);
        sauceDripTimerId = null;
      }
    }

    function triggerSauceDrip() {
      if (!sauceDrip) {
        return;
      }
      sauceDrip.classList.remove('is-dripping');
      // Reading offsetWidth forces layout/reflow so removing+re-adding the class restarts the CSS animation.
      void sauceDrip.offsetWidth;
      sauceDrip.classList.add('is-dripping');
      window.setTimeout(function () {
        sauceDrip.classList.remove('is-dripping');
      }, SAUCE_DRIP_ANIMATION_MS);
    }

    function scheduleNextSauceDrip() {
      if (!sauceDrip || reducedMotionQuery.matches) {
        return;
      }
      clearSauceDripTimer();
      const nextDelayMs = getNextSauceDripDelayMs();
      sauceDripTimerId = window.setTimeout(function () {
        triggerSauceDrip();
        scheduleNextSauceDrip();
      }, nextDelayMs);
    }

    function syncHotspotTargetSelection(nextTargetId) {
      document.querySelectorAll('[data-hotspot-target]').forEach(function (selector) {
        selector.value = nextTargetId;
      });
    }

    function setHotspotVisibility(targetId, visible) {
      const target = getHotspotTargetById(targetId);
      if (!target) {
        return;
      }

      if (visible) {
        target.style.visibility = 'visible';
        target.style.pointerEvents = 'auto';
      } else {
        target.style.visibility = 'hidden';
        target.style.pointerEvents = 'none';
      }
    }

    function adjustHotspotDimension(targetId, property, deltaPx) {
      const target = getHotspotTargetById(targetId);
      if (!target) {
        return;
      }

      const metrics = (property === 'left' || property === 'top')
        ? normalizeTargetLayoutPosition(target)
        : resolveTargetLayoutMetrics(target);
      if (!metrics) {
        return;
      }

      const currentPx = property === 'left' || property === 'top'
        ? metrics[property]
        : parseNumericValue(window.getComputedStyle(target)[property]);
      const nextPx = property === 'width' || property === 'height'
        ? Math.max(1, currentPx + deltaPx)
        : currentPx + deltaPx;
      target.style[property] = `${nextPx}px`;
    }

    function renderHotspotToolMeta() {
      const target = getHotspotTargetById(getSelectedHotspotId());
      const moveMeta = document.getElementById('move-tool-meta');
      const sizeMeta = document.getElementById('size-tool-meta');
      if (!moveMeta || !sizeMeta) {
        return;
      }
      if (!target) {
        moveMeta.textContent = 'No element selected.';
        sizeMeta.textContent = 'No element selected.';
        return;
      }

      const metrics = resolveTargetLayoutMetrics(target);
      if (!metrics) {
        moveMeta.textContent = 'No element selected.';
        sizeMeta.textContent = 'No element selected.';
        return;
      }

      const metaText = `left ${Math.round(metrics.left)} | top ${Math.round(metrics.top)} | w ${Math.round(metrics.width)} | h ${Math.round(metrics.height)} | ${HOTSPOT_TOOL_DRAG_HELP_TEXT}`;
      moveMeta.textContent = metaText;
      sizeMeta.textContent = metaText;
    }

    function renderViewportToolMeta() {
      const viewportMeta = document.getElementById('viewport-tool-meta');
      if (!viewportMeta) {
        return;
      }

      const activeWidth = getCurrentHotspotViewportWidth();
      if (Number.isFinite(activeSimulatedViewportWidth) && activeSimulatedViewportWidth > 0) {
        viewportMeta.textContent = `Simulating ${activeWidth}px viewport. Loading saves from ${getCurrentHotspotLayoutPageKey()}.`;
        return;
      }

      viewportMeta.textContent = `Using ${activeWidth}px viewport slot for current window (${window.innerWidth}px).`;
    }

    function getViewportProbeDisplayName(targetId) {
      const option = document.querySelector(`[data-hotspot-target] option[value="${targetId}"]`);
      return option ? option.textContent : targetId;
    }

    function renderViewportProbeMeta() {
      const viewportLiveMeta = document.getElementById('viewport-tool-live-meta');
      if (!viewportLiveMeta) {
        return;
      }

      if (!Number.isFinite(activeSimulatedViewportWidth) || activeSimulatedViewportWidth <= 0) {
        viewportLiveMeta.textContent = 'Select a viewport to load an accurate live preview.';
        return;
      }

      if (!activeViewportProbeMessage || activeViewportProbeMessage.viewportWidth !== activeSimulatedViewportWidth) {
        viewportLiveMeta.textContent = `Loading real ${activeSimulatedViewportWidth}px viewport metrics…`;
        return;
      }

      const payload = activeViewportProbeMessage;
      const layoutViewport = payload.layoutViewport || {};
      const visualViewport = payload.visualViewport || {};
      const safeArea = payload.safeArea || {};
      const selectedId = getSelectedHotspotId();
      const selectedMeasurement = selectedId && payload.measurements ? payload.measurements[selectedId] : null;
      const selectedSummary = selectedMeasurement
        ? `${getViewportProbeDisplayName(selectedId)} @ ${formatViewportProbeMeasurement(selectedMeasurement)}`
        : 'no element selected';

      viewportLiveMeta.textContent = [
        `real ${layoutViewport.width || '?'}×${layoutViewport.height || '?'} layout`,
        `vv ${visualViewport.width || '?'}×${visualViewport.height || '?'}`,
        `dpr ${payload.devicePixelRatio || '?'}`,
        payload.orientation || 'unknown',
        `safe ${safeArea.top || 0}/${safeArea.right || 0}/${safeArea.bottom || 0}/${safeArea.left || 0}`,
        selectedSummary,
      ].join(' | ');
    }

    function formatViewportProbeMeasurement(measurement) {
      if (!measurement) {
        return 'no element selected';
      }

      return `${measurement.left.toFixed(1)},${measurement.top.toFixed(1)} | ${measurement.width.toFixed(1)}×${measurement.height.toFixed(1)}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function updateViewportProbePreview() {
      const previewShell = document.getElementById('hotspot-viewport-probe-shell');
      const previewEmpty = document.getElementById('hotspot-viewport-probe-empty');
      const previewCanvas = document.getElementById('hotspot-viewport-probe-canvas');
      const previewFrame = document.getElementById('hotspot-viewport-probe-frame');
      if (!previewShell || !previewEmpty || !previewCanvas || !previewFrame) {
        return;
      }

      if (!Number.isFinite(activeSimulatedViewportWidth) || activeSimulatedViewportWidth <= 0) {
        activeViewportProbeMessage = null;
        activeViewportProbeToken = '';
        previewCanvas.classList.remove('is-ready');
        previewCanvas.style.width = '';
        previewCanvas.style.height = '';
        previewFrame.removeAttribute('src');
        previewFrame.style.transform = '';
        previewFrame.style.width = '';
        previewFrame.style.height = '';
        previewEmpty.hidden = false;
        previewEmpty.textContent = 'No accurate preview loaded.';
        renderViewportProbeMeta();
        return;
      }

      const probeToken = `${activeSimulatedViewportWidth}-${Date.now()}`;
      const probeUrl = new URL(window.location.href);
      probeUrl.searchParams.set(HOTSPOT_LAYOUT_PROBE_QUERY_PARAM, '1');
      probeUrl.searchParams.set('viewportProbeToken', probeToken);
      probeUrl.hash = '';

      activeViewportProbeMessage = null;
      activeViewportProbeToken = probeToken;
      previewCanvas.classList.remove('is-ready');
      previewCanvas.style.width = '';
      previewCanvas.style.height = '';
      previewFrame.style.transform = '';
      previewFrame.style.width = `${activeSimulatedViewportWidth}px`;
      previewFrame.style.height = '640px';
      previewFrame.setAttribute('src', probeUrl.toString());
      previewEmpty.hidden = false;
      previewEmpty.textContent = `Loading accurate ${activeSimulatedViewportWidth}px preview…`;
      renderViewportProbeMeta();
    }

    function syncViewportProbePreviewScale() {
      const previewShell = document.getElementById('hotspot-viewport-probe-shell');
      const previewEmpty = document.getElementById('hotspot-viewport-probe-empty');
      const previewCanvas = document.getElementById('hotspot-viewport-probe-canvas');
      const previewFrame = document.getElementById('hotspot-viewport-probe-frame');
      if (!previewShell || !previewEmpty || !previewCanvas || !previewFrame || !activeViewportProbeMessage) {
        return;
      }

      const viewportWidth = activeViewportProbeMessage.viewportWidth;
      const documentHeight = activeViewportProbeMessage.documentHeight;
      if (!Number.isFinite(viewportWidth) || viewportWidth <= 0 || !Number.isFinite(documentHeight) || documentHeight <= 0) {
        return;
      }

      const availableWidth = Math.max(1, previewShell.clientWidth - 12);
      const scale = Math.min(1, availableWidth / viewportWidth);
      previewCanvas.style.width = `${Math.max(1, viewportWidth * scale)}px`;
      previewCanvas.style.height = `${Math.max(1, documentHeight * scale)}px`;
      previewFrame.style.width = `${viewportWidth}px`;
      previewFrame.style.height = `${documentHeight}px`;
      previewFrame.style.transform = `scale(${scale})`;
      previewCanvas.classList.add('is-ready');
      previewEmpty.hidden = true;
    }

    function setupViewportProbeMessaging() {
      if (isLayoutProbeMode) {
        return;
      }

      window.addEventListener('message', function (event) {
        const payload = event.data;
        if (event.origin !== window.location.origin) {
          return;
        }
        if (!payload || payload.type !== 'naimean-layout-probe' || payload.page !== HOTSPOT_LAYOUT_PAGE) {
          return;
        }
        if (payload.token !== activeViewportProbeToken) {
          return;
        }

        activeViewportProbeMessage = payload;
        syncViewportProbePreviewScale();
        renderViewportProbeMeta();
      });

      window.addEventListener('resize', function () {
        syncViewportProbePreviewScale();
      });
    }

    function setupLayoutProbeMode() {
      if (!isLayoutProbeMode || !chapelWrapper) {
        return;
      }

      document.body.classList.add('layout-probe-body');
      const safeAreaProbe = createSafeAreaProbe();
      const overlay = document.createElement('div');
      overlay.className = 'hotspot-viewport-probe-overlay';
      chapelWrapper.appendChild(overlay);

      let measureFrame = 0;

      function getSafeAreaInsets() {
        const computed = window.getComputedStyle(safeAreaProbe);
        return {
          top: parseNumericValue(computed.paddingTop),
          right: parseNumericValue(computed.paddingRight),
          bottom: parseNumericValue(computed.paddingBottom),
          left: parseNumericValue(computed.paddingLeft),
        };
      }

      function measureHotspots() {
        measureFrame = 0;
        const wrapperRect = chapelWrapper.getBoundingClientRect();
        const measurements = {};
        let overlayHtml = '';

        HOTSPOT_IDS.forEach(function (id) {
          const target = document.getElementById(id);
          if (!target) {
            return;
          }

          const rect = target.getBoundingClientRect();
          if (!rect.width && !rect.height) {
            return;
          }

          const measurement = {
            left: rect.left - wrapperRect.left,
            top: rect.top - wrapperRect.top,
            width: rect.width,
            height: rect.height,
          };
          measurements[id] = measurement;
          overlayHtml += `<div class="hotspot-viewport-probe-box" data-hotspot-id="${escapeHtml(id)}" style="left:${measurement.left}px;top:${measurement.top}px;width:${measurement.width}px;height:${measurement.height}px"><span class="hotspot-viewport-probe-label">${escapeHtml(id)}</span></div>`;
        });

        overlay.innerHTML = overlayHtml;
        const visualViewport = window.visualViewport;
        const payload = {
          type: 'naimean-layout-probe',
          page: HOTSPOT_LAYOUT_PAGE,
          token: new URLSearchParams(window.location.search).get('viewportProbeToken') || '',
          viewportWidth: window.innerWidth || document.documentElement.clientWidth || 0,
          layoutViewport: {
            width: window.innerWidth || document.documentElement.clientWidth || 0,
            height: window.innerHeight || document.documentElement.clientHeight || 0,
          },
          visualViewport: visualViewport ? {
            width: Number(visualViewport.width.toFixed(2)),
            height: Number(visualViewport.height.toFixed(2)),
            offsetLeft: Number(visualViewport.offsetLeft.toFixed(2)),
            offsetTop: Number(visualViewport.offsetTop.toFixed(2)),
            pageLeft: Number(visualViewport.pageLeft.toFixed(2)),
            pageTop: Number(visualViewport.pageTop.toFixed(2)),
            scale: Number(visualViewport.scale.toFixed(4)),
          } : null,
          devicePixelRatio: window.devicePixelRatio || 1,
          orientation: (screen.orientation && screen.orientation.type) || (window.innerWidth > window.innerHeight ? 'landscape' : 'portrait'),
          safeArea: getSafeAreaInsets(),
          documentHeight: Math.max(
            document.documentElement.scrollHeight,
            document.documentElement.offsetHeight,
            document.body ? document.body.scrollHeight : 0,
            document.body ? document.body.offsetHeight : 0,
            chapelWrapper.offsetHeight
          ),
          measurements: measurements,
        };

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, window.location.origin);
        }
      }

      function scheduleMeasurement() {
        if (measureFrame) {
          return;
        }
        measureFrame = window.requestAnimationFrame(measureHotspots);
      }

      scheduleMeasurement();
      window.addEventListener('load', scheduleMeasurement);
      window.addEventListener('resize', scheduleMeasurement);
      window.addEventListener('orientationchange', scheduleMeasurement);
      window.addEventListener('scroll', scheduleMeasurement, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', scheduleMeasurement);
        window.visualViewport.addEventListener('scroll', scheduleMeasurement);
      }
      window.setTimeout(scheduleMeasurement, 120);
      window.setTimeout(scheduleMeasurement, 400);
      window.setTimeout(scheduleMeasurement, 900);
    }

    function renderCounterFontToolMeta() {
      const fontMeta = document.getElementById('font-tool-meta');
      if (!fontMeta || !chapelTvCounter) {
        return;
      }

      const fontSizePx = parseNumericValue(window.getComputedStyle(chapelTvCounter).fontSize);
      const fontMode = chapelTvCounter.dataset.layoutFontSizePct ? 'saved override' : 'default/live';
      fontMeta.textContent = `counter ${fontSizePx.toFixed(1)}px | ${fontMode} | viewport ${getCurrentHotspotViewportWidth()}px`;
    }

    function setupHotspotTools() {
      const moveTool = document.getElementById('hotspot-move-tool');
      const sizeTool = document.getElementById('hotspot-size-tool');
      const fontTool = document.getElementById('hotspot-font-tool');
      if (!moveTool || !sizeTool) {
        return;
      }

      captureDefaultLayoutInlineStyles();

      // ── Tool activation ──────────────────────────────────────────────────────
      // Toggle visibility with Ctrl+Shift+H or window.NaimeanLayout.toggle().
      const LAYOUT_TOOLS_KEY = 'naimean-hotspot-tools';
      function isToolsActive() {
        try { return localStorage.getItem(LAYOUT_TOOLS_KEY) === '1'; } catch (_) { return false; }
      }
      function setToolsActive(on) {
        try { on ? localStorage.setItem(LAYOUT_TOOLS_KEY, '1') : localStorage.removeItem(LAYOUT_TOOLS_KEY); } catch (_) {}
        document.body.classList.toggle('hotspot-tools-active', on);
      }
      if (isToolsActive()) {
        document.body.classList.add('hotspot-tools-active');
      }
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.shiftKey && !e.altKey && e.key === 'H') {
          e.preventDefault();
          setToolsActive(!isToolsActive());
        }
      });

      // ── Selected-element dashed highlight ────────────────────────────────────
      let lastHighlightedId = null;
      function updateSelectionHighlight(nextId) {
        if (lastHighlightedId && lastHighlightedId !== nextId) {
          const prev = document.getElementById(lastHighlightedId);
          if (prev) {
            prev.classList.remove('hotspot-selected');
            prev.classList.remove('hotspot-dragging');
          }
        }
        if (nextId) {
          const next = document.getElementById(nextId);
          if (next) { next.classList.add('hotspot-selected'); }
        }
        lastHighlightedId = nextId;
      }

      let activeDrag = null;

      function stopSelectedTargetDrag() {
        if (!activeDrag) {
          return;
        }

        if (activeDrag.target && typeof activeDrag.target.releasePointerCapture === 'function') {
          try {
            activeDrag.target.releasePointerCapture(activeDrag.pointerId);
          } catch (_) {
            // Capture may already be cleared when the browser ends the drag sequence on its own.
          }
          activeDrag.target.classList.remove('hotspot-dragging');
        }
        activeDrag = null;
        renderHotspotToolMeta();
      }

      function shouldInitiateDrag(event, selectedTarget) {
        if (!document.body.classList.contains('hotspot-tools-active') || !event.isPrimary) {
          return false;
        }
        if (event.pointerType === 'mouse' && event.button !== 0) {
          return false;
        }
        if (event.target.closest('.hotspot-tool')) {
          return false;
        }
        return Boolean(selectedTarget && selectedTarget.contains(event.target));
      }

      syncHotspotTargetSelection(HOTSPOT_TOOL_DEFAULT_TARGET);
      updateSelectionHighlight(HOTSPOT_TOOL_DEFAULT_TARGET);
      renderHotspotToolMeta();
      renderViewportToolMeta();
      renderCounterFontToolMeta();

      document.querySelectorAll('[data-hotspot-target]').forEach(function (selector) {
        selector.addEventListener('change', function () {
          stopSelectedTargetDrag();
          syncHotspotTargetSelection(selector.value);
          updateSelectionHighlight(selector.value);
          renderHotspotToolMeta();
          renderViewportProbeMeta();
        });
      });

      document.addEventListener('pointerdown', function (event) {
        const selectedTarget = getHotspotTargetById(getSelectedHotspotId());
        if (!shouldInitiateDrag(event, selectedTarget)) {
          return;
        }

        const metrics = normalizeTargetLayoutPosition(selectedTarget);
        if (!metrics) {
          return;
        }

        activeDrag = {
          pointerId: event.pointerId,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startLeft: metrics.left,
          startTop: metrics.top,
          target: selectedTarget,
        };

        selectedTarget.classList.add('hotspot-dragging');
        if (typeof selectedTarget.setPointerCapture === 'function') {
          try { selectedTarget.setPointerCapture(event.pointerId); } catch (_) {
            // Some elements/browsers can reject capture after the pointerdown target changes.
          }
        }
        event.preventDefault();
      }, true);

      document.addEventListener('pointermove', function (event) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
          return;
        }

        const deltaX = event.clientX - activeDrag.startClientX;
        const deltaY = event.clientY - activeDrag.startClientY;
        activeDrag.target.style.left = `${activeDrag.startLeft + deltaX}px`;
        activeDrag.target.style.top = `${activeDrag.startTop + deltaY}px`;
        renderHotspotToolMeta();
        event.preventDefault();
      }, true);

      document.addEventListener('pointerup', function (event) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
          return;
        }
        event.preventDefault();
        stopSelectedTargetDrag();
      }, true);

      document.addEventListener('pointercancel', function (event) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
          return;
        }
        stopSelectedTargetDrag();
      }, true);

      document.addEventListener('click', function (event) {
        if (!document.body.classList.contains('hotspot-tools-active')) {
          return;
        }

        const selectedTarget = getHotspotTargetById(getSelectedHotspotId());
        if (!selectedTarget || !selectedTarget.contains(event.target)) {
          return;
        }

        // Prevent the layout editor from triggering navigation/audio handlers on the selected target.
        event.preventDefault();
        event.stopPropagation();
      }, true);

      moveTool.querySelectorAll('[data-move-prop]').forEach(function (button) {
        button.addEventListener('click', function () {
          const targetId = getSelectedHotspotId();
          const property = button.getAttribute('data-move-prop');
          const deltaPx = parseNumericValue(button.getAttribute('data-move-step'));
          adjustHotspotDimension(targetId, property, deltaPx);
          renderHotspotToolMeta();
        });
      });

      sizeTool.querySelectorAll('[data-size-prop]').forEach(function (button) {
        button.addEventListener('click', function () {
          const targetId = getSelectedHotspotId();
          const property = button.getAttribute('data-size-prop');
          const deltaPx = parseNumericValue(button.getAttribute('data-size-step'));
          adjustHotspotDimension(targetId, property, deltaPx);
          renderHotspotToolMeta();
        });
      });

      document.querySelectorAll('[data-hotspot-action]').forEach(function (button) {
        button.addEventListener('click', function () {
          const targetId = getSelectedHotspotId();
          const action = button.getAttribute('data-hotspot-action');
          setHotspotVisibility(targetId, action === 'show');
          renderHotspotToolMeta();
        });
      });

      // ── Viewport simulator ───────────────────────────────────────────────────
      const viewportTool = document.getElementById('hotspot-viewport-tool');
      if (viewportTool) {
        let activeViewportBtn = null;
        viewportTool.querySelectorAll('[data-viewport-width]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            const width = btn.getAttribute('data-viewport-width');
            activeSimulatedViewportWidth = parseNumericValue(width);
            document.documentElement.style.setProperty('--simulated-viewport-width', width + 'px');
            document.body.classList.add('viewport-simulated');
            if (activeViewportBtn) { activeViewportBtn.classList.remove('hotspot-viewport-active'); }
            btn.classList.add('hotspot-viewport-active');
            activeViewportBtn = btn;
            renderViewportToolMeta();
            updateViewportProbePreview();
            loadLayoutOverrides();
          });
        });
        const resetBtn = viewportTool.querySelector('[data-viewport-reset]');
        if (resetBtn) {
          resetBtn.addEventListener('click', function () {
            activeSimulatedViewportWidth = null;
            document.documentElement.style.removeProperty('--simulated-viewport-width');
            document.body.classList.remove('viewport-simulated');
            if (activeViewportBtn) { activeViewportBtn.classList.remove('hotspot-viewport-active'); activeViewportBtn = null; }
            renderViewportToolMeta();
            updateViewportProbePreview();
            loadLayoutOverrides();
          });
        }
      }

      if (fontTool) {
        fontTool.querySelectorAll('[data-font-size-step]').forEach(function (button) {
          button.addEventListener('click', function () {
            adjustCounterFontSize(parseNumericValue(button.getAttribute('data-font-size-step')));
            renderCounterFontToolMeta();
          });
        });

        const resetFontBtn = fontTool.querySelector('[data-font-size-reset]');
        if (resetFontBtn) {
          resetFontBtn.addEventListener('click', function () {
            resetCounterFontSize();
            renderCounterFontToolMeta();
          });
        }
      }

      // ── Save button ──────────────────────────────────────────────────────────
      const saveBtn = document.getElementById('hotspot-save-btn');
      const moveMeta = document.getElementById('move-tool-meta');
      if (saveBtn) {
        saveBtn.addEventListener('click', function () {
          const wrapper = chapelWrapper;
          if (!wrapper) { return; }
          const ww = wrapper.offsetWidth;
          const wh = wrapper.offsetHeight;
          if (!ww || !wh) { return; }

          const overrides = {};
          HOTSPOT_IDS.forEach(function (id) {
            const el = document.getElementById(id);
            if (!el) { return; }
            const metrics = resolveTargetLayoutMetrics(el);
            if (!metrics) { return; }
            overrides[id] = {
              top: metrics.top / wh * 100,
              left: metrics.left / ww * 100,
              width: metrics.width / ww * 100,
              height: metrics.height / wh * 100,
            };
            if (id === HOTSPOT_COUNTER_ID) {
              const fontSizePx = parseNumericValue(window.getComputedStyle(el).fontSize);
              if (fontSizePx > 0) {
                overrides[id].fontSizePct = fontSizePx / ww * 100;
              }
            }
          });

          saveBtn.disabled = true;
          saveBtn.textContent = '⏳ Saving…';
          fetch('/layout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ page: getCurrentHotspotLayoutPageKey(), overrides: overrides }),
          }).then(function (res) {
            return res.json().then(function (data) { return { ok: res.ok, data: data }; });
          }).then(function (result) {
            saveBtn.disabled = false;
            if (result.ok) {
              saveBtn.textContent = '✓ Saved!';
              if (moveMeta) { moveMeta.textContent = 'Saved ' + (result.data.saved || 0) + ' elements for ' + getCurrentHotspotViewportWidth() + 'px viewport.'; }
            } else if (result.data && result.data.error === 'Unauthorized') {
              saveBtn.textContent = '💾 Save all';
              if (moveMeta) { moveMeta.textContent = 'Login required — use C:\\Naimean\\login first.'; }
            } else {
              saveBtn.textContent = '✗ Error';
              if (moveMeta) { moveMeta.textContent = 'Save failed: ' + ((result.data && result.data.error) || 'unknown error'); }
            }
            setTimeout(function () { saveBtn.textContent = '💾 Save all'; }, 3000);
          }).catch(function () {
            saveBtn.disabled = false;
            saveBtn.textContent = '✗ Error';
            setTimeout(function () { saveBtn.textContent = '💾 Save all'; }, 3000);
          });
        });
      }

      window.addEventListener('resize', function () {
        if (document.body.classList.contains('viewport-simulated')) {
          syncViewportProbePreviewScale();
          return;
        }
        renderViewportToolMeta();
        renderViewportProbeMeta();
        applyResponsiveLayoutFontOverrides();
        renderCounterFontToolMeta();
      });
    }

    // ── Load saved layout overrides from server on page init ─────────────────────
    function applyLayoutOverrides(overrides) {
      if (!overrides || typeof overrides !== 'object') { return; }
      Object.keys(overrides).forEach(function (id) {
        const el = document.getElementById(id);
        if (!el) { return; }
        const dims = overrides[id];
        // Only apply finite numeric values to prevent injection from corrupted server data.
        if (typeof dims.top === 'number' && Number.isFinite(dims.top)) { el.style.top = dims.top + '%'; }
        if (typeof dims.left === 'number' && Number.isFinite(dims.left)) { el.style.left = dims.left + '%'; }
        if (typeof dims.width === 'number' && Number.isFinite(dims.width)) { el.style.width = dims.width + '%'; }
        if (typeof dims.height === 'number' && Number.isFinite(dims.height)) { el.style.height = dims.height + '%'; }
        if (id === HOTSPOT_COUNTER_ID) {
          if (typeof dims.fontSizePct === 'number' && Number.isFinite(dims.fontSizePct) && dims.fontSizePct > 0) {
            el.dataset.layoutFontSizePct = String(dims.fontSizePct);
          } else {
            delete el.dataset.layoutFontSizePct;
            el.style.removeProperty('font-size');
          }
        }
      });
      applyResponsiveLayoutFontOverrides();
    }

    function loadLayoutOverrides() {
      const requestId = ++activeLayoutLoadRequestId;
      const primaryPageKey = getCurrentHotspotLayoutPageKey();
      // Preserve legacy saved layouts by falling back to the unscoped page key
      // when no viewport-specific slot has been saved yet.
      const fallbackPageKeys = [primaryPageKey, HOTSPOT_LAYOUT_PAGE];

      fallbackPageKeys.reduce(function (promise, pageKey) {
        return promise.then(function (match) {
          if (match) {
            return match;
          }

          return fetch('/layout?page=' + encodeURIComponent(pageKey), { credentials: 'same-origin' })
            .then(function (res) { return res.ok ? res.json() : null; })
            .then(function (data) {
              const overrides = data && data.overrides ? data.overrides : null;
              if (overrides && Object.keys(overrides).length > 0) {
                return {
                  pageKey: pageKey,
                  overrides: overrides,
                };
              }
              return null;
            })
            .catch(function () {
              return null;
            });
        });
      }, Promise.resolve(null))
        .then(function (match) {
          if (requestId !== activeLayoutLoadRequestId) {
            return;
          }

          restoreDefaultLayoutInlineStyles();
          if (match) {
            applyLayoutOverrides(match.overrides);
          }
          renderHotspotToolMeta();
          renderViewportToolMeta();
          renderViewportProbeMeta();
          renderCounterFontToolMeta();
        })
        .catch(function () {});
    }

    // ── Public API ───────────────────────────────────────────────────────────────
    window.NaimeanLayout = {
      toggle: function () {
        const isActive = document.body.classList.contains('hotspot-tools-active');
        document.body.classList.toggle('hotspot-tools-active', !isActive);
        try { !isActive ? localStorage.setItem('naimean-hotspot-tools', '1') : localStorage.removeItem('naimean-hotspot-tools'); } catch (_) {}
      },
    };

    function setTransRickVisibility(isVisible) {
      if (!chapelTransRick) {
        return;
      }

      chapelTransRick.hidden = !isVisible;
      chapelTransRick.classList.toggle('is-visible', isVisible);
    }

    function clampValue(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function ensureTorchBloomSampleContext() {
      if (!chapelImage || !chapelImage.naturalWidth || !chapelImage.naturalHeight) {
        return null;
      }

      if (!torchBloomSampleCanvas) {
        torchBloomSampleCanvas = document.createElement('canvas');
        torchBloomSampleContext = torchBloomSampleCanvas.getContext('2d', { willReadFrequently: true });
      }

      if (!torchBloomSampleContext) {
        return null;
      }

      if (torchBloomSampleCanvas.width !== chapelImage.naturalWidth || torchBloomSampleCanvas.height !== chapelImage.naturalHeight) {
        torchBloomSampleCanvas.width = chapelImage.naturalWidth;
        torchBloomSampleCanvas.height = chapelImage.naturalHeight;
      }

      torchBloomSampleContext.clearRect(0, 0, torchBloomSampleCanvas.width, torchBloomSampleCanvas.height);
      torchBloomSampleContext.drawImage(chapelImage, 0, 0, torchBloomSampleCanvas.width, torchBloomSampleCanvas.height);
      return torchBloomSampleContext;
    }

    function updateTorchBloomIntensityFromImage() {
      if (!chapelImage || !torchBlooms.length || !chapelImage.complete) {
        return;
      }

      const context = ensureTorchBloomSampleContext();
      if (!context) {
        return;
      }

      const imageRect = chapelImage.getBoundingClientRect();
      if (!imageRect.width || !imageRect.height) {
        return;
      }

      const maxX = chapelImage.naturalWidth - 1;
      const maxY = chapelImage.naturalHeight - 1;

      torchBlooms.forEach(function (bloom) {
        const bloomRect = bloom.getBoundingClientRect();
        const centerX = bloomRect.left + (bloomRect.width / 2);
        const centerY = bloomRect.top + (bloomRect.height / 2);
        const normalizedX = clampValue((centerX - imageRect.left) / imageRect.width, 0, 1);
        const normalizedY = clampValue((centerY - imageRect.top) / imageRect.height, 0, 1);
        const sampleX = Math.round(normalizedX * maxX);
        const sampleY = Math.round(normalizedY * maxY);
        const sample = context.getImageData(sampleX, sampleY, 1, 1).data;
        const luminance = ((LUMINANCE_RED_WEIGHT * sample[0]) + (LUMINANCE_GREEN_WEIGHT * sample[1]) + (LUMINANCE_BLUE_WEIGHT * sample[2])) / 255;
        const intensity = clampValue(BLOOM_BASE_INTENSITY + (luminance * BLOOM_LUMINANCE_MULTIPLIER), BLOOM_MIN_INTENSITY, BLOOM_MAX_INTENSITY);
        bloom.style.setProperty('--torch-bloom-intensity', intensity.toFixed(3));
      });
    }

    function bindTorchBloomIntensityUpdates() {
      if (!chapelImage || !torchBlooms.length || torchBloomIntensityBound) {
        return;
      }

      torchBloomIntensityBound = true;
      let resizeTimer = null;
      function scheduleUpdate() {
        window.requestAnimationFrame(updateTorchBloomIntensityFromImage);
      }

      chapelImage.addEventListener('load', scheduleUpdate);
      window.addEventListener('resize', function () {
        if (resizeTimer !== null) {
          clearTimeout(resizeTimer);
        }
        resizeTimer = setTimeout(scheduleUpdate, BLOOM_RESIZE_DEBOUNCE_MS);
      });
      window.addEventListener('orientationchange', scheduleUpdate);
      scheduleUpdate();
    }


    function buildRickrollApiUrls(pathname) {
      const candidates = [];
      try {
        if (window.location && window.location.origin) {
          candidates.push(new URL(pathname, window.location.origin).toString());
        }
      } catch (_) {}
      candidates.push(`${LEGACY_RICKROLL_COUNTER_BASE_URL}${pathname}`);
      const urls = Array.from(new Set(candidates));
      if (window.NaimeanDiag) {
        window.NaimeanDiag.log('endpoints ' + pathname + ': ' + urls.join(', '));
      }
      return urls;
    }

    const RICKROLL_COUNT_API_URLS = buildRickrollApiUrls('/get');

    function appendNoCacheParam(url) {
      try {
        const requestUrl = new URL(url);
        requestUrl.searchParams.set('t', `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`);
        return requestUrl.toString();
      } catch (_) {
        return url;
      }
    }

    function readLocalRickrollCount() {
      try {
        const rawValue = window.localStorage.getItem(LOCAL_RICKROLL_COUNT_KEY);
        const parsedCount = Number(rawValue);
        if (Number.isFinite(parsedCount) && parsedCount >= 0) {
          return Math.floor(parsedCount);
        }
      } catch (_) {}
      return 0;
    }

    function writeLocalRickrollCount(count) {
      if (!Number.isFinite(count) || count < 0) {
        return;
      }

      try {
        window.localStorage.setItem(LOCAL_RICKROLL_COUNT_KEY, String(Math.floor(count)));
      } catch (_) {}
    }

    function normalizeRickrollCount(value) {
      const parsedCount = Number(value);
      if (!Number.isFinite(parsedCount) || parsedCount < 0) {
        return null;
      }
      return Math.floor(parsedCount);
    }

    async function fetchRickrollCount(urls) {
      const candidateUrls = Array.isArray(urls) ? urls : [urls];
      let lastError = null;

      for (const candidateUrl of candidateUrls) {
        const requestUrl = appendNoCacheParam(candidateUrl);
        if (window.NaimeanDiag) { window.NaimeanDiag.log('try: ' + requestUrl); }
        try {
          const response = await fetch(requestUrl, {
            method: 'GET',
            cache: 'no-store'
          });
          if (!response.ok) {
            if (window.NaimeanDiag) { window.NaimeanDiag.log('fail(' + response.status + '): ' + requestUrl); }
            throw new Error('Failed to fetch rickroll count');
          }

          const responseText = await response.text();
          let remoteCount = normalizeRickrollCount(responseText);
          if (remoteCount === null) {
            try {
              const payload = JSON.parse(responseText);
              remoteCount = normalizeRickrollCount(payload && payload.value);
            } catch (_) {}
          }
          if (remoteCount === null) {
            if (window.NaimeanDiag) { window.NaimeanDiag.log('invalid payload: ' + requestUrl); }
            throw new Error('Received invalid rickroll count');
          }

          if (window.NaimeanDiag) { window.NaimeanDiag.log('ok: ' + requestUrl + ' \u2192 ' + remoteCount); }
          return remoteCount;
        } catch (err) {
          lastError = err;
        }
      }

      throw new Error(`All rickroll count endpoints failed${lastError && lastError.message ? `: ${lastError.message}` : ''}`);
    }

    async function renderRickrollCount() {
      if (!chapelTvCounter) {
        return;
      }

      const localCount = readLocalRickrollCount();
      chapelTvCounter.textContent = localCount > 0 ? String(localCount).padStart(2, '0') : '--';
      if (window.NaimeanDiag) {
        window.NaimeanDiag.set('local count', localCount);
        window.NaimeanDiag.set('count src', localCount > 0 ? 'local' : 'pending remote');
      }

      try {
        const remoteCount = await fetchRickrollCount(RICKROLL_COUNT_API_URLS);
        const nextCount = remoteCount;
        writeLocalRickrollCount(nextCount);
        chapelTvCounter.textContent = String(nextCount).padStart(2, '0');
        if (window.NaimeanDiag) {
          window.NaimeanDiag.set('remote count', nextCount);
          window.NaimeanDiag.set('count src', 'remote');
          window.NaimeanDiag.set('local count', nextCount);
        }
      } catch (_) {
        if (window.NaimeanDiag) { window.NaimeanDiag.set('count src', 'local (fallback)'); }
      }
    }

    function clearRockRollContinuationState() {
      rockRollContinuationPending = false;
      rockRollContinuationPlaybackState = null;

      try {
        window.sessionStorage.removeItem(ROCK_ROLL_CONTINUATION_KEY);
        window.sessionStorage.removeItem(ROCK_ROLL_CONTINUATION_PENDING_KEY);
      } catch (_) {}
    }

    function consumeDiscordInviteRedirectPending() {
      try {
        const isPending = window.sessionStorage.getItem(DISCORD_INVITE_REDIRECT_PENDING_KEY) === '1';
        window.sessionStorage.removeItem(DISCORD_INVITE_REDIRECT_PENDING_KEY);
        return isPending;
      } catch (_) {
        return false;
      }
    }

    async function resolveDiscordInviteUrl() {
      let controller = null;
      if (typeof AbortController === 'function') {
        try {
          controller = new AbortController();
        } catch (_) {
          controller = null;
        }
      }

      let timeoutId = null;
      if (controller) {
        timeoutId = setTimeout(() => {
          controller.abort();
        }, DISCORD_INVITE_RESOLVE_TIMEOUT_MS);
      }

      try {
        const response = await fetch(DISCORD_WIDGET_API_URL, {
          method: 'GET',
          cache: 'no-store',
          signal: controller ? controller.signal : undefined
        });

        if (!response.ok) {
          return null;
        }

        const payload = await response.json();
        const instantInvite = typeof payload?.instant_invite === 'string'
          ? payload.instant_invite.trim()
          : '';
        return instantInvite || null;
      } catch (_) {
        return null;
      } finally {
        if (timeoutId) {
          clearTimeout(timeoutId);
        }
      }
    }

    async function launchDiscordInviteFromRedirectIfNeeded() {
      if (!consumeDiscordInviteRedirectPending()) {
        return;
      }

      setTimeout(async function () {
        const inviteUrl = await resolveDiscordInviteUrl();
        if (inviteUrl) {
          window.open(inviteUrl, '_blank', 'noopener,noreferrer');
        }
      }, DISCORD_INVITE_LAUNCH_DELAY_MS);
    }

    function consumeRockRollContinuation() {
      try {
        rockRollContinuationPending = window.sessionStorage.getItem(ROCK_ROLL_CONTINUATION_PENDING_KEY) === '1';
        const raw = window.sessionStorage.getItem(ROCK_ROLL_CONTINUATION_KEY);
        if (!raw) {
          rockRollContinuationPending = false;
          return null;
        }

        const parsed = JSON.parse(raw);
        if (!parsed || !Number.isFinite(parsed.currentTime) || parsed.currentTime < 0) {
          clearRockRollContinuationState();
          return null;
        }

        return parsed;
      } catch (_) {
        clearRockRollContinuationState();
        return null;
      }
    }

    function getRockRollContinuationStartVolume(playbackState) {
      const sourceVolume = playbackState && Number.isFinite(playbackState.volume)
        ? playbackState.volume
        : 1;

      return Math.max(0, Math.min(1, sourceVolume * ROCK_ROLL_START_VOLUME_FACTOR));
    }

    function bindRockRollContinuationRetry() {
      if (rockRollContinuationRetryBound) {
        return;
      }

      rockRollContinuationRetryBound = true;

      function handleFirstInteraction() {
        rockRollContinuationRetryBound = false;
        document.removeEventListener('pointerdown', handleFirstInteraction);
        document.removeEventListener('keydown', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);

        if (rockRollContinuationPlaybackState) {
          startRockRollContinuation(rockRollContinuationPlaybackState);
          return;
        }

        startCongregationAudio();
      }

      document.addEventListener('pointerdown', handleFirstInteraction);
      document.addEventListener('keydown', handleFirstInteraction);
      document.addEventListener('touchstart', handleFirstInteraction);
    }

    function finishRockRollContinuation() {
      rockRollContinuationActive = false;
      clearRockRollContinuationState();

      if (isNavigatingFromChapel) {
        return;
      }

      startCongregationAudio();
    }

    function startRockRollContinuation(playbackState) {
      setTransRickVisibility(Boolean(playbackState));

      if (!playbackState || !rockRollContinuationMedia) {
        clearRockRollContinuationState();
        return;
      }

      rockRollContinuationPending = true;
      rockRollContinuationPlaybackState = playbackState;
      rockRollContinuationActive = true;
      const startVolume = getRockRollContinuationStartVolume(playbackState);
      rockRollContinuationMedia.pause();
      rockRollContinuationMedia.preload = 'auto';
      rockRollContinuationMedia.muted = true;
      rockRollContinuationMedia.volume = 0;

      const applyPlaybackPosition = function () {
        try {
          rockRollContinuationMedia.currentTime = playbackState.currentTime;
        } catch (_) {}
      };

      if (rockRollContinuationMedia.readyState > 0) {
        applyPlaybackPosition();
      } else {
        rockRollContinuationMedia.addEventListener('loadedmetadata', applyPlaybackPosition, { once: true });
      }

      const playPromise = rockRollContinuationMedia.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {
          rockRollContinuationActive = false;
          bindRockRollContinuationRetry();
        });
        playPromise.then(function () {
          rockRollContinuationMedia.muted = false;
          rockRollContinuationMedia.volume = startVolume;
        });
      } else {
        rockRollContinuationMedia.muted = false;
        rockRollContinuationMedia.volume = startVolume;
      }

      const fadeStart = performance.now();
      function fadeStep(now) {
        if (!rockRollContinuationMedia || !rockRollContinuationActive) {
          return;
        }

        const elapsed = now - fadeStart;
        const fadeElapsed = Math.max(0, elapsed - ROCK_ROLL_START_DELAY_MS);
        const progress = Math.min(fadeElapsed / ROCK_ROLL_FADE_DURATION_MS, 1);
        const nextVolume = startVolume * (1 - progress);
        rockRollContinuationMedia.volume = Math.max(0, nextVolume);

        if (progress >= 1) {
          rockRollContinuationMedia.pause();
          rockRollContinuationMedia.volume = 0;
          finishRockRollContinuation();
          return;
        }

        requestAnimationFrame(fadeStep);
      }

      requestAnimationFrame(fadeStep);
    }

    renderRickrollCount();
    startRockRollContinuation(consumeRockRollContinuation());
    bindTorchBloomIntensityUpdates();

    // Fallback reveal in case full window load is delayed by media/network activity.
    const LOAD_REVEAL_FALLBACK_MS = 1200;

    function revealPage() {
      if (document.body.classList.contains('loaded')) {
        return;
      }
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
      }, { once: true });
    } else {
      window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
    }

    function playDoorOpeningSound() {
      const audioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!audioContextCtor) {
        return;
      }

      const ctx = new audioContextCtor();
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.22, now);
      master.connect(ctx.destination);

      function scheduleTone(type, startFreq, endFreq, startOffset, duration, peakGain) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        const startTime = now + startOffset;
        const endTime = startTime + duration;

        osc.type = type;
        osc.frequency.setValueAtTime(startFreq, startTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, endTime);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1800, startTime);
        filter.frequency.exponentialRampToValueAtTime(420, endTime);
        filter.Q.setValueAtTime(0.8, startTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        osc.start(startTime);
        osc.stop(endTime + 0.02);
      }

      function scheduleNoiseBurst(startOffset, duration, peakGain) {
        const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
        const channel = buffer.getChannelData(0);
        for (let i = 0; i < channel.length; i += 1) {
          channel[i] = (Math.random() * 2 - 1) * (1 - (i / channel.length));
        }

        const source = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        const startTime = now + startOffset;
        const endTime = startTime + duration;

        source.buffer = buffer;
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(760, startTime);
        filter.Q.setValueAtTime(1.3, startTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        source.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        source.start(startTime);
        source.stop(endTime + 0.01);
      }

      scheduleTone('sawtooth', 230, 92, 0, 0.56, 0.11);
      scheduleTone('triangle', 165, 88, 0.03, 0.46, 0.07);
      scheduleTone('sine', 78, 52, 0.18, 0.24, 0.09);
      scheduleNoiseBurst(0.01, 0.19, 0.08);

      setTimeout(function () {
        ctx.close();
      }, 1000);
    }

    function startCongregationAudio() {
      if (rockRollContinuationPending || rockRollContinuationPlaybackState) {
        return;
      }

      if (rockRollContinuationActive) {
        return;
      }

      if (congregationStarted) {
        return;
      }

      congregationStarted = true;
      congregationAudio.currentTime = 0;

      var playPromise = congregationAudio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {
          congregationStarted = false;
        });
      }
    }

    function bindCongregationFallback() {
      function handleFirstInteraction() {
        if (rockRollContinuationPending || rockRollContinuationPlaybackState) {
          return;
        }

        startCongregationAudio();
        document.removeEventListener('pointerdown', handleFirstInteraction);
        document.removeEventListener('keydown', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);
      }

      document.addEventListener('pointerdown', handleFirstInteraction);
      document.addEventListener('keydown', handleFirstInteraction);
      document.addEventListener('touchstart', handleFirstInteraction);
    }

    function scrollToCurrentStartPoint() {
      if (!chapelWrapper) {
        var fallbackTarget = document.body.scrollHeight - window.innerHeight;
        window.scrollTo(0, fallbackTarget);
        return;
      }

      // Preserve the pre-stitch floor start at the top edge of the stitched extension.
      const stitchTop = chapelWrapper.offsetTop + (chapelWrapper.offsetHeight * ORIGINAL_CHAPEL_HEIGHT_RATIO);
      const target = Math.max(0, stitchTop - window.innerHeight);
      window.scrollTo(0, target);
    }

    window.addEventListener('load', function () {
      if (!isLayoutProbeMode) {
        scrollToCurrentStartPoint();
        // Retry a few times in case layout shifts as images decode on mobile
        setTimeout(scrollToCurrentStartPoint, 100);
        setTimeout(scrollToCurrentStartPoint, 300);
        launchDiscordInviteFromRedirectIfNeeded();
      }
      setTimeout(function () {
        if (!isLayoutProbeMode) {
          scrollToCurrentStartPoint();
          startCongregationAudio();
          bindCongregationFallback();
        }
        revealPage();
      }, 500);
    });

    const TRAPDOOR_DESTINATION_PATH = '/bedroom_antechamber.html';
    const DISCORD_AUTH_GATE_URL = '/auth/discord/login?returnTo=' + encodeURIComponent(TRAPDOOR_DESTINATION_PATH);
    const FADE_TRANSITION_DURATION_MS = 900;

    function isDiscordAuthSession(session) {
      return Boolean(session && session.authenticated && session.user && session.user.provider === 'discord');
    }

    async function getLatestAuthSession() {
      if (window.NaimeanAuth && typeof window.NaimeanAuth.refreshSession === 'function') {
        return window.NaimeanAuth.refreshSession();
      }

      try {
        const response = await fetch('/auth/session', {
          method: 'GET',
          credentials: 'same-origin',
          cache: 'no-store',
          headers: { 'Accept': 'application/json' },
        });
        if (!response.ok) {
          return { authenticated: false, user: null };
        }
        const payload = await response.json();
        return {
          authenticated: Boolean(payload && payload.authenticated),
          user: payload && payload.user ? payload.user : null,
        };
      } catch (_) {
        return { authenticated: false, user: null };
      }
    }

    async function requestDiscordAuthSession() {
      if (window.NaimeanAuth && typeof window.NaimeanAuth.requireDiscordAuth === 'function') {
        const result = await window.NaimeanAuth.requireDiscordAuth({ returnToPath: TRAPDOOR_DESTINATION_PATH });
        return result && result.session ? result.session : { authenticated: false, user: null };
      }
      window.location.assign(DISCORD_AUTH_GATE_URL);
      return { authenticated: false, user: null };
    }

    function playWrongAuthSound() {
      return new Promise((resolve) => {
        if (!wrongAudio) {
          resolve();
          return;
        }
        let finished = false;
        const finish = () => {
          if (finished) {
            return;
          }
          finished = true;
          resolve();
        };
        wrongAudio.currentTime = 0;
        wrongAudio.addEventListener('ended', finish, { once: true });
        wrongAudio.addEventListener('error', finish, { once: true });
        wrongAudio.play().catch(finish);
        setTimeout(finish, 6000);
      });
    }

    function proceedToTrapdoorDestination() {
      clearSauceDripTimer();
      playDoorOpeningSound();
      congregationAudio.pause();
      if (rockRollContinuationMedia) {
        rockRollContinuationMedia.pause();
      }
      const overlay = document.getElementById('fade-overlay');
      overlay.classList.add('fading');
      setTimeout(function () {
        window.location.assign(TRAPDOOR_DESTINATION_PATH);
      }, FADE_TRANSITION_DURATION_MS);
    }

    function navigateToSite() {
      if (isNavigatingFromChapel) {
        return;
      }
      isNavigatingFromChapel = true;

      getLatestAuthSession()
        .then(function (session) {
          if (isDiscordAuthSession(session)) {
            proceedToTrapdoorDestination();
            return;
          }

          return playWrongAuthSound().then(function () {
            return requestDiscordAuthSession();
          }).then(function (resultSession) {
            if (isDiscordAuthSession(resultSession)) {
              proceedToTrapdoorDestination();
              return;
            }
            isNavigatingFromChapel = false;
          });
        })
        .catch(function () {
          isNavigatingFromChapel = false;
        });
    }

    function navigateBackToIndex() {
      if (isNavigatingFromChapel) {
        return;
      }
      isNavigatingFromChapel = true;
      clearSauceDripTimer();
      try {
        window.sessionStorage.setItem(INDEX_FADE_IN_KEY, '1');
      } catch (_) {}

      congregationAudio.pause();
      if (rockRollContinuationMedia) {
        rockRollContinuationMedia.pause();
      }
      const overlay = document.getElementById('fade-overlay');
      overlay.classList.add('fading');
      setTimeout(function () {
        window.location.assign('index.html');
      }, 900);
    }

    if (!isLayoutProbeMode) {
      document.getElementById('chapel-return-btn').addEventListener('click', navigateBackToIndex);
    }
    setupViewportProbeMessaging();
    setupLayoutProbeMode();
    setupHotspotTools();
    loadLayoutOverrides();
    scheduleNextSauceDrip();

    function playHotspotAudio(audioElement) {
      if (!audioElement) {
        return;
      }

      audioElement.currentTime = 0;
      const playPromise = audioElement.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {});
      }
    }

    // Invisible congregation button clicks → audio files
    document.getElementById('trapdoor-btn').addEventListener('click', navigateToSite);
    [
      ['crusty-button', document.getElementById('congregation-audio-crusty')],
      ['goose-button', document.getElementById('congregation-audio-goose')],
      ['morty-button', document.getElementById('congregation-audio-morty')],
      ['rick-button', document.getElementById('congregation-audio-rick')]
    ].forEach(function ([buttonId, audioElement]) {
      document.getElementById(buttonId).addEventListener('click', function () { playHotspotAudio(audioElement); });
    });

    // Enter key → same behavior
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter' || e.repeat || !document.body.classList.contains('loaded')) {
        return;
      }

      navigateToSite();
    });
  </script>
