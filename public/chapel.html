<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chapel</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #000;
      /* enable smooth momentum scrolling on iOS */
      -webkit-overflow-scrolling: touch;
    }

    body {
      background: #000;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 1s ease;
    }

    body.loaded {
      opacity: 1;
    }

    .chapel-outer {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .chapel-wrapper {
      position: relative;
      width: 100%;
    }

    .chapel-stitch {
      width: 100%;
    }

    /* Very subtle seam harmonizer to avoid introducing a visible dark band. */
    .chapel-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(to bottom,
        transparent 37.9%,
        rgba(0, 0, 0, 0.02) 39.0%,
        rgba(0, 0, 0, 0.05) 40.0%,
        rgba(0, 0, 0, 0.02) 41.0%,
        transparent 42.1%
      );
    }

    .chapel-img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Pulsing power button — positioned over the C64's power button on the altar */
    .chapel-power-btn {
      position: absolute;
      left: 53.9%;
      top: 58.36%;
      width: 1.1%;
      aspect-ratio: 1;
      background: #1ed760;
      border: 1.5px solid #1ed760;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9;
      pointer-events: none;
      box-shadow: 0 0 6px #000a;
    }

    .chapel-power-light {
      width: 55%;
      height: 55%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347 60%, #ff6600 100%);
      box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff;
      display: block;
      animation: chapel-power-pulse 1.6s infinite ease-in-out;
    }

    @keyframes chapel-power-pulse {
      0%   { box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff; filter: brightness(1); }
      50%  { box-shadow: 0 0 14px 6px #ff6600, 0 0 2px 1px #fff; filter: brightness(1.18); }
      100% { box-shadow: 0 0 8px 3px #ff6600, 0 0 2px 1px #fff; filter: brightness(1); }
    }

    /* Invisible hotspot over the chapel computer screen to return to index. */
    .chapel-return-btn {
      position: absolute;
      left: 44.6%;
      top: 52.0%;
      width: 12%;
      height: 7%;
      background: transparent;
      opacity: 0;
      pointer-events: auto;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .chapel-tv-counter {
      position: absolute;
      right: calc(45.2% + 6px);
      top: calc(53.55% + 34px);
      min-width: 1.8ch;
      min-height: 2.2%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      z-index: 8;
      color: #ffffff;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: clamp(6px, 0.76vw, 9px);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-align: right;
      text-shadow: 0 0 3px rgba(150, 210, 255, 0.85);
      white-space: nowrap;
    }

    @media (min-width: 900px) {
      /* Desktop-only requested offset: hitbox moved 10px left and 30px down. */
      .chapel-return-btn {
        left: calc(46.4% - 10px);
        top: calc(53.2% + 30px);
      }

      /* Desktop tweak: shift counter further left and down from base placement. */
      .chapel-tv-counter {
        right: calc(45.2% + 6px + 11px);
        top: calc(53.55% + 34px + 52px);
      }
    }

    /* Invisible hotspot over the trap door square area. */
    .trapdoor-btn {
      position: absolute;
      left: 33%;
      top: 77%;
      width: 34%;
      height: 16%;
      background: transparent;
      opacity: 0;
      pointer-events: auto;
      border: none;
      cursor: pointer;
      z-index: 10;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Page transition fade overlay */
    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 100;
    }

    .fade-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="fade-overlay" id="fade-overlay"></div>
  <audio id="congregation-audio" src="assets/congregation.mp3" preload="auto"></audio>
  <video id="rock-roll-continuation-media" src="assets/notarickroll.mp4" playsinline preload="auto" style="display:none" aria-hidden="true"></video>

  <div class="chapel-outer">
    <div class="chapel-wrapper">
      <img src="assets/chapel_stacked.png" alt="The Chapel" class="chapel-img" />
      <div class="chapel-power-btn" aria-hidden="true">
        <span class="chapel-power-light"></span>
      </div>
      <div class="chapel-tv-counter" id="chapel-tv-counter" aria-live="polite">01</div>
      <button class="chapel-return-btn" id="chapel-return-btn" aria-label="Return to home"></button>
      <button class="trapdoor-btn" id="trapdoor-btn" aria-label="Enter the descent"></button>
    </div>
  </div>

  <script src="diagnostics.js"></script>
  <script>
    // Robust scroll to bottom — retry until images are painted (fixes mobile)
    // Source image heights in pixels, measured from tracked assets:
    // - 2529px: pre-stitch assets/chapel_stacked.png height
    // - 3709px: current stitched assets/chapel_stacked.png height
    // Their ratio marks the stitch boundary used for the initial floor anchor.
    const ORIGINAL_CHAPEL_HEIGHT = 2529;
    const STITCHED_CHAPEL_HEIGHT = 3709;
    const ORIGINAL_CHAPEL_HEIGHT_RATIO = ORIGINAL_CHAPEL_HEIGHT / STITCHED_CHAPEL_HEIGHT;

    const congregationAudio = document.getElementById('congregation-audio');
    const rockRollContinuationMedia = document.getElementById('rock-roll-continuation-media');
    const chapelTvCounter = document.getElementById('chapel-tv-counter');
    congregationAudio.volume = 0.04;
    const ROCK_ROLL_CONTINUATION_KEY = 'naimean-rock-roll-continuation';
    const ROCK_ROLL_CONTINUATION_PENDING_KEY = 'naimean-rock-roll-continuation-pending';
    const DISCORD_INVITE_REDIRECT_PENDING_KEY = 'naimean-discord-invite-redirect-pending';
    const DISCORD_WIDGET_ID = '1487898909224341534';
    const DISCORD_WIDGET_API_URL = `https://discord.com/api/guilds/${DISCORD_WIDGET_ID}/widget.json`;
    const DISCORD_INVITE_RESOLVE_TIMEOUT_MS = 2000;
    const DISCORD_INVITE_LAUNCH_DELAY_MS = 1000;
    const LOCAL_RICKROLL_COUNT_KEY = 'naimean-rickroll-count-fallback';
    const LEGACY_RICKROLL_COUNTER_BASE_URL = 'https://barrelrollcounter-worker.naimean.workers.dev';
    const INDEX_FADE_IN_KEY = 'naimean-index-fade-in';
    const ROCK_ROLL_START_VOLUME_FACTOR = 0.5;
    const ROCK_ROLL_START_DELAY_MS = 2000;
    const ROCK_ROLL_FADE_DURATION_MS = 5000;
    let congregationStarted = false;
    let isNavigatingFromChapel = false;
    let rockRollContinuationActive = false;
    let rockRollContinuationPlaybackState = null;
    let rockRollContinuationRetryBound = false;
    let rockRollContinuationPending = false;

    function buildRickrollApiUrls(pathname) {
      const candidates = [];
      try {
        if (window.location && window.location.origin) {
          candidates.push(new URL(pathname, window.location.origin).toString());
        }
      } catch (_) {}
      candidates.push(`${LEGACY_RICKROLL_COUNTER_BASE_URL}${pathname}`);
      const urls = Array.from(new Set(candidates));
      if (window.NaimeanDiag) {
        window.NaimeanDiag.log('endpoints ' + pathname + ': ' + urls.join(', '));
      }
      return urls;
    }

    const RICKROLL_COUNT_API_URLS = buildRickrollApiUrls('/get');

    function appendNoCacheParam(url) {
      try {
        const requestUrl = new URL(url);
        requestUrl.searchParams.set('t', `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`);
        return requestUrl.toString();
      } catch (_) {
        return url;
      }
    }

    function readLocalRickrollCount() {
      try {
        const rawValue = window.localStorage.getItem(LOCAL_RICKROLL_COUNT_KEY);
        const parsedCount = Number(rawValue);
        if (Number.isFinite(parsedCount) && parsedCount >= 0) {
          return Math.floor(parsedCount);
        }
      } catch (_) {}
      return 0;
    }

    function writeLocalRickrollCount(count) {
      if (!Number.isFinite(count) || count < 0) {
        return;
      }

      try {
        window.localStorage.setItem(LOCAL_RICKROLL_COUNT_KEY, String(Math.floor(count)));
      } catch (_) {}
    }

    function normalizeRickrollCount(value) {
      const parsedCount = Number(value);
      if (!Number.isFinite(parsedCount) || parsedCount < 0) {
        return null;
      }
      return Math.floor(parsedCount);
    }

    async function fetchRickrollCount(urls) {
      const candidateUrls = Array.isArray(urls) ? urls : [urls];
      let lastError = null;

      for (const candidateUrl of candidateUrls) {
        const requestUrl = appendNoCacheParam(candidateUrl);
        if (window.NaimeanDiag) { window.NaimeanDiag.log('try: ' + requestUrl); }
        try {
          const response = await fetch(requestUrl, {
            method: 'GET',
            cache: 'no-store'
          });
          if (!response.ok) {
            if (window.NaimeanDiag) { window.NaimeanDiag.log('fail(' + response.status + '): ' + requestUrl); }
            throw new Error('Failed to fetch rickroll count');
          }

          const responseText = await response.text();
          let remoteCount = normalizeRickrollCount(responseText);
          if (remoteCount === null) {
            try {
              const payload = JSON.parse(responseText);
              remoteCount = normalizeRickrollCount(payload && payload.value);
            } catch (_) {}
          }
          if (remoteCount === null) {
            if (window.NaimeanDiag) { window.NaimeanDiag.log('invalid payload: ' + requestUrl); }
            throw new Error('Received invalid rickroll count');
          }

          if (window.NaimeanDiag) { window.NaimeanDiag.log('ok: ' + requestUrl + ' \u2192 ' + remoteCount); }
          return remoteCount;
        } catch (err) {
          lastError = err;
        }
      }

      throw new Error(`All rickroll count endpoints failed${lastError && lastError.message ? `: ${lastError.message}` : ''}`);
    }

    async function renderRickrollCount() {
      if (!chapelTvCounter) {
        return;
      }

      const localCount = readLocalRickrollCount();
      chapelTvCounter.textContent = localCount > 0 ? String(localCount).padStart(2, '0') : '--';
      if (window.NaimeanDiag) {
        window.NaimeanDiag.set('local count', localCount);
        window.NaimeanDiag.set('count src', localCount > 0 ? 'local' : 'pending remote');
      }

      try {
        const remoteCount = await fetchRickrollCount(RICKROLL_COUNT_API_URLS);
        const nextCount = remoteCount;
        writeLocalRickrollCount(nextCount);
        chapelTvCounter.textContent = String(nextCount).padStart(2, '0');
        if (window.NaimeanDiag) {
          window.NaimeanDiag.set('remote count', nextCount);
          window.NaimeanDiag.set('count src', 'remote');
          window.NaimeanDiag.set('local count', nextCount);
        }
      } catch (_) {
        if (window.NaimeanDiag) { window.NaimeanDiag.set('count src', 'local (fallback)'); }
      }
    }

    function clearRockRollContinuationState() {
      rockRollContinuationPending = false;
      rockRollContinuationPlaybackState = null;

      try {
        window.sessionStorage.removeItem(ROCK_ROLL_CONTINUATION_KEY);
        window.sessionStorage.removeItem(ROCK_ROLL_CONTINUATION_PENDING_KEY);
      } catch (_) {}
    }

    function consumeDiscordInviteRedirectPending() {
      try {
        const isPending = window.sessionStorage.getItem(DISCORD_INVITE_REDIRECT_PENDING_KEY) === '1';
        window.sessionStorage.removeItem(DISCORD_INVITE_REDIRECT_PENDING_KEY);
        return isPending;
      } catch (_) {
        return false;
      }
    }

    async function resolveDiscordInviteUrl() {
      let controller = null;
      if (typeof AbortController === 'function') {
        try {
          controller = new AbortController();
        } catch (_) {
          controller = null;
        }
      }

      let timeoutId = null;
      if (controller) {
        timeoutId = setTimeout(() => {
          controller.abort();
        }, DISCORD_INVITE_RESOLVE_TIMEOUT_MS);
      }

      try {
        const response = await fetch(DISCORD_WIDGET_API_URL, {
          method: 'GET',
          cache: 'no-store',
          signal: controller ? controller.signal : undefined
        });

        if (!response.ok) {
          return null;
        }

        const payload = await response.json();
        const instantInvite = typeof payload?.instant_invite === 'string'
          ? payload.instant_invite.trim()
          : '';
        return instantInvite || null;
      } catch (_) {
        return null;
      } finally {
        if (timeoutId) {
          clearTimeout(timeoutId);
        }
      }
    }

    async function launchDiscordInviteFromRedirectIfNeeded() {
      if (!consumeDiscordInviteRedirectPending()) {
        return;
      }

      setTimeout(async function () {
        const inviteUrl = await resolveDiscordInviteUrl();
        if (inviteUrl) {
          window.open(inviteUrl, '_blank', 'noopener,noreferrer');
        }
      }, DISCORD_INVITE_LAUNCH_DELAY_MS);
    }

    function consumeRockRollContinuation() {
      try {
        rockRollContinuationPending = window.sessionStorage.getItem(ROCK_ROLL_CONTINUATION_PENDING_KEY) === '1';
        const raw = window.sessionStorage.getItem(ROCK_ROLL_CONTINUATION_KEY);
        if (!raw) {
          rockRollContinuationPending = false;
          return null;
        }

        const parsed = JSON.parse(raw);
        if (!parsed || !Number.isFinite(parsed.currentTime) || parsed.currentTime < 0) {
          clearRockRollContinuationState();
          return null;
        }

        return parsed;
      } catch (_) {
        clearRockRollContinuationState();
        return null;
      }
    }

    function getRockRollContinuationStartVolume(playbackState) {
      const sourceVolume = playbackState && Number.isFinite(playbackState.volume)
        ? playbackState.volume
        : 1;

      return Math.max(0, Math.min(1, sourceVolume * ROCK_ROLL_START_VOLUME_FACTOR));
    }

    function bindRockRollContinuationRetry() {
      if (rockRollContinuationRetryBound) {
        return;
      }

      rockRollContinuationRetryBound = true;

      function handleFirstInteraction() {
        rockRollContinuationRetryBound = false;
        document.removeEventListener('pointerdown', handleFirstInteraction);
        document.removeEventListener('keydown', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);

        if (rockRollContinuationPlaybackState) {
          startRockRollContinuation(rockRollContinuationPlaybackState);
          return;
        }

        startCongregationAudio();
      }

      document.addEventListener('pointerdown', handleFirstInteraction);
      document.addEventListener('keydown', handleFirstInteraction);
      document.addEventListener('touchstart', handleFirstInteraction);
    }

    function finishRockRollContinuation() {
      rockRollContinuationActive = false;
      clearRockRollContinuationState();

      if (isNavigatingFromChapel) {
        return;
      }

      startCongregationAudio();
    }

    function startRockRollContinuation(playbackState) {
      if (!playbackState || !rockRollContinuationMedia) {
        clearRockRollContinuationState();
        return;
      }

      rockRollContinuationPending = true;
      rockRollContinuationPlaybackState = playbackState;
      rockRollContinuationActive = true;
      const startVolume = getRockRollContinuationStartVolume(playbackState);
      rockRollContinuationMedia.pause();
      rockRollContinuationMedia.preload = 'auto';
      rockRollContinuationMedia.muted = true;
      rockRollContinuationMedia.volume = 0;

      const applyPlaybackPosition = function () {
        try {
          rockRollContinuationMedia.currentTime = playbackState.currentTime;
        } catch (_) {}
      };

      if (rockRollContinuationMedia.readyState > 0) {
        applyPlaybackPosition();
      } else {
        rockRollContinuationMedia.addEventListener('loadedmetadata', applyPlaybackPosition, { once: true });
      }

      const playPromise = rockRollContinuationMedia.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {
          rockRollContinuationActive = false;
          bindRockRollContinuationRetry();
        });
        playPromise.then(function () {
          rockRollContinuationMedia.muted = false;
          rockRollContinuationMedia.volume = startVolume;
        });
      } else {
        rockRollContinuationMedia.muted = false;
        rockRollContinuationMedia.volume = startVolume;
      }

      const fadeStart = performance.now();
      function fadeStep(now) {
        if (!rockRollContinuationMedia || !rockRollContinuationActive) {
          return;
        }

        const elapsed = now - fadeStart;
        const fadeElapsed = Math.max(0, elapsed - ROCK_ROLL_START_DELAY_MS);
        const progress = Math.min(fadeElapsed / ROCK_ROLL_FADE_DURATION_MS, 1);
        const nextVolume = startVolume * (1 - progress);
        rockRollContinuationMedia.volume = Math.max(0, nextVolume);

        if (progress >= 1) {
          rockRollContinuationMedia.pause();
          rockRollContinuationMedia.volume = 0;
          finishRockRollContinuation();
          return;
        }

        requestAnimationFrame(fadeStep);
      }

      requestAnimationFrame(fadeStep);
    }

    renderRickrollCount();
    startRockRollContinuation(consumeRockRollContinuation());

    // Fallback reveal in case full window load is delayed by media/network activity.
    const LOAD_REVEAL_FALLBACK_MS = 1200;

    function revealPage() {
      if (document.body.classList.contains('loaded')) {
        return;
      }
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
      }, { once: true });
    } else {
      window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
    }

    function playDoorOpeningSound() {
      const audioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!audioContextCtor) {
        return;
      }

      const ctx = new audioContextCtor();
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.22, now);
      master.connect(ctx.destination);

      function scheduleTone(type, startFreq, endFreq, startOffset, duration, peakGain) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        const startTime = now + startOffset;
        const endTime = startTime + duration;

        osc.type = type;
        osc.frequency.setValueAtTime(startFreq, startTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, endTime);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1800, startTime);
        filter.frequency.exponentialRampToValueAtTime(420, endTime);
        filter.Q.setValueAtTime(0.8, startTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        osc.start(startTime);
        osc.stop(endTime + 0.02);
      }

      function scheduleNoiseBurst(startOffset, duration, peakGain) {
        const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
        const channel = buffer.getChannelData(0);
        for (let i = 0; i < channel.length; i += 1) {
          channel[i] = (Math.random() * 2 - 1) * (1 - (i / channel.length));
        }

        const source = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        const startTime = now + startOffset;
        const endTime = startTime + duration;

        source.buffer = buffer;
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(760, startTime);
        filter.Q.setValueAtTime(1.3, startTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);

        source.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        source.start(startTime);
        source.stop(endTime + 0.01);
      }

      scheduleTone('sawtooth', 230, 92, 0, 0.56, 0.11);
      scheduleTone('triangle', 165, 88, 0.03, 0.46, 0.07);
      scheduleTone('sine', 78, 52, 0.18, 0.24, 0.09);
      scheduleNoiseBurst(0.01, 0.19, 0.08);

      setTimeout(function () {
        ctx.close();
      }, 1000);
    }

    function startCongregationAudio() {
      if (rockRollContinuationPending || rockRollContinuationPlaybackState) {
        return;
      }

      if (rockRollContinuationActive) {
        return;
      }

      if (congregationStarted) {
        return;
      }

      congregationStarted = true;
      congregationAudio.currentTime = 0;

      var playPromise = congregationAudio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function () {
          congregationStarted = false;
        });
      }
    }

    function bindCongregationFallback() {
      function handleFirstInteraction() {
        if (rockRollContinuationPending || rockRollContinuationPlaybackState) {
          return;
        }

        startCongregationAudio();
        document.removeEventListener('pointerdown', handleFirstInteraction);
        document.removeEventListener('keydown', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);
      }

      document.addEventListener('pointerdown', handleFirstInteraction);
      document.addEventListener('keydown', handleFirstInteraction);
      document.addEventListener('touchstart', handleFirstInteraction);
    }

    function scrollToCurrentStartPoint() {
      var chapelWrapper = document.querySelector('.chapel-wrapper');
      if (!chapelWrapper) {
        var fallbackTarget = document.body.scrollHeight - window.innerHeight;
        window.scrollTo(0, fallbackTarget);
        return;
      }

      // Preserve the pre-stitch floor start at the top edge of the stitched extension.
      const stitchTop = chapelWrapper.offsetTop + (chapelWrapper.offsetHeight * ORIGINAL_CHAPEL_HEIGHT_RATIO);
      const target = Math.max(0, stitchTop - window.innerHeight);
      window.scrollTo(0, target);
    }

    window.addEventListener('load', function () {
      scrollToCurrentStartPoint();
      // Retry a few times in case layout shifts as images decode on mobile
      setTimeout(scrollToCurrentStartPoint, 100);
      setTimeout(scrollToCurrentStartPoint, 300);
      launchDiscordInviteFromRedirectIfNeeded();
      setTimeout(function () {
        scrollToCurrentStartPoint();
        startCongregationAudio();
        bindCongregationFallback();
        revealPage();
      }, 500);
    });

    function navigateToSite() {
      if (isNavigatingFromChapel) {
        return;
      }
      isNavigatingFromChapel = true;

      playDoorOpeningSound();
      congregationAudio.pause();
      if (rockRollContinuationMedia) {
        rockRollContinuationMedia.pause();
      }
      const overlay = document.getElementById('fade-overlay');
      overlay.classList.add('fading');
      setTimeout(function () {
        window.location.assign('bedroom_antechamber.html');
      }, 900);
    }

    function navigateBackToIndex() {
      if (isNavigatingFromChapel) {
        return;
      }
      isNavigatingFromChapel = true;
      try {
        window.sessionStorage.setItem(INDEX_FADE_IN_KEY, '1');
      } catch (_) {}

      congregationAudio.pause();
      if (rockRollContinuationMedia) {
        rockRollContinuationMedia.pause();
      }
      const overlay = document.getElementById('fade-overlay');
      overlay.classList.add('fading');
      setTimeout(function () {
        window.location.assign('index.html');
      }, 900);
    }

    document.getElementById('chapel-return-btn').addEventListener('click', navigateBackToIndex);

    // Invisible button click → bedroom_antechamber.html
    document.getElementById('trapdoor-btn').addEventListener('click', navigateToSite);

    // Enter key → same behavior
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter' || e.repeat || !document.body.classList.contains('loaded')) {
        return;
      }

      navigateToSite();
    });
  </script>
</body>
</html>
