<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colicofusion</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
    }

    body {
      opacity: 0;
      transition: opacity 0.9s ease;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
    }

    body.loaded {
      opacity: 1;
    }

    .colicofusion-outer {
      position: relative;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
    }

    .colicofusion-title {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      color: #ff3300;
      text-shadow:
        0 0 12px rgba(255, 80, 0, 0.8),
        0 0 30px rgba(200, 20, 0, 0.5),
        0 0 60px rgba(180, 0, 0, 0.25);
      animation: colicofusion-title-pulse 2.4s infinite ease-in-out;
    }

    @keyframes colicofusion-title-pulse {
      0%, 100% {
        text-shadow:
          0 0 12px rgba(255, 80, 0, 0.8),
          0 0 30px rgba(200, 20, 0, 0.5),
          0 0 60px rgba(180, 0, 0, 0.25);
      }
      50% {
        text-shadow:
          0 0 20px rgba(255, 120, 0, 1),
          0 0 50px rgba(220, 40, 0, 0.7),
          0 0 100px rgba(180, 0, 0, 0.4);
      }
    }

    .colicofusion-readout {
      width: 100%;
      max-width: 480px;
      background: rgba(30, 0, 0, 0.8);
      border: 1px solid rgba(255, 60, 0, 0.45);
      padding: 20px 24px;
      font-size: clamp(10px, 2vw, 14px);
      line-height: 1.7;
      color: rgba(255, 140, 60, 0.9);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .colicofusion-readout-line {
      display: flex;
      gap: 8px;
    }

    .colicofusion-readout-key {
      color: rgba(255, 60, 0, 0.7);
      min-width: 14ch;
      flex-shrink: 0;
    }

    .colicofusion-readout-val {
      color: rgba(255, 200, 80, 0.95);
    }

    .colicofusion-readout-val.blink {
      animation: readout-blink 1.2s infinite step-start;
    }

    @keyframes readout-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .colicofusion-title {
        animation: none;
        text-shadow: 0 0 12px rgba(255, 80, 0, 0.8);
      }
      .colicofusion-readout-val.blink {
        animation: none;
      }
    }

    .colicofusion-back-btn {
      margin-top: 8px;
      padding: 12px 28px;
      background: transparent;
      border: 1px solid rgba(255, 60, 0, 0.6);
      color: rgba(255, 140, 60, 0.9);
      font-family: inherit;
      font-size: clamp(11px, 2vw, 14px);
      letter-spacing: 0.1em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .colicofusion-back-btn:hover,
    .colicofusion-back-btn:focus-visible {
      background: rgba(255, 40, 0, 0.15);
      border-color: rgba(255, 100, 0, 0.9);
      color: #fff;
      outline: none;
    }

    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 100;
    }

    .fade-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="fade-overlay" id="fade-overlay"></div>
  <div class="colicofusion-outer">
    <h1 class="colicofusion-title">Colicofusion</h1>
    <div class="colicofusion-readout" aria-label="Colicofusion status readout">
      <div class="colicofusion-readout-line">
        <span class="colicofusion-readout-key">STATUS</span>
        <span class="colicofusion-readout-val blink">ACTIVE</span>
      </div>
      <div class="colicofusion-readout-line">
        <span class="colicofusion-readout-key">TEMP</span>
        <span class="colicofusion-readout-val" id="cf-temp">4812 K</span>
      </div>
      <div class="colicofusion-readout-line">
        <span class="colicofusion-readout-key">PRESSURE</span>
        <span class="colicofusion-readout-val" id="cf-pressure">9.2 GPa</span>
      </div>
      <div class="colicofusion-readout-line">
        <span class="colicofusion-readout-key">YIELD</span>
        <span class="colicofusion-readout-val" id="cf-yield">84%</span>
      </div>
      <div class="colicofusion-readout-line">
        <span class="colicofusion-readout-key">CONTAINMENT</span>
        <span class="colicofusion-readout-val">NOMINAL</span>
      </div>
    </div>
    <a class="colicofusion-back-btn" id="back-btn" href="bedroom_antechamber.html">← Back</a>
  </div>
  <script src="auth.js"></script>
  <script>
    const LOAD_REVEAL_FALLBACK_MS = 1200;
    const fadeOverlay = document.getElementById('fade-overlay');

    function revealPage() {
      if (document.body.classList.contains('loaded')) {
        return;
      }
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
      }, { once: true });
    } else {
      window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
    }

    window.addEventListener('load', revealPage);

    // Fluctuate the readout values to give it life.
    const cfTemp = document.getElementById('cf-temp');
    const cfPressure = document.getElementById('cf-pressure');
    const cfYield = document.getElementById('cf-yield');

    function fluctuateValue(base, range) {
      return (base + (Math.random() * 2 - 1) * range).toFixed(1);
    }

    function tickReadout() {
      if (cfTemp) {
        const t = Math.round(4812 + (Math.random() * 2 - 1) * 40);
        cfTemp.textContent = t + ' K';
      }
      if (cfPressure) {
        cfPressure.textContent = fluctuateValue(9.2, 0.3) + ' GPa';
      }
      if (cfYield) {
        const y = Math.round(84 + (Math.random() * 2 - 1) * 3);
        cfYield.textContent = y + '%';
      }
    }

    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    let readoutIntervalId = null;
    if (!reducedMotion.matches) {
      readoutIntervalId = window.setInterval(tickReadout, 1800);
    }
    reducedMotion.addEventListener('change', function (e) {
      if (e.matches) {
        if (readoutIntervalId !== null) {
          window.clearInterval(readoutIntervalId);
          readoutIntervalId = null;
        }
      } else if (readoutIntervalId === null) {
        readoutIntervalId = window.setInterval(tickReadout, 1800);
      }
    });

    // Navigate back with fade.
    let isNavigating = false;
    function navigateBack(event) {
      if (event) {
        event.preventDefault();
      }
      if (isNavigating) {
        return;
      }
      isNavigating = true;
      if (fadeOverlay) {
        fadeOverlay.classList.add('fading');
      }
      const transitionDuration = fadeOverlay
        ? parseFloat(getComputedStyle(fadeOverlay).transitionDuration) * 1000
        : 0;
      window.setTimeout(function () {
        window.location.assign('bedroom_antechamber.html');
      }, transitionDuration || 900);
    }

    document.getElementById('back-btn').addEventListener('click', navigateBack);
  </script>
</body>
</html>
