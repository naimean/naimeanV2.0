<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naimean?</title>
  <style>
    .c64-wrapper {
      --screen-left: 4.44%;
      --screen-top: 6.43%;
      --screen-width: 90.11%;
      --screen-height: 47.86%;
      position: relative;
    }

    .shadow-layer {
      position: absolute;
      left: var(--screen-left);
      top: var(--screen-top);
      width: var(--screen-width);
      height: var(--screen-height);
      border-radius: 8px;
      background: #111112;
      z-index: 10;
    }

    .boot-screen,
    .shoutbox-container,
    .discord-overlay,
    .static-overlay,
    .power-off-overlay {
      display: none;
    }
  </style>
  <link rel="icon" type="image/jpeg" href="assets/commodore64.jpg">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-fade-overlay" id="page-fade-overlay"></div>
  <main>
  <div class="c64-wrapper">
    <img src="assets/commodore64.jpg" alt="Commodore 64" class="c64-img" fetchpriority="high" />
    <button class="return-bypass-btn" id="return-bypass-btn" aria-label="Open Discord"></button>
    <button class="power-btn" id="power-btn" aria-label="Power">
      <span class="power-light" id="power-light"></span>
    </button>
    <div class="shadow-layer" id="shadow-layer"></div>
    <div class="static-overlay" id="static-overlay" aria-hidden="true">
      <video id="static-video" src="assets/static.mp4" playsinline preload="auto"></video>
    </div>
    <div class="power-off-overlay" id="power-off-overlay" aria-hidden="true">
      <video id="power-off-video" src="assets/power-off.mp4" playsinline preload="auto"></video>
    </div>
    <div class="boot-screen" id="boot-screen">
      <div class="boot-content">
        <form id="boot-form" autocomplete="off" class="boot-form">
          <div class="boot-submit-stack" id="boot-submit-stack">
            <div class="boot-quick-links" id="boot-quick-links">
              <button id="boot-whiteboard-btn" class="boot-submit boot-quick-link" type="button" aria-label="Microsoft Whiteboard">
                <svg class="boot-quick-link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path fill="currentColor" d="M3 5.5A2.5 2.5 0 0 1 5.5 3h13A2.5 2.5 0 0 1 21 5.5v9A2.5 2.5 0 0 1 18.5 17h-6.18l-2.74 3.29a1 1 0 0 1-1.76-.64V17H5.5A2.5 2.5 0 0 1 3 14.5v-9Zm2 0v9a.5.5 0 0 0 .5.5h3.32a1 1 0 0 1 1 1v.98l1.3-1.56a1 1 0 0 1 .77-.36h6.61a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-13a.5.5 0 0 0-.5.5ZM9 8.5a1 1 0 0 1 1-1h5a1 1 0 1 1 0 2h-5a1 1 0 0 1-1-1Zm0 3a1 1 0 0 1 1-1h7a1 1 0 1 1 0 2h-7a1 1 0 0 1-1-1Z"/>
                </svg>
              </button>
              <button id="boot-capex-btn" class="boot-submit boot-quick-link boot-quick-link--capex" type="button" aria-label="Cap-Ex">
                <span class="boot-capex-label">Cap-Ex</span>
              </button>
              <button id="boot-snow-btn" class="boot-submit boot-quick-link" type="button" aria-label="Open ServiceNow incidents">
                <span class="boot-snow-icon" aria-hidden="true">❄</span>
              </button>
            </div>
            <button id="boot-submit" class="boot-submit" type="submit">
              <svg class="discord-prefix-icon" viewBox="0 0 127.14 96.36" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,33.45-1.72,58.18.54,82.56A105.73,105.73,0,0,0,32.71,96.36a77.7,77.7,0,0,0,6.89-11.19,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.35,2.66-2.06a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.4,2.66,2.06a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.18A105.25,105.25,0,0,0,126.57,82.56C129.21,54.31,122.06,29.83,107.7,8.07ZM42.45,67.69C36.2,67.69,31.06,62,31.06,55s5-12.74,11.39-12.74S53.84,48,53.84,55,48.7,67.69,42.45,67.69Zm42.24,0c-6.25,0-11.39-5.67-11.39-12.69s5-12.74,11.39-12.74S96.08,48,96.08,55,91,67.69,84.69,67.69Z"/>
              </svg>
              <span class="boot-submit-label">Join our Discord</span>
            </button>
          </div>
          <div class="boot-input-row">
            <input id="boot-input" class="boot-input" type="text" maxlength="32" value="C:\Naimean\User\Admin" aria-label="Boot command input" />
            <button id="boot-inline-submit" class="boot-submit boot-inline-submit" type="submit" aria-label="Submit boot command">submit</button>
          </div>
        </form>
        <div class="discord-rickroll-counter" id="discord-rickroll-counter" aria-live="polite">01</div>
        <video id="boot-video" src="assets/joinourdiscord.mp4" playsinline preload="auto"></video>
      </div>
    </div>
    <div class="discord-overlay" id="discord-overlay" aria-hidden="true">
      <div class="discord-widget-embed">
        <iframe
          src="https://discord.com/widget?id=1487898909224341534&theme=dark"
          title="Naimean Discord Widget"
          allowtransparency="true"
          sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
        </iframe>
      </div>
    </div>
    <div class="shoutbox-container" id="shoutbox-container">
      <div class="c64-screen">
        <div class="prank-video-overlay" id="prank-video-overlay" aria-hidden="true">
          <video id="prank-video" src="assets/notarickroll.mp4" playsinline preload="auto"></video>
        </div>
        <div class="email-auth-overlay" id="email-auth-overlay" role="dialog" aria-modal="true" aria-labelledby="email-auth-title">
          <form id="email-auth-form" autocomplete="off" class="email-auth-form">
            <div class="email-auth-title" id="email-auth-title">REGISTER</div>
            <div class="email-auth-field">
              <label class="email-auth-label" for="email-auth-email">EMAIL:</label>
              <input class="email-auth-input" id="email-auth-email" type="email" maxlength="254" autocomplete="email" spellcheck="false" />
            </div>
            <div class="email-auth-field" id="email-auth-username-field">
              <label class="email-auth-label" for="email-auth-username">USERNAME:</label>
              <input class="email-auth-input" id="email-auth-username" type="text" maxlength="16" autocomplete="username" spellcheck="false" />
            </div>
            <div class="email-auth-field">
              <label class="email-auth-label" for="email-auth-password">PASSWORD:</label>
              <input class="email-auth-input" id="email-auth-password" type="password" maxlength="1024" autocomplete="current-password" />
            </div>
            <div class="email-auth-error" id="email-auth-error" aria-live="polite"></div>
            <div class="email-auth-actions">
              <button type="submit" class="email-auth-btn" id="email-auth-submit">SUBMIT</button>
              <button type="button" class="email-auth-btn email-auth-btn--cancel" id="email-auth-cancel">CANCEL</button>
            </div>
          </form>
        </div>
        <div class="discord-auth-chip" id="discord-auth-chip" aria-live="polite">
          <button type="button" class="discord-auth-login-btn" id="discord-auth-login">Log-in</button>
          <div class="discord-auth-user" id="discord-auth-user" hidden>
            <span class="discord-auth-name" id="discord-auth-name"></span>
            <span class="discord-auth-avatar" id="discord-auth-avatar">
              <img class="discord-auth-avatar-image" id="discord-auth-avatar-image" alt="" hidden />
            </span>
          </div>
        </div>
        <div class="shoutbox-messages" id="messages" role="log" aria-live="polite" aria-label="System messages"></div>
        <div class="shoutbox-bottom">
          <form id="shoutbox-form">
            <div class="shoutbox-hint-shell" id="shoutbox-hint-shell" tabindex="0" role="button" aria-label="Reveal hint">
              <div class="shoutbox-hint">You didn't say the magic word.</div>
              <div class="shoutbox-hint-cover" aria-hidden="true"></div>
            </div>
            <div class="shoutbox-entry">
              <input type="text" id="shoutbox-input" maxlength="120" value="C:\Naimean\" aria-label="Shoutbox command input" autocomplete="off" />
              <button type="submit" aria-label="Submit command">submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  </main>
  <script src="diagnostics.js"></script>
  <script src="script.js"></script>
</body>
</html>
