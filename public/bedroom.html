<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedroom</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --doorway-center-x: 50%;
      --doorway-hitbox-left: calc(43% - 150px);
      --doorway-hitbox-top: 29%;
      --doorway-hitbox-width: 14%;
      --doorway-hitbox-height: 46%;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      opacity: 0;
      transition: opacity 0.9s ease;
      touch-action: pan-x;
    }

    body.loaded {
      opacity: 1;
    }

    .bedroom-scroller {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      overscroll-behavior-x: contain;
      overscroll-behavior-y: none;
    }

    .bedroom-scroller::-webkit-scrollbar {
      display: none;
    }

    .bedroom-scene {
      position: relative;
      height: 100%;
      width: max-content;
    }

    .bedroom-img {
      height: 100%;
      width: auto;
      min-width: 100vw;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .doorway-btn {
      position: absolute;
      left: var(--doorway-hitbox-left);
      top: var(--doorway-hitbox-top);
      width: var(--doorway-hitbox-width);
      height: var(--doorway-hitbox-height);
      background: transparent;
      opacity: 0;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
    }

  </style>
</head>
<body>
  <div class="bedroom-scroller" id="bedroom-scroller">
    <div class="bedroom-scene" id="bedroom-scene">
      <img src="assets/bedroom.png?v=20260419-1839" alt="Bedroom" class="bedroom-img" id="bedroom-img" />
      <button class="doorway-btn" id="doorway-btn" aria-label="Enter the antechamber"></button>
    </div>
  </div>
  <script>
    let isNavigatingToAntechamber = false;
    let resizeFrame = 0;
    const MOUSE_SCROLL_STEP = 180;
    const SCROLL_RIGHT = 1;
    const SCROLL_LEFT = -1;
    const SCROLL_LOCK_MS = 260;
    let shouldScrollLeftOnMouseUp = false;
    let isMouseScrollInProgress = false;
    let mouseScrollLockTimer = 0;
    // Fallback reveal in case full window load is delayed by media/network activity.
    const LOAD_REVEAL_FALLBACK_MS = 1200;
    const WHEEL_DAMPING = 0.82;
    const WHEEL_MIN_VELOCITY = 0.35;
    let wheelVelocity = 0;
    let wheelAnimationFrame = 0;
    const bedroomScroller = document.getElementById('bedroom-scroller');

    function revealPage() {
      if (document.body.classList.contains('loaded')) {
        return;
      }
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
      }, { once: true });
    } else {
      window.setTimeout(revealPage, LOAD_REVEAL_FALLBACK_MS);
    }

    function centerDoorway() {
      const scroller = document.getElementById('bedroom-scroller');
      const scene = document.getElementById('bedroom-scene');
      const doorwayCenterX = parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue('--doorway-center-x')
      ) || 50;

      const sceneWidth = scene.offsetWidth;
      const viewportWidth = scroller.clientWidth;
      const targetCenterX = sceneWidth * (doorwayCenterX / 100);
      const targetScrollLeft = Math.max(0, Math.min(sceneWidth - viewportWidth, targetCenterX - (viewportWidth / 2)));

      scroller.scrollLeft = targetScrollLeft;
    }

    function scheduleCenterDoorway() {
      if (resizeFrame) {
        return;
      }
      resizeFrame = requestAnimationFrame(function () {
        resizeFrame = 0;
        centerDoorway();
      });
    }

    function navigateToAntechamber() {
      if (isNavigatingToAntechamber) {
        return;
      }
      isNavigatingToAntechamber = true;
      window.location.assign('bedroom_antechamber.html');
    }

    function runWheelMomentum() {
      if (!bedroomScroller || Math.abs(wheelVelocity) < WHEEL_MIN_VELOCITY) {
        wheelVelocity = 0;
        wheelAnimationFrame = 0;
        return;
      }

      bedroomScroller.scrollLeft += wheelVelocity;
      wheelVelocity *= WHEEL_DAMPING;
      wheelAnimationFrame = requestAnimationFrame(runWheelMomentum);
    }

    function nudgeHorizontal(direction) {
      if (!bedroomScroller || direction === 0 || isMouseScrollInProgress) {
        return false;
      }

      isMouseScrollInProgress = true;
      clearTimeout(mouseScrollLockTimer);
      mouseScrollLockTimer = window.setTimeout(function () {
        isMouseScrollInProgress = false;
        mouseScrollLockTimer = 0;
      }, SCROLL_LOCK_MS);

      bedroomScroller.scrollBy({
        left: MOUSE_SCROLL_STEP * direction,
        behavior: 'smooth'
      });
      return true;
    }

    window.addEventListener('load', function () {
      const bedroomImage = document.getElementById('bedroom-img');
      if (typeof bedroomImage.decode === 'function') {
        bedroomImage.decode().catch(function () {}).finally(scheduleCenterDoorway);
      } else if (bedroomImage.complete) {
        scheduleCenterDoorway();
      } else {
        bedroomImage.addEventListener('load', scheduleCenterDoorway, { once: true });
      }

      scheduleCenterDoorway();
      revealPage();
    });

    window.addEventListener('resize', scheduleCenterDoorway);
    document.getElementById('doorway-btn').addEventListener('click', navigateToAntechamber);

    bedroomScroller.addEventListener('wheel', function (event) {
      const dominantDelta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
      if (dominantDelta === 0) {
        return;
      }

      event.preventDefault();
      wheelVelocity += dominantDelta;
      if (!wheelAnimationFrame) {
        wheelAnimationFrame = requestAnimationFrame(runWheelMomentum);
      }
    }, { passive: false });

    window.addEventListener('mousedown', function (event) {
      const eventTarget = event.target;
      const startedOnDoorway = eventTarget instanceof Element && eventTarget.closest('#doorway-btn');
      const startedInScroller = eventTarget instanceof Element && eventTarget.closest('#bedroom-scroller');
      if (event.button !== 0 || startedOnDoorway || !startedInScroller) {
        shouldScrollLeftOnMouseUp = false;
        return;
      }
      shouldScrollLeftOnMouseUp = nudgeHorizontal(SCROLL_RIGHT);
    });

    window.addEventListener('mouseup', function (event) {
      const releasedOnDoorway = event.target instanceof Element && event.target.closest('#doorway-btn');
      if (event.button !== 0 || releasedOnDoorway || !shouldScrollLeftOnMouseUp) {
        shouldScrollLeftOnMouseUp = false;
        return;
      }
      shouldScrollLeftOnMouseUp = false;
      nudgeHorizontal(SCROLL_LEFT);
    });

    window.addEventListener('blur', function () {
      shouldScrollLeftOnMouseUp = false;
      isMouseScrollInProgress = false;
      clearTimeout(mouseScrollLockTimer);
      mouseScrollLockTimer = 0;
      wheelVelocity = 0;
      if (wheelAnimationFrame) {
        cancelAnimationFrame(wheelAnimationFrame);
        wheelAnimationFrame = 0;
      }
    });
  </script>
</body>
</html>
