<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oregon Trail</title>
  <link rel="icon" type="image/jpeg" href="/assets/images/commodore64.v20260424.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: monospace;
      color: #8ef0b2;
    }

    /* ── Top bar ──────────────────────────────────────────────────────────── */
    .bar {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; flex-shrink: 0;
      border-bottom: 1px solid #333; font-size: 13px;
    }
    .bar-title { flex: 1; }
    .bar button, .bar a {
      background: transparent; border: 1px solid #555;
      color: #8ef0b2; font-family: monospace; font-size: 12px;
      padding: 2px 8px; cursor: pointer; text-decoration: none;
      display: inline-block;
    }
    .bar button:hover, .bar a:hover { background: rgba(142,240,178,0.1); }

    /* ── Main area ────────────────────────────────────────────────────────── */
    #main {
      flex: 1 1 auto; min-height: 0;
      position: relative;
      display: flex; flex-direction: column;
    }

    #output {
      flex: 1 1 auto; min-height: 0;
      overflow-y: auto;
      padding: 12px 18px;
      scrollbar-width: thin;
      scrollbar-color: rgba(142,240,178,0.3) transparent;
    }
    #output::-webkit-scrollbar { width: 5px; }
    #output::-webkit-scrollbar-thumb { background: rgba(142,240,178,0.3); }

    /* ── Text lines ───────────────────────────────────────────────────────── */
    .ln {
      font-size: 13px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .dim    { color: rgba(142,240,178,0.5); }
    .bright { color: #c8ffd9; text-shadow: 0 0 5px rgba(200,255,217,0.3); }
    .warn   { color: #f5c842; }
    .err    { color: #f66; }
    .sep-ln { color: rgba(142,240,178,0.2); }
    .gap-ln { height: 8px; }

    /* ── Action buttons ───────────────────────────────────────────────────── */
    #actions {
      flex-shrink: 0;
      border-top: 1px solid #222;
      padding: 7px 10px;
      display: flex; flex-wrap: wrap; gap: 5px;
      min-height: 40px;
    }
    .btn {
      background: transparent;
      border: 1px solid rgba(142,240,178,0.4);
      color: #8ef0b2; font-family: monospace; font-size: 12px;
      padding: 4px 11px; cursor: pointer;
    }
    .btn:hover  { background: rgba(142,240,178,0.09); border-color: #8ef0b2; }
    .btn:disabled { opacity: 0.28; cursor: default; }
    .btn.hi   { border-color: #c8ffd9; color: #c8ffd9; }
    .btn.bad  { border-color: rgba(255,102,102,0.55); color: #f66; }

    /* ── Hunting mini-game overlay ────────────────────────────────────────── */
    #hunt-wrap {
      display: none;
      position: absolute; inset: 0;
      background: #000;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 16px;
    }
    #hunt-wrap.on { display: flex; }
    #hunt-hdr { font-size: 14px; letter-spacing: 0.06em; color: #c8ffd9; }
    #hunt-canvas {
      width: min(420px, 92vw); height: 160px;
      border: 1px solid rgba(142,240,178,0.3);
      background: #020a04;
      position: relative; overflow: hidden;
      cursor: crosshair;
    }
    .prey {
      position: absolute; font-size: 18px;
      user-select: none; cursor: crosshair;
    }
    #hunt-bar-wrap {
      width: min(420px, 92vw); height: 7px;
      background: rgba(142,240,178,0.1);
      border: 1px solid rgba(142,240,178,0.15);
    }
    #hunt-bar { height: 100%; background: #8ef0b2; transition: width 0.12s linear; }
    #hunt-tally { font-size: 12px; color: rgba(142,240,178,0.7); }
  </style>
</head>
<body>
  <div class="bar">
    <div class="bar-title" id="bar-title">&#9658; OREGON TRAIL</div>
    <button id="btn-fs">FULLSCREEN</button>
    <a href="/" id="btn-home">&#8962; HOME</a>
  </div>

  <div id="main">
    <div id="output"></div>
    <div id="actions"></div>
    <div id="hunt-wrap">
      <div id="hunt-hdr">CLICK THE ANIMALS &#8212; HUNT FOR FOOD!</div>
      <div id="hunt-canvas"></div>
      <div id="hunt-bar-wrap"><div id="hunt-bar"></div></div>
      <div id="hunt-tally">Hit: 0 &nbsp;|&nbsp; Miss: 0</div>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  // ── Constants ────────────────────────────────────────────────────────────────

  var TOTAL_MI = 2040;
  var MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Miles per 14-day turn at each pace level (index 1–4)
  var PACE_MI     = [0, 126, 196, 280, 420];
  // Food lbs consumed per person per 14-day turn at each rations level (index 1–3)
  var RATIONS_LBS = [0, 14, 21, 30];

  var LANDMARKS = [
    { name: 'Kansas River',       mi: 102,  river: true, ferryCost: 5,  depth: 3 },
    { name: 'Big Blue River',     mi: 185,  river: true, ferryCost: 0,  depth: 4 },
    { name: 'Fort Kearney',       mi: 307,  store: true,
      note: 'A U.S. Army post. Supplies available.' },
    { name: 'Chimney Rock',       mi: 520,
      note: 'A towering sandstone spire \u2014 you\'re making progress!' },
    { name: 'Fort Laramie',       mi: 650,  store: true,
      note: 'Largest trading post on the trail. Rest and restock.' },
    { name: 'Independence Rock',  mi: 830,
      note: 'Thousands of names are carved into this granite dome.' },
    { name: 'South Pass',         mi: 947,
      note: 'The Continental Divide. It\'s downhill to Oregon from here!' },
    { name: 'Fort Bridger',       mi: 990,  store: true,
      note: 'Jim Bridger\'s post. Known for fair prices.' },
    { name: 'Fort Hall',          mi: 1250, store: true,
      note: 'An essential resupply point on the Snake River.' },
    { name: 'Fort Boise',         mi: 1610, store: true,
      note: 'You\'re close. The Columbia River lies ahead.' },
    { name: 'Blue Mountains',     mi: 1750,
      note: 'A steep, punishing crossing. The end is near.' },
    { name: 'The Dalles',         mi: 1853, river: true, store: true, ferryCost: 10, depth: 5,
      note: 'End of the overland trail. The Columbia River must be crossed.' },
    { name: 'Oregon City',        mi: 2040, end: true },
  ];

  var ILLNESSES = [
    { name: 'typhoid fever',  sev: 2 },
    { name: 'dysentery',      sev: 2 },
    { name: 'measles',        sev: 1 },
    { name: 'cholera',        sev: 3 },
    { name: 'a bad fever',    sev: 1 },
    { name: 'a broken leg',   sev: 1 },
    { name: 'a snakebite',    sev: 2 },
    { name: 'food poisoning', sev: 1 },
    { name: 'frostbite',      sev: 1 },
    { name: 'exhaustion',     sev: 1 },
  ];

  var NAME_SETS = [
    ['Ma',      'Billy',  'Susie',   'Little Tommy'],
    ['Margaret','Eliza',  'Samuel',  'Baby Rose'   ],
    ['Agnes',   'Mary',   'Thomas',  'Henry'       ],
    ['Harriet', 'James',  'Clara',   'Frederick'   ],
  ];

  var PREY_EMOJI = ['\uD83E\uDD8C','\uD83D\uDC17','\uD83D\uDC07','\uD83E\uDD8E','\uD83D\uDC26','\uD83E\uDD86'];

  // Store items definition
  var ITEMS = [
    { key: 'oxen',     label: 'Oxen',            unit: '/head', price: 40, max: 6  },
    { key: 'food',     label: 'Food (50 lb bag)', unit: '/bag',  price: 10, max: 30 },
    { key: 'clothing', label: 'Clothing',         unit: '/set',  price: 10, max: 10 },
    { key: 'ammo',     label: 'Ammunition',       unit: '/box',  price:  2, max: 20 },
    { key: 'parts',    label: 'Spare Parts',      unit: '/set',  price: 10, max:  5 },
    { key: 'medicine', label: 'Medicine',         unit: '/kit',  price: 15, max:  5 },
  ];

  // ── Game state ────────────────────────────────────────────────────────────────

  var G = {};

  function resetGame() {
    G = {
      phase:   'intro',
      prof:    '',
      money:   0,
      oxen:    0, food:     0, clothing: 0,
      ammo:    0, parts:    0, medicine: 0,
      party:   [],
      mi:      0,
      days:    0,      // days elapsed since March 1
      pace:    2,
      rations: 2,
      lmIdx:   0,      // index of the next landmark to check
    };
  }

  // ── DOM refs ──────────────────────────────────────────────────────────────────

  var elOut    = document.getElementById('output');
  var elAct    = document.getElementById('actions');
  var elHunt   = document.getElementById('hunt-wrap');
  var elCanvas = document.getElementById('hunt-canvas');
  var elBar    = document.getElementById('hunt-bar');
  var elTally  = document.getElementById('hunt-tally');
  var elTitle  = document.getElementById('bar-title');

  // ── Output helpers ────────────────────────────────────────────────────────────

  function ln(text, cls) {
    var d = document.createElement('div');
    d.className = 'ln' + (cls ? ' ' + cls : '');
    d.textContent = text;
    elOut.appendChild(d);
    elOut.scrollTop = elOut.scrollHeight;
  }

  function gap() {
    var d = document.createElement('div');
    d.className = 'gap-ln';
    elOut.appendChild(d);
  }

  function sep() { ln('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500', 'sep-ln'); }

  function clear() { elOut.innerHTML = ''; }

  function acts(btns) {
    elAct.innerHTML = '';
    (btns || []).forEach(function (b) {
      var el = document.createElement('button');
      el.className = 'btn' + (b.hi ? ' hi' : '') + (b.bad ? ' bad' : '');
      el.textContent = b.label;
      el.disabled = !!b.off;
      el.addEventListener('click', b.fn);
      elAct.appendChild(el);
    });
  }

  // ── Utility ───────────────────────────────────────────────────────────────────

  function rnd(n) { return Math.floor(Math.random() * n); }
  function pick(a) { return a[rnd(a.length)]; }
  function pct(p) { return Math.random() * 100 < p; }

  function dateStr() {
    var day   = 60 + G.days;           // March 1 ≈ day 60
    var month = Math.min(11, Math.floor(day / 30));
    var d     = (day % 30) + 1;
    return MONTHS[month] + ' ' + d + ', 1848';
  }

  function hlabel(h) {
    if (h <= 0) return 'DEAD';
    if (h === 1) return 'very poor';
    if (h === 2) return 'poor';
    if (h === 3) return 'fair';
    return 'good';
  }

  function hcls(h) {
    if (h <= 0) return 'err';
    if (h <= 2) return 'warn';
    return '';
  }

  function alive() {
    return G.party.filter(function (p) { return p.health > 0; });
  }

  function paceName(p)    { return ['', 'SLOW', 'STEADY', 'STRENUOUS', 'GRUELING'][p]; }
  function rationsName(r) { return ['', 'MEAGER', 'MODERATE', 'FILLING'][r]; }

  // ── Intro ─────────────────────────────────────────────────────────────────────

  function showIntro() {
    resetGame();
    clear();
    elTitle.textContent = '\u25BA OREGON TRAIL';
    gap();
    ln('  THE OREGON TRAIL  (1848)', 'bright');
    ln('  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550', 'sep-ln');
    gap();
    ln('  You are leading a wagon train from', 'dim');
    ln('  Independence, Missouri to Oregon City \u2014', 'dim');
    ln('  a journey of 2,040 miles.', 'dim');
    gap();
    ln('  The trail is long. Rivers run deep.', 'dim');
    ln('  Disease, weather, and starvation claim', 'dim');
    ln('  many who attempt the crossing.', 'dim');
    gap();
    ln('  Choose your path wisely, pioneer.', 'dim');
    gap();
    acts([{ label: 'BEGIN JOURNEY', hi: true, fn: showProfession }]);
  }

  // ── Profession ────────────────────────────────────────────────────────────────

  function showProfession() {
    clear();
    ln('CHOOSE YOUR PROFESSION', 'bright');
    sep();
    gap();
    ln('BANKER         $1600 to start    \u2605\u2605\u2605 Easy', '');
    ln('  Wealthy, but trail life is foreign to you.', 'dim');
    gap();
    ln('CARPENTER       $800 to start    \u2605\u2605  Medium', '');
    ln('  Repairs cost less. A solid all-rounder.', 'dim');
    gap();
    ln('FARMER          $400 to start    \u2605    Hard', '');
    ln('  You know the land, but funds are very tight.', 'dim');
    gap();
    acts([
      { label: 'BANKER',    fn: function () { startGame('banker',    1600); } },
      { label: 'CARPENTER', fn: function () { startGame('carpenter',  800); } },
      { label: 'FARMER',    fn: function () { startGame('farmer',     400); } },
    ]);
  }

  function startGame(prof, money) {
    G.prof  = prof;
    G.money = money;
    var ns  = pick(NAME_SETS);
    G.party = [
      { name: 'You',   health: 4 },
      { name: ns[0],   health: 4 },
      { name: ns[1],   health: 4 },
      { name: ns[2],   health: 4 },
      { name: ns[3],   health: 4 },
    ];
    openStore(true);
  }

  // ── Store ─────────────────────────────────────────────────────────────────────

  var cart = {};

  function cartTotal() {
    return ITEMS.reduce(function (s, it) { return s + (cart[it.key] || 0) * it.price; }, 0);
  }

  function openStore(first) {
    G.phase = 'store';
    cart = { oxen: 0, food: 0, clothing: 0, ammo: 0, parts: 0, medicine: 0 };
    renderStore(first);
  }

  function renderStore(first) {
    clear();
    var title = first
      ? "MATT'S GENERAL STORE \u2014 INDEPENDENCE, MO"
      : 'TRADING POST';
    ln(title, 'bright');
    sep();
    gap();
    ln('Your supplies:  Food: ' + G.food + ' lbs   Oxen: ' + G.oxen +
       '   Clothing: ' + G.clothing, 'dim');
    ln('                Ammo: ' + G.ammo + ' boxes   Parts: ' + G.parts +
       '   Medicine: ' + G.medicine, 'dim');
    gap();
    ln('ITEM                          PRICE   BUYING   COST', 'dim');
    sep();
    ITEMS.forEach(function (it) {
      var qty      = cart[it.key] || 0;
      var cost     = qty * it.price;
      var label    = (it.label + it.unit).padEnd(30);
      var priceStr = ('$' + it.price).padEnd(8);
      var qtyStr   = String(qty).padEnd(9);
      ln(label + priceStr + qtyStr + '$' + cost, '');
    });
    sep();
    var total  = cartTotal();
    var remain = G.money - total;
    ln('TOTAL: $' + total + '   CASH REMAINING: $' + Math.max(0, remain),
       remain < 0 ? 'err' : 'bright');
    gap();
    if (first) {
      ln('Tip: you need at least 2 oxen. Recommended: 10+ food bags.', 'dim');
    }

    // Build +/- buttons for each item, then a Done button
    var btns = [];
    ITEMS.forEach(function (it) {
      btns.push({
        label: it.key.slice(0, 3).toUpperCase() + '+',
        fn: (function (item) {
          return function () {
            if ((cart[item.key] || 0) < item.max && G.money - cartTotal() - item.price >= 0) {
              cart[item.key] = (cart[item.key] || 0) + 1;
              renderStore(first);
            }
          };
        })(it),
      });
      btns.push({
        label: it.key.slice(0, 3).toUpperCase() + '-',
        fn: (function (item) {
          return function () {
            if ((cart[item.key] || 0) > 0) {
              cart[item.key]--;
              renderStore(first);
            }
          };
        })(it),
      });
    });

    btns.push({
      label: first ? 'HIT THE TRAIL!' : 'DONE',
      hi:  true,
      off: first && (G.oxen + (cart.oxen || 0)) < 2,
      fn: function () {
        if (first && (G.oxen + (cart.oxen || 0)) < 2) { return; }
        G.money    -= cartTotal();
        G.oxen     += cart.oxen     || 0;
        G.food     += (cart.food    || 0) * 50;
        G.clothing += cart.clothing || 0;
        G.ammo     += cart.ammo     || 0;
        G.parts    += cart.parts    || 0;
        G.medicine += cart.medicine || 0;
        if (first) { startTrail(); } else { showTrail(); }
      },
    });

    acts(btns);
  }

  // ── Trail ─────────────────────────────────────────────────────────────────────

  function startTrail() {
    G.phase = 'trail';
    clear();
    ln('\u25BA YOUR JOURNEY BEGINS', 'bright');
    sep();
    ln('Independence, Missouri. ' + dateStr() + '.', 'dim');
    ln('The trail stretches 2,040 miles before you.', 'dim');
    gap();
    printParty();
    gap();
    printSupplies();
    gap();
    showTrail();
  }

  function showTrail() {
    G.phase = 'trail';
    clear();
    ln('TRAIL STATUS \u2014 ' + dateStr(), 'bright');
    sep();
    ln('Miles: ' + Math.floor(G.mi) + ' traveled  /  ' +
       Math.floor(TOTAL_MI - G.mi) + ' remaining', '');
    var next = LANDMARKS[G.lmIdx];
    if (next && !next.end) {
      var away = next.mi - G.mi;
      if (away > 0) {
        ln('Next: ' + next.name + ' (\u2248' + Math.floor(away) + ' mi ahead)', 'dim');
      }
    }
    gap();
    ln('Pace: ' + paceName(G.pace) + '   Rations: ' + rationsName(G.rations), '');
    ln('Food: ' + Math.floor(G.food) + ' lbs   Money: $' + Math.floor(G.money), 'dim');

    var sick = G.party.filter(function (p) { return p.health > 0 && p.health < 3; });
    if (sick.length > 0) {
      gap();
      ln('Party health concerns:', 'warn');
      sick.forEach(function (p) { ln('  ' + p.name + ': ' + hlabel(p.health), hcls(p.health)); });
    }

    var liv = alive();
    if (liv.length > 0 && G.food < liv.length * RATIONS_LBS[G.rations] * 2) {
      gap();
      ln('\u26A0 WARNING: Food supplies are critically low!', 'warn');
    }

    gap();
    acts([
      { label: 'TRAVEL 2 WKS', hi: true, fn: doTravel },
      { label: 'PACE',         fn: showPaceMenu    },
      { label: 'RATIONS',      fn: showRationsMenu  },
      { label: 'HUNT',         fn: startHunt        },
      { label: 'STATUS',       fn: showStatus       },
    ]);
  }

  function showPaceMenu() {
    clear();
    ln('TRAVELING PACE', 'bright');
    sep();
    gap();
    ln('SLOW        ~9 mi/day    Easy on the party and oxen', '');
    ln('STEADY      ~14 mi/day   Balanced \u2014 recommended', '');
    ln('STRENUOUS   ~20 mi/day   Party gets tired over time', '');
    ln('GRUELING    ~30 mi/day   Maximum speed \u2014 high risk', '');
    gap();
    ln('Current: ' + paceName(G.pace), 'dim');
    acts([
      { label: 'SLOW',      fn: function () { G.pace = 1; showTrail(); } },
      { label: 'STEADY',    fn: function () { G.pace = 2; showTrail(); } },
      { label: 'STRENUOUS', fn: function () { G.pace = 3; showTrail(); } },
      { label: 'GRUELING',  fn: function () { G.pace = 4; showTrail(); } },
      { label: 'CANCEL',    fn: showTrail },
    ]);
  }

  function showRationsMenu() {
    clear();
    ln('FOOD RATIONS', 'bright');
    sep();
    gap();
    ln('MEAGER      ~14 lbs/person/2 weeks  (half rations)', '');
    ln('MODERATE    ~21 lbs/person/2 weeks  (normal)', '');
    ln('FILLING     ~30 lbs/person/2 weeks  (generous)', '');
    gap();
    ln('Current: ' + rationsName(G.rations), 'dim');
    ln('Food on hand: ' + Math.floor(G.food) + ' lbs', 'dim');
    acts([
      { label: 'MEAGER',   fn: function () { G.rations = 1; showTrail(); } },
      { label: 'MODERATE', fn: function () { G.rations = 2; showTrail(); } },
      { label: 'FILLING',  fn: function () { G.rations = 3; showTrail(); } },
      { label: 'CANCEL',   fn: showTrail },
    ]);
  }

  function showStatus() {
    clear();
    ln('WAGON STATUS \u2014 ' + dateStr(), 'bright');
    sep();
    ln('Miles traveled:  ' + Math.floor(G.mi), '');
    ln('Miles remaining: ' + Math.floor(TOTAL_MI - G.mi), 'dim');
    gap();
    printParty();
    gap();
    printSupplies();
    gap();
    ln('Pace: ' + paceName(G.pace) + '   Rations: ' + rationsName(G.rations), 'dim');
    ln('Money: $' + Math.floor(G.money), 'dim');
    acts([{ label: '\u2190 BACK', fn: showTrail }]);
  }

  function printParty() {
    ln('PARTY:', 'dim');
    G.party.forEach(function (p) {
      ln('  ' + p.name.padEnd(14) + hlabel(p.health), hcls(p.health));
    });
  }

  function printSupplies() {
    ln('SUPPLIES:', 'dim');
    ln('  Food: ' + Math.floor(G.food) + ' lbs   Oxen: ' + G.oxen +
       '   Clothing: ' + G.clothing, '');
    ln('  Ammo: ' + G.ammo + ' boxes   Parts: ' + G.parts +
       '   Medicine: ' + G.medicine, '');
  }

  // ── Travel turn ───────────────────────────────────────────────────────────────

  function doTravel() {
    if (G.oxen < 2)           { gameOver('You have no oxen to pull the wagon!'); return; }
    if (alive().length === 0) { gameOver('Your entire party has perished.');     return; }

    clear();
    ln('\u2500 ' + dateStr() + ' \u2500', 'sep-ln');
    gap();

    // Advance 14 days
    G.days += 14;

    // Food consumption
    var liv    = alive();
    var needed = liv.length * RATIONS_LBS[G.rations];
    if (G.food >= needed) {
      G.food -= needed;
      ln('Food consumed: ' + needed + ' lbs.  Remaining: ' + Math.floor(G.food) + ' lbs.', 'dim');
    } else {
      G.food = 0;
      ln('*** YOUR PARTY RAN OUT OF FOOD! ***', 'err');
      ln('The party went hungry for days.', 'warn');
      liv.forEach(function (p) { if (p.health > 1) { p.health--; } });
    }

    // Pace-related wear
    if (G.pace >= 3) {
      liv.forEach(function (p) {
        if (pct(G.pace === 4 ? 20 : 8)) {
          p.health = Math.max(1, p.health - 1);
          ln(p.name + ' is worn out from the ' + paceName(G.pace).toLowerCase() + ' pace.', 'warn');
        }
      });
    }

    // Random event — returns a mile modifier
    var bonus    = rollEvent();
    var base     = PACE_MI[G.pace];
    if (G.oxen === 2) { base = Math.floor(base * 0.9); }
    var traveled = Math.max(10, base + bonus);
    G.mi += traveled;

    gap();
    ln('You traveled ' + traveled + ' miles.', '');
    ln('Total: ' + Math.floor(G.mi) + ' mi  (' +
       Math.floor(Math.max(0, TOTAL_MI - G.mi)) + ' remaining)', 'dim');
    gap();

    if (G.mi >= TOTAL_MI) {
      G.mi = TOTAL_MI;
      setTimeout(winGame, 600);
      acts([]);
      return;
    }

    if (alive().length === 0) {
      setTimeout(function () { gameOver('Your entire party has perished on the trail.'); }, 600);
      acts([]);
      return;
    }

    checkLandmark();
  }

  // ── Random events ─────────────────────────────────────────────────────────────

  function rollEvent() {
    if (pct(25)) { return 0; }          // 25% chance: nothing happens

    var r   = rnd(100);
    var liv = alive();
    if (liv.length === 0) { return 0; }

    // Illness (0–29)
    if (r < 30) {
      var victim  = pick(liv);
      var illness = pick(ILLNESSES);
      gap();
      ln(victim.name + ' has ' + illness.name + '!', 'warn');
      if (G.medicine > 0) {
        G.medicine--;
        victim.health = Math.min(4, victim.health + 1);
        ln('You used a medicine kit. ' + victim.name + ' is recovering.', '');
      } else {
        victim.health = Math.max(0, victim.health - illness.sev);
        if (victim.health === 0) {
          ln(victim.name + ' DIED from ' + illness.name + '.', 'err');
        } else {
          ln('No medicine. ' + victim.name + '\'s condition worsened.', 'warn');
        }
      }
      return 0;
    }

    // Wagon breakdown (30–44)
    if (r < 45) {
      var broken = pick(['a wagon wheel', 'the axle', 'the wagon tongue']);
      gap();
      ln('Wagon breakdown \u2014 ' + broken + ' snapped!', 'warn');
      if (G.parts > 0) {
        G.parts--;
        G.days += 1;
        ln('Repaired with spare parts. Delayed 1 day.', '');
        return -rnd(10);
      }
      G.days += 4;
      G.money = Math.max(0, G.money - (G.prof === 'carpenter' ? 7 : 15));
      ln('No spare parts! Jury-rigged a fix. Lost 4 days and some money.', 'err');
      return -rnd(20);
    }

    // Theft (45–54)
    if (r < 55) {
      gap();
      if (G.food > 50) {
        var stolen = Math.floor(G.food * 0.1) + rnd(20);
        G.food = Math.max(0, G.food - stolen);
        ln('Thieves raided your camp! Lost ' + stolen + ' lbs of food.', 'warn');
      } else {
        var robbed = rnd(20) + 5;
        G.money = Math.max(0, G.money - robbed);
        ln('You were robbed on the trail! Lost $' + robbed + '.', 'warn');
      }
      return 0;
    }

    // Bad weather (55–64)
    if (r < 65) {
      gap();
      ln(pick([
        'Heavy rains turned the trail to mud.',
        'A blizzard struck without warning.',
        'Extreme heat baked the trail dry.',
        'Hailstorms hammered the wagon.',
        'Thick fog caused you to lose the trail.',
      ]), 'warn');
      if (G.clothing < 3) {
        liv.forEach(function (p) {
          if (pct(18)) {
            p.health = Math.max(1, p.health - 1);
            ln(p.name + ' suffered badly in the harsh weather.', 'warn');
          }
        });
      }
      return -(rnd(25) + 10);
    }

    // Found food (65–74)
    if (r < 75) {
      gap();
      var fm = pick([
        { msg: 'You spotted bison and brought back fresh meat.',     food: rnd(80) + 40 },
        { msg: 'Wild berries along the trail supplemented stores.',  food: rnd(20) + 10 },
        { msg: 'You traded with a Sioux band for dried pemmican.',   food: rnd(40) + 20 },
      ]);
      ln(fm.msg, '');
      G.food += fm.food;
      ln('+' + fm.food + ' lbs of food.', '');
      return 0;
    }

    // Helpful stranger (75–81)
    if (r < 82) {
      gap();
      var help = pick([
        { msg: 'A passing wagon train shared surplus food. +30 lbs.', food: 30 },
        { msg: 'You found $20 in abandoned camp supplies.',           money: 20 },
        { msg: 'A trapper donated a spare parts set.',                parts: 1  },
        { msg: 'A kind family gave you a medicine kit.',              medicine: 1 },
      ]);
      ln(help.msg, '');
      if (help.food)     { G.food     += help.food;     }
      if (help.money)    { G.money    += help.money;    }
      if (help.parts)    { G.parts    += help.parts;    }
      if (help.medicine) { G.medicine += help.medicine; }
      return 0;
    }

    // Good weather / bonus miles (82–91)
    if (r < 92) {
      gap();
      ln(pick([
        'Beautiful weather \u2014 the trail is dry and firm.',
        'A cool breeze kept everyone energized.',
        'Excellent trail conditions \u2014 great progress!',
      ]), '');
      return rnd(20) + 10;
    }

    // Lost trail (92–99)
    gap();
    ln('Confusing trail markers cost you half a day.', 'warn');
    G.days += 1;
    return -rnd(10);
  }

  // ── Landmark handling ─────────────────────────────────────────────────────────

  function checkLandmark() {
    var lm = LANDMARKS[G.lmIdx];
    if (!lm || G.mi < lm.mi) {
      acts([{ label: 'CONTINUE', hi: true, fn: showTrail }]);
      return;
    }
    G.lmIdx++;

    gap();
    ln('\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550', 'sep-ln');
    ln('LANDMARK: ' + lm.name.toUpperCase(), 'bright');
    if (lm.note) { ln(lm.note, 'dim'); }
    gap();

    if (lm.end) { setTimeout(winGame, 400); acts([]); return; }

    if (lm.river) { showRiver(lm); return; }

    var btns = [];
    if (lm.store) {
      btns.push({ label: 'VISIT STORE', fn: function () { openStore(false); } });
    }
    btns.push({ label: 'REST 3 DAYS', fn: function () { doRest(lm); } });
    btns.push({ label: 'CONTINUE', hi: true, fn: showTrail });
    acts(btns);
  }

  function doRest(lm) {
    clear();
    ln('REST AT ' + lm.name.toUpperCase(), 'bright');
    sep();
    G.days += 3;
    ln('You rested for 3 days.', '');
    var healed = false;
    alive().forEach(function (p) {
      if (p.health < 4) {
        p.health = Math.min(4, p.health + 1);
        ln(p.name + '\'s health improved to ' + hlabel(p.health) + '.', '');
        healed = true;
      }
    });
    if (!healed) { ln('The party is already in good health.', 'dim'); }
    gap();
    acts([{ label: 'CONTINUE', hi: true, fn: showTrail }]);
  }

  // ── River crossings ───────────────────────────────────────────────────────────

  function showRiver(lm) {
    clear();
    var depth  = lm.depth || 3;
    var level  = Math.max(1, Math.min(6, depth + rnd(3) - 1));
    var lvlStr = level <= 2 ? 'LOW'    : level <= 4 ? 'MEDIUM'  : 'HIGH';
    var lvlCls = level <= 2 ? ''       : level <= 4 ? 'warn'    : 'err';

    ln('RIVER CROSSING: ' + lm.name.toUpperCase(), 'bright');
    sep();
    ln('Water level: ' + lvlStr + ' (depth \u2248' + (level * 1.5).toFixed(1) + ' ft)', lvlCls);
    gap();
    ln('FORD           Cross directly. Risky at high water.', '');
    ln('CAULK & FLOAT  Seal wagon, float across. Moderate risk.', '');
    if (lm.ferryCost > 0) {
      ln('FERRY ($' + lm.ferryCost + ')        Safe passage. Costs money.', '');
    }
    ln('WAIT 1 DAY     River may drop slightly.', 'dim');
    gap();

    var btns = [
      { label: 'FORD',         bad: level >= 4, fn: function () { doFord(level); } },
      { label: 'CAULK & FLOAT',                 fn: function () { doCaulk(level); } },
    ];
    if (lm.ferryCost > 0) {
      (function (fc) {
        btns.push({ label: 'FERRY ($' + fc + ')', off: G.money < fc, fn: function () { doFerry(fc); } });
      }(lm.ferryCost));
    }
    // Capture lm and level in a closure so the wait button has the right values
    (function (savedLm, savedLevel) {
      btns.push({
        label: 'WAIT 1 DAY',
        fn: function () {
          G.days += 1;
          ln('You waited a day.', 'dim');
          var shallower = {};
          for (var k in savedLm) { shallower[k] = savedLm[k]; }
          shallower.depth = Math.max(1, savedLevel - 1);
          showRiver(shallower);
        },
      });
    }(lm, level));

    acts(btns);
  }

  function doFord(level) {
    clear();
    ln('FORDING THE RIVER\u2026', 'bright'); sep(); gap();
    if (pct(level * 12)) {
      var d = rnd(3);
      if (d === 0) {
        var lost = Math.floor(G.food * 0.25) + rnd(20);
        G.food = Math.max(0, G.food - lost);
        ln('The wagon tipped! Lost ' + lost + ' lbs of supplies.', 'err');
      } else if (d === 1) {
        var liv = alive();
        if (liv.length > 0) {
          var v = pick(liv);
          v.health = Math.max(0, v.health - 2);
          if (v.health === 0) { ln(v.name + ' DROWNED in the crossing.', 'err'); }
          else                { ln(v.name + ' was swept downstream and injured.', 'warn'); }
        }
      } else {
        if (G.oxen > 2) {
          G.oxen--;
          ln('An ox was swept away in the current!', 'warn');
        } else {
          var ls = Math.floor(G.food * 0.1);
          G.food = Math.max(0, G.food - ls);
          ln('Lost some supplies in the current.', 'warn');
        }
      }
    } else {
      ln('You safely forded the river.', '');
    }
    gap();
    acts([{ label: 'CONTINUE', hi: true, fn: showTrail }]);
  }

  function doCaulk(level) {
    clear();
    ln('CAULKING AND FLOATING\u2026', 'bright'); sep(); gap();
    if (pct(level * 6)) {
      var lost = Math.floor(G.food * 0.15) + rnd(10);
      G.food = Math.max(0, G.food - lost);
      ln('The wagon took on water! Lost ' + lost + ' lbs of supplies.', 'warn');
    } else {
      ln('The wagon floated safely across.', '');
    }
    gap();
    acts([{ label: 'CONTINUE', hi: true, fn: showTrail }]);
  }

  function doFerry(cost) {
    clear();
    ln('CROSSING BY FERRY\u2026', 'bright'); sep(); gap();
    G.money -= cost;
    ln('The ferryman guided your wagon across safely.', '');
    ln('Cost: $' + cost, 'dim');
    gap();
    acts([{ label: 'CONTINUE', hi: true, fn: showTrail }]);
  }

  // ── Hunting mini-game ─────────────────────────────────────────────────────────

  var huntTimer    = null;
  var huntInterval = null;
  var huntHits     = 0;
  var huntMisses   = 0;
  var HUNT_MS      = 8000;
  var bgHandler    = null;

  function startHunt() {
    if (G.ammo < 1) {
      clear();
      ln('OUT OF AMMUNITION', 'err');
      sep();
      gap();
      ln('You have no ammo. Buy more at the next trading post.', 'warn');
      gap();
      acts([{ label: '\u2190 BACK', fn: showTrail }]);
      return;
    }

    G.ammo--;
    huntHits = huntMisses = 0;
    elBar.style.width = '100%';
    elTally.textContent = 'Hit: 0 \u00a0|\u00a0 Miss: 0';
    elCanvas.innerHTML = '';

    if (bgHandler) { elCanvas.removeEventListener('click', bgHandler); }
    bgHandler = function (e) {
      if (e.target === elCanvas) { huntMisses++; updateTally(); }
    };
    elCanvas.addEventListener('click', bgHandler);

    elHunt.classList.add('on');
    var t0 = Date.now();

    function spawnPrey() {
      if (!elHunt.classList.contains('on')) { return; }
      var el   = document.createElement('div');
      el.className   = 'prey';
      el.textContent = pick(PREY_EMOJI);
      el.style.left  = (rnd(80) + 5) + '%';
      el.style.top   = (rnd(60) + 5) + '%';
      el.addEventListener('click', function (e) {
        e.stopPropagation();
        huntHits++;
        updateTally();
        el.remove();
        setTimeout(function () {
          if (elHunt.classList.contains('on')) { spawnPrey(); }
        }, 500 + rnd(700));
      });
      elCanvas.appendChild(el);
    }

    function updateTally() {
      elTally.textContent = 'Hit: ' + huntHits + ' \u00a0|\u00a0 Miss: ' + huntMisses;
    }

    spawnPrey();
    setTimeout(spawnPrey, 600);
    setTimeout(spawnPrey, 1400);

    huntInterval = setInterval(function () {
      elBar.style.width = Math.max(0, 100 - ((Date.now() - t0) / HUNT_MS) * 100) + '%';
    }, 100);

    huntTimer = setTimeout(function () {
      clearInterval(huntInterval);
      elHunt.classList.remove('on');
      elCanvas.innerHTML = '';

      var food = huntHits * (rnd(20) + 25);
      G.food += food;

      clear();
      ln('HUNTING RESULTS', 'bright');
      sep();
      gap();
      ln('Animals hit:   ' + huntHits,                                    '');
      ln('Shots missed:  ' + huntMisses,                                   'dim');
      ln('Food gained:   ' + food + ' lbs',                               food > 0 ? '' : 'warn');
      ln('Food on hand:  ' + Math.floor(G.food) + ' lbs',                 'dim');
      gap();
      if      (huntHits >= 5)  { ln('Outstanding! The party feasts tonight.',     '');    }
      else if (huntHits >= 2)  { ln('Not bad. Some fresh game for the trail.',     '');    }
      else if (huntHits === 1) { ln('Only one hit. Better than nothing.',          'dim'); }
      else                     { ln('You came back empty-handed.',                 'warn'); }
      gap();
      acts([{ label: 'CONTINUE', hi: true, fn: showTrail }]);
    }, HUNT_MS);
  }

  // ── End states ────────────────────────────────────────────────────────────────

  function winGame() {
    G.phase = 'win';
    clear();
    elTitle.textContent = '\u25BA OREGON TRAIL';
    gap();
    ln('  \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557', 'bright');
    ln('  \u2551  YOU HAVE REACHED OREGON CITY!  \u2551', 'bright');
    ln('  \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d', 'bright');
    gap();
    ln('  ' + dateStr(), 'dim');
    gap();

    var surv = G.party.filter(function (p) { return p.health > 0; });
    var dead = G.party.filter(function (p) { return p.health <= 0; });

    ln('SURVIVORS:', '');
    surv.forEach(function (p) { ln('  ' + p.name.padEnd(14) + hlabel(p.health), hcls(p.health)); });

    if (dead.length > 0) {
      gap();
      ln('IN MEMORIAM:', 'warn');
      dead.forEach(function (p) { ln('  ' + p.name + ' \u2014 lost on the trail', 'err'); });
    }

    gap();
    ln('Days on the trail: ' + G.days, 'dim');
    ln('Money remaining:   $' + Math.floor(G.money), 'dim');
    gap();
    var score = surv.length * 500 - G.days * 2 + Math.floor(G.money / 5);
    ln('FINAL SCORE: ' + score, 'bright');
    gap();
    ln('Congratulations, pioneer!', 'dim');
    gap();
    acts([
      { label: 'PLAY AGAIN', hi: true, fn: showIntro },
      { label: '\u2302 HOME',           fn: function () { window.location.href = '/'; } },
    ]);
  }

  function gameOver(reason) {
    G.phase = 'gameover';
    clear();
    elTitle.textContent = '\u25BA OREGON TRAIL';
    gap();
    ln('  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500', 'err');
    ln('             GAME OVER', 'err');
    ln('  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500', 'err');
    gap();
    ln(reason, 'warn');
    gap();
    ln(dateStr(), 'dim');
    ln('Miles traveled: ' + Math.floor(G.mi) + ' / 2040', 'dim');
    ln('Days elapsed:   ' + G.days, 'dim');
    gap();
    var surv = alive();
    if (surv.length > 0) {
      ln('Survivors:', 'dim');
      surv.forEach(function (p) { ln('  ' + p.name + ' \u2014 ' + hlabel(p.health), hcls(p.health)); });
      gap();
    }
    acts([
      { label: 'TRY AGAIN', hi: true, fn: showIntro },
      { label: '\u2302 HOME',          fn: function () { window.location.href = '/'; } },
    ]);
  }

  // ── Fullscreen ────────────────────────────────────────────────────────────────

  document.getElementById('btn-fs').addEventListener('click', function () {
    if (document.fullscreenElement) { document.exitFullscreen().catch(function () {}); }
    else { document.documentElement.requestFullscreen().catch(function () {}); }
  });
  document.addEventListener('fullscreenchange', function () {
    document.getElementById('btn-fs').textContent =
      document.fullscreenElement ? 'EXIT FS' : 'FULLSCREEN';
  });

  // ── Init ──────────────────────────────────────────────────────────────────────

  showIntro();

}());
  </script>
