<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCADE</title>
  <link rel="icon" type="image/jpeg" href="assets/images/commodore64.v20260424.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
      display: flex; flex-direction: column;
      font-family: monospace; color: #8ef0b2;
    }
    .bar {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; flex-shrink: 0;
      border-bottom: 1px solid #333; font-size: 14px;
    }
    .bar-title { flex: 1; }
    .bar button {
      background: transparent; border: 1px solid #555;
      color: #8ef0b2; font-family: monospace; font-size: 12px;
      padding: 2px 8px; cursor: pointer;
    }
    .bar button:hover { background: rgba(142,240,178,0.1); }
    #game-area { flex: 1 1 auto; min-height: 0; }
    #game { width: 100%; height: 100%; }
    #status { padding: 10px; color: #f66; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="bar-title" id="bar-title">&#9658; ARCADE</div>
    <button id="btn-fs">FULLSCREEN</button>
    <button id="btn-restart">RESTART</button>
    <button id="btn-back">&#8592; BACK</button>
  </div>
  <div id="status"></div>
  <div id="game-area">
    <div id="game"></div>
  </div>
  <script>
    (function () {
      var EJS_PATH = '/assets/retroarch/';

      var params = new URLSearchParams(location.search);
      var system = params.get('system') || '';
      var file   = params.get('file')   || '';
      var name   = params.get('name')   || file.replace(/\.[^.]+$/, '');

      if (!system || !file) { location.replace('/'); return; }

      document.title = (name ? name.toUpperCase() + ' \u2013 ' : '') + 'ARCADE';
      document.getElementById('bar-title').textContent = '\u25BA ' + (name ? name.toUpperCase() : 'ARCADE');

      function goBack() { location.assign('/'); }

      document.getElementById('btn-back').addEventListener('click', goBack);

      document.getElementById('btn-restart').addEventListener('click', function () {
        if (window.EJS_emulator && typeof window.EJS_emulator.restart === 'function') {
          window.EJS_emulator.restart();
        } else {
          location.reload();
        }
      });

      var fsBtn = document.getElementById('btn-fs');
      fsBtn.addEventListener('click', function () {
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(function () {});
        } else {
          document.documentElement.requestFullscreen().catch(function () {});
        }
      });
      document.addEventListener('fullscreenchange', function () {
        fsBtn.textContent = document.fullscreenElement ? 'EXIT FS' : 'FULLSCREEN';
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !document.fullscreenElement) { goBack(); }
      });

      window.EJS_player        = '#game';
      window.EJS_core          = system;
      window.EJS_gameUrl       = '/assets/roms/' + system + '/' + encodeURIComponent(file);
      window.EJS_pathtodata    = EJS_PATH;
      window.EJS_startOnLoaded = true;

      window.EJS_onLoadError = function (e) {
        var msg = (e && e.error && e.error.message) || (e && e.message) || String(e) || 'Unknown error';
        console.error('[arcade-player] EJS_onLoadError:', msg);
        var statusEl = document.getElementById('status');
        statusEl.textContent = 'EMULATOR ERROR: ' + msg;
        statusEl.style.display = 'block';
      };

      var loader = document.createElement('script');
      loader.src = EJS_PATH + 'loader.js';
      loader.onerror = function () {
        window.EJS_onLoadError(new Error('loader.js not found at ' + EJS_PATH));
      };
      document.head.appendChild(loader);
    }());
  </script>
</body>
</html>
