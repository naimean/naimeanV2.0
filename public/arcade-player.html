<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCADE</title>
  <link rel="icon" type="image/jpeg" href="assets/images/commodore64.v20260424.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
      display: flex; flex-direction: column;
      font-family: monospace; color: #8ef0b2;
    }
    .bar {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; flex-shrink: 0;
      border-bottom: 1px solid #333; font-size: 14px;
    }
    .bar-title { flex: 1; }
    .bar button {
      background: transparent; border: 1px solid #555;
      color: #8ef0b2; font-family: monospace; font-size: 12px;
      padding: 2px 8px; cursor: pointer;
    }
    .bar button:hover { background: rgba(142,240,178,0.1); }
    #game-area { flex: 1 1 auto; min-height: 0; }
    #game { width: 100%; height: 100%; }
    #status { padding: 10px; color: #f66; font-size: 13px; display: none; }

    /* ── Boot phase ──────────────────────────────────────────────────────── */
    #boot-phase {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ap-boot-line {
      font-size: 13px;
      line-height: 1.65;
      letter-spacing: 0.03em;
    }
    .ap-boot-status { color: rgba(142, 240, 178, 0.55); }
    .ap-boot-ready  { color: #c8ffd9; text-shadow: 0 0 6px rgba(200,255,217,0.35); }
    .ap-boot-error  { color: #f66; }

    /* ── ROM picker phase ────────────────────────────────────────────────── */
    #picker-phase {
      flex: 1 1 auto;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }
    #picker-header {
      padding: 10px 16px 6px;
      font-size: 13px;
      color: #c8ffd9;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      border-bottom: 1px solid #222;
    }
    #rom-list {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 4px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(142,240,178,0.3) transparent;
    }
    .rom-item {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(142,240,178,0.07);
      color: #8ef0b2;
      font-family: monospace;
      font-size: 13px;
      text-align: left;
      padding: 9px 16px;
      cursor: pointer;
    }
    .rom-item::before { content: '  '; white-space: pre; }
    .rom-item:hover   { background: rgba(142,240,178,0.08); }
    .rom-item:focus-visible {
      outline: 1px dashed rgba(142,240,178,0.5);
      outline-offset: -1px;
    }
    .rom-empty {
      padding: 18px 16px;
      color: rgba(142,240,178,0.45);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="bar-title" id="bar-title">&#9658; ARCADE</div>
    <button id="btn-fs">FULLSCREEN</button>
    <button id="btn-restart" style="display:none">RESTART</button>
    <button id="btn-back">&#8592; BACK</button>
  </div>

  <!-- Phase 1: boot animation + core preload -->
  <div id="boot-phase"></div>

  <!-- Phase 2: ROM picker (shown when no file param is given) -->
  <div id="picker-phase">
    <div id="picker-header"></div>
    <div id="rom-list"></div>
  </div>

  <!-- Phase 3: emulator -->
  <div id="status"></div>
  <div id="game-area" style="display:none">
    <div id="game"></div>
  </div>

  <script src="arcade-preloader.js"></script>
  <script>
    (function () {
      var EJS_PATH         = '/assets/retroarch/';
      var ROM_MANIFEST_URL = '/assets/roms/manifest.json';

      var params = new URLSearchParams(location.search);
      var system = params.get('system') || '';
      var file   = params.get('file')   || '';
      var name   = params.get('name')   || (file ? file.replace(/\.[^.]+$/, '') : '');

      // A system is always required; redirect to home if missing.
      if (!system) { location.replace('/'); return; }

      var bootPhase    = document.getElementById('boot-phase');
      var pickerPhase  = document.getElementById('picker-phase');
      var pickerHeader = document.getElementById('picker-header');
      var romList      = document.getElementById('rom-list');
      var gameArea     = document.getElementById('game-area');
      var statusEl     = document.getElementById('status');
      var barTitle     = document.getElementById('bar-title');
      var btnRestart   = document.getElementById('btn-restart');
      var btnFs        = document.getElementById('btn-fs');
      var btnBack      = document.getElementById('btn-back');

      // ── Navigation helpers ────────────────────────────────────────────────

      function goBack() { location.assign('/'); }
      btnBack.addEventListener('click', goBack);

      btnRestart.addEventListener('click', function () {
        if (window.EJS_emulator && typeof window.EJS_emulator.restart === 'function') {
          window.EJS_emulator.restart();
        } else {
          location.reload();
        }
      });

      btnFs.addEventListener('click', function () {
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(function () {});
        } else {
          document.documentElement.requestFullscreen().catch(function () {});
        }
      });
      document.addEventListener('fullscreenchange', function () {
        btnFs.textContent = document.fullscreenElement ? 'EXIT FS' : 'FULLSCREEN';
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !document.fullscreenElement) { goBack(); }
      });

      // ── Error display ─────────────────────────────────────────────────────

      function showArcadeError(msg) {
        var errLine = document.createElement('div');
        errLine.className = 'ap-boot-line ap-boot-error';
        errLine.textContent = 'ARCADE ERROR: ' + msg;
        bootPhase.appendChild(errLine);
        bootPhase.style.display = 'flex';
        statusEl.textContent = 'ARCADE ERROR: ' + msg;
        statusEl.style.display = 'block';
        console.error('[arcade-player]', msg);
      }

      // ── Phase 3: launch EmulatorJS ────────────────────────────────────────

      function launchEmulator(sys, romFile, romName) {
        pickerPhase.style.display = 'none';
        bootPhase.style.display   = 'none';
        gameArea.style.display    = '';
        btnRestart.style.display  = '';

        var displayName = romName || romFile.replace(/\.[^.]+$/, '');
        document.title     = (displayName ? displayName.toUpperCase() + ' \u2013 ' : '') + 'ARCADE';
        barTitle.textContent = '\u25BA ' + (displayName ? displayName.toUpperCase() : 'ARCADE');

        window.EJS_player        = '#game';
        window.EJS_core          = sys;
        window.EJS_gameUrl       = '/assets/roms/' + sys + '/' + encodeURIComponent(romFile);
        window.EJS_pathtodata    = EJS_PATH;
        window.EJS_startOnLoaded = true;

        window.EJS_onLoadError = function (e) {
          var msg = (e && e.error && e.error.message) || (e && e.message) || String(e) || 'Unknown error';
          showArcadeError(msg);
        };

        var loader = document.createElement('script');
        loader.src = EJS_PATH + 'loader.js';
        loader.onerror = function () {
          showArcadeError('loader.js not found at ' + EJS_PATH);
        };
        document.head.appendChild(loader);
      }

      // ── Phase 2: ROM picker ───────────────────────────────────────────────

      function showRomPicker(systemLabel, roms) {
        bootPhase.style.display   = 'none';
        pickerHeader.textContent  = '\u25BA ' + systemLabel + ' \u2014 SELECT ROM';
        romList.innerHTML         = '';

        if (!roms || roms.length === 0) {
          var empty = document.createElement('div');
          empty.className   = 'rom-empty';
          empty.textContent = 'NO ROMS AVAILABLE FOR THIS SYSTEM.';
          romList.appendChild(empty);
        } else {
          roms.forEach(function (romFile) {
            var displayName = romFile.replace(/\.[^.]+$/, '');
            var btn         = document.createElement('button');
            btn.type        = 'button';
            btn.className   = 'rom-item';
            btn.textContent = displayName;
            btn.addEventListener('click', function () {
              launchEmulator(system, romFile, displayName);
            });
            romList.appendChild(btn);
          });
        }
        pickerPhase.style.display = 'flex';
      }

      function loadRomManifest() {
        return fetch(ROM_MANIFEST_URL, { cache: 'default' }).then(function (res) {
          if (!res.ok) { throw new Error('Manifest HTTP ' + res.status); }
          return res.json();
        });
      }

      // ── Main flow ─────────────────────────────────────────────────────────

      (async function main() {
        // Show a temporary system label in the bar while systems.json loads.
        barTitle.textContent = '\u25BA ' + system.toUpperCase();
        document.title = system.toUpperCase() + ' \u2013 ARCADE';

        // Guard: ArcadePreloader must be available (loaded by arcade-preloader.js).
        if (!window.ArcadePreloader) {
          showArcadeError('arcade-preloader.js failed to load');
          return;
        }

        // Phase 1: boot animation + core preload (always runs).
        var preloadResult;
        try {
          preloadResult = await window.ArcadePreloader.run({
            system:          system,
            systemsJsonPath: '/assets/arcade/systems.json',
            coresBasePath:   '/assets/retroarch/cores/',
            bootEl:          bootPhase,
          });
        } catch (err) {
          showArcadeError((err && err.message) ? err.message : 'Preload failed');
          // Failures do not abort — continue to picker/launch.
          preloadResult = { label: system.toUpperCase() };
        }

        var systemLabel = (preloadResult && preloadResult.label) ? preloadResult.label : system.toUpperCase();
        barTitle.textContent = '\u25BA ' + systemLabel;
        document.title = systemLabel + ' \u2013 ARCADE';

        // Phase 2 or 3: either pick a ROM or launch directly.
        if (file) {
          // File was passed via URL — launch immediately with the preloaded core.
          launchEmulator(system, file, name);
        } else {
          // No file — show ROM picker for this system.
          try {
            var manifest = await loadRomManifest();
            var roms = Array.isArray(manifest[system])
              ? manifest[system].filter(function (r) { return r && typeof r === 'string'; })
              : [];
            showRomPicker(systemLabel, roms);
          } catch (err) {
            showArcadeError('Failed to load ROM manifest: ' + ((err && err.message) || String(err)));
            showRomPicker(systemLabel, []);
          }
        }
      }()).catch(function (err) {
        showArcadeError((err && err.message) ? err.message : String(err));
      });
    }());
  </script>
</body>
</html>
