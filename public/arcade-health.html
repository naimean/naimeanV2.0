<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCADE HEALTH CHECK</title>
  <link rel="icon" type="image/jpeg" href="assets/images/commodore64.v20260424.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #000;
      color: #8ef0b2;
      font-family: monospace;
      font-size: 13px;
    }
    header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
    #health-summary {
      font-size: 13px;
      padding: 2px 10px;
      border: 1px solid #444;
    }
    .summary-pass { color: #8ef0b2; border-color: #8ef0b2; }
    .summary-warn { color: #f5c842; border-color: #f5c842; }
    .summary-fail { color: #f66;    border-color: #f66; }
    a.back-link {
      margin-left: auto;
      color: #8ef0b2;
      text-decoration: none;
      font-size: 12px;
      border: 1px solid #555;
      padding: 2px 8px;
    }
    a.back-link:hover { background: rgba(142,240,178,0.08); }
    .table-wrap {
      overflow-x: auto;
      padding: 8px 0 40px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: left;
      padding: 4px 14px;
      color: rgba(142,240,178,0.5);
      font-size: 11px;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #2a2a2a;
    }
    tbody tr { border-bottom: 1px solid rgba(142,240,178,0.06); }
    tbody td {
      padding: 5px 14px;
      white-space: pre;
    }
    .status-cell   { font-weight: bold; min-width: 56px; }
    .status-pass   { color: #8ef0b2; }
    .status-warn   { color: #f5c842; }
    .status-fail   { color: #f66; }
    .done-line     { text-align: center; color: rgba(142,240,178,0.4); padding: 12px; white-space: normal; }
    tbody tr.row-fail td:first-child { color: rgba(255,102,102,0.7); }
    tbody tr.row-warn td:first-child { color: rgba(245,200,66,0.7); }
  </style>
</head>
<body>
  <header>
    <h1>&#9658; ARCADE RUNTIME HEALTH CHECK</h1>
    <span id="health-summary" class="summary-pass">RUNNING...</span>
    <a href="/" class="back-link">&#8592; HOME</a>
  </header>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>CATEGORY</th>
          <th>NAME</th>
          <th>STATUS</th>
          <th>DETAIL</th>
        </tr>
      </thead>
      <tbody id="health-tbody"></tbody>
    </table>
  </div>
  <script src="js/arcade-health.js"></script>
</body>
</html>
