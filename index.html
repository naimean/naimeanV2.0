<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>naimean</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }

      p {
        font-size: 1.1rem;
        color: #555;
        max-width: 36ch;
        line-height: 1.6;
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        font-size: 0.8rem;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>naimean</h1>
      <p>Something is on its way. Check back soon.</p>
    </main>
    <footer>&copy; 2026 naimean</footer>
  </body>
</html>
