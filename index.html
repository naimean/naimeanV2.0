<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naimean?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="c64-center" style="position:relative;">
    <img src="assets/commodore64.jpg" alt="Commodore 64" class="c64-img" />
    <div class="shadow-layer"></div>
    <div id="visual-screen" style="display:none; position:absolute; z-index:20;"></div>
    <span class="data-light"></span>
    <button class="power-btn" aria-label="Power"><span class="power-icon">&#x23FB;</span></button>
    <div id="tv-flash" style="display:none;"></div>
  </div>
  <script>
    const powerBtn = document.querySelector('.power-btn');
    const shadowLayer = document.querySelector('.shadow-layer');
    const tvFlash = document.getElementById('tv-flash');
    let powerOn = false;
    let powerOnTime = 0;
    let staticTimeout = null;
    let audioTimeout = null;
    let staticAudio = null;
    powerBtn.addEventListener('click', () => {
      if (!powerOn) {
        // Powering on
        powerOn = true;
        powerOnTime = Date.now();
        tvFlash.innerHTML = '<div class="tv-on-flash"></div>';
        tvFlash.style.display = 'block';
        shadowLayer.classList.add('hide');
        document.querySelector('.data-light').classList.add('on');
        powerBtn.classList.add('on');
        setTimeout(() => {
          shadowLayer.style.display = 'none';
          tvFlash.innerHTML = '';
          tvFlash.style.display = 'none';
        }, 700);
      } else {
        // Powering off after 5s only
        if (Date.now() - powerOnTime > 5000) {
          // Show static.gif in visual screen layer
          const visual = document.getElementById('visual-screen');
          visual.innerHTML = '<img src="assets/static.gif" style="width:calc(100% - 2px);height:calc(100% - 2px);position:absolute;top:1px;left:1px;object-fit:cover;">';
          visual.style.display = 'block';
          visual.style.top = shadowLayer.style.top;
          visual.style.left = shadowLayer.style.left;
          visual.style.width = shadowLayer.style.width;
          visual.style.height = shadowLayer.style.height;
          // Play power-button.mp3
          if (!staticAudio) {
            staticAudio = document.createElement('audio');
            staticAudio.src = 'assets/power-button.mp3';
            staticAudio.autoplay = true;
            staticAudio.style.display = 'none';
            document.body.appendChild(staticAudio);
          } else {
            staticAudio.src = 'assets/power-button.mp3';
            staticAudio.play();
          }
          // After 5s, play another audio and show another visual (not a rickroll)
          if (staticTimeout) clearTimeout(staticTimeout);
          staticTimeout = setTimeout(() => {
            visual.innerHTML = '<img src="assets/your-image.gif" style="width:calc(100% - 2px);height:calc(100% - 2px);position:absolute;top:1px;left:1px;object-fit:cover;">';
            let audio2 = document.createElement('audio');
            audio2.src = 'assets/your-audio.mp3';
            audio2.autoplay = true;
            audio2.style.display = 'none';
            document.body.appendChild(audio2);
            setTimeout(() => {
              window.location.href = 'https://discord.gg/fvj4UrTpdp';
            }, 5000);
          }, 5000);
        }
      }
    });
  </script>
</body>
</html>
