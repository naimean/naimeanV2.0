<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descent</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      min-height: 100%;
    }

    .descent-outer {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }

    .descent-img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="descent-outer">
    <img src="assets/bedroom.PNG" alt="Bedroom" class="descent-img" />
  </div>
</body>
</html>
