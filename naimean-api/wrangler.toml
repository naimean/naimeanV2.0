name = "naimean-api"
main = "src/worker.js"
compatibility_date = "2026-04-14"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "naimean.com/api/*"
zone_name = "naimean.com"

[[d1_databases]]
binding = "DB"
database_name = "naimean-db"
database_id = "0871f90d-f7e3-467a-a1f9-4e74ac8aef42"

[[kv_namespaces]]
binding = "KV"
id = "dff7175059ce478eab8c910949ca330f"

[[durable_objects.bindings]]
name = "NAIMEAN_AGENT"
class_name = "NaimeanAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NaimeanAgent"]

[limits]
cpu_ms = 200
