<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedroom Antechamber</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      min-height: 100%;
    }

    body {
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    body.loaded {
      opacity: 1;
    }

    .descent-outer {
      position: relative;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }

    .descent-img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .trapdoor-up-btn {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 17%;
      background: transparent;
      opacity: 0;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div class="descent-outer">
    <img src="assets/bedroom.PNG" alt="Bedroom" class="descent-img" />
    <button class="trapdoor-up-btn" id="trapdoor-up-btn" aria-label="Go back up through the trap door"></button>
  </div>
  <script>
    let isNavigatingBackUp = false;

    function navigateBackUp() {
      if (isNavigatingBackUp) {
        return;
      }
      isNavigatingBackUp = true;
      window.location.assign('chapel.html');
    }

    function playDoorClosingSound() {
      const audioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!audioContextCtor) {
        return;
      }

      const ctx = new audioContextCtor();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = 'square';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.16);

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(900, now);
      filter.frequency.exponentialRampToValueAtTime(240, now + 0.18);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.15, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now);
      osc.stop(now + 0.24);
    }

    window.addEventListener('load', function () {
      playDoorClosingSound();
      requestAnimationFrame(function () {
        document.body.classList.add('loaded');
      });
    });

    document.getElementById('trapdoor-up-btn').addEventListener('click', navigateBackUp);
  </script>
</body>
</html>
