<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROUTER::CONTROL</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      font-family: 'VT323', monospace;
      color: #8ef0b2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .terminal {
      width: min(560px, 96vw);
      background:
        radial-gradient(ellipse at 50% 52%, rgba(150, 255, 186, 0.18) 0%, rgba(92, 202, 122, 0.16) 20%, rgba(41, 96, 52, 0.32) 52%, rgba(7, 19, 10, 0.9) 100%),
        linear-gradient(180deg, rgba(20, 44, 27, 0.98) 0%, rgba(9, 20, 12, 0.98) 100%);
      border: 4px solid rgba(223, 245, 225, 0.78);
      border-radius: 18px 18px 26px 26px;
      padding: 20px 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow:
        inset 0 0 18px rgba(196, 255, 209, 0.08),
        inset 0 0 46px rgba(6, 20, 10, 0.54),
        0 0 40px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
    }

    /* CRT scanlines */
    .terminal::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(180deg, rgba(186, 255, 205, 0.028) 0 2px, rgba(0, 0, 0, 0.08) 2px 4px);
      opacity: 0.72;
      pointer-events: none;
      z-index: 3;
    }

    .term-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(142, 240, 178, 0.3);
      padding-bottom: 10px;
      font-size: 1.15em;
      letter-spacing: 1px;
      position: relative;
      z-index: 4;
    }

    .term-title {
      color: #c8ffd9;
      text-shadow: 0 0 8px rgba(200, 255, 217, 0.5);
    }

    .back-link {
      color: #8ef0b2;
      text-decoration: none;
      font-size: 0.9em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .back-link:hover {
      opacity: 1;
    }

    .term-log {
      flex: 1;
      min-height: 180px;
      max-height: 240px;
      overflow-y: auto;
      font-size: 1em;
      line-height: 1.5;
      letter-spacing: 0.5px;
      color: #8ef0b2;
      text-shadow: 0 0 4px rgba(142, 240, 178, 0.3);
      position: relative;
      z-index: 4;
      scrollbar-width: thin;
      scrollbar-color: rgba(142, 240, 178, 0.3) transparent;
    }

    .term-log:empty::before {
      content: 'READY.';
      opacity: 0.4;
    }

    .log-line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-line.log-ok   { color: #c8ffd9; }
    .log-line.log-err  { color: #ff8080; text-shadow: 0 0 6px rgba(255, 128, 128, 0.4); }
    .log-line.log-warn { color: #ffd080; }

    .term-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 4;
    }

    .term-input-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .term-label {
      font-size: 1em;
      color: #c8ffd9;
      white-space: nowrap;
      padding-right: 8px;
      flex-shrink: 0;
    }

    .term-input {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      border: 1px solid rgba(142, 240, 178, 0.6);
      border-right: 0;
      border-radius: 4px 0 0 4px;
      font-family: 'VT323', monospace;
      font-size: 1.1em;
      background: rgba(6, 14, 8, 0.88);
      color: #8ef0b2;
      caret-color: #8ef0b2;
      outline: none;
      letter-spacing: 1px;
    }

    .term-input:focus {
      box-shadow: 0 0 0 2px rgba(142, 240, 178, 0.2);
    }

    .term-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border: 1px solid rgba(142, 240, 178, 0.6);
      border-radius: 0 4px 4px 0;
      background: rgba(22, 58, 30, 0.92);
      color: #c8ffd9;
      font-family: 'VT323', monospace;
      font-size: 1.05em;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    .term-btn:hover:not(:disabled) {
      background: rgba(36, 94, 49, 0.98);
    }

    .term-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .term-btn-reboot {
      width: 100%;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 1.2em;
      letter-spacing: 2px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8ef0b2;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px #8ef0b2;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }

    .status-dot.pending {
      background: #ffd080;
      box-shadow: 0 0 6px #ffd080;
    }

    .status-dot.done {
      background: #c8ffd9;
      box-shadow: 0 0 10px #c8ffd9;
      animation: none;
    }

    .status-dot.err {
      background: #ff8080;
      box-shadow: 0 0 6px #ff8080;
      animation: none;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .page-fade {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 1000;
    }

    .page-fade.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="page-fade" id="page-fade"></div>

  <div class="terminal">
    <div class="term-header">
      <span class="term-title">NAIMEAN // ROUTER::CONTROL [RS200]</span>
      <a href="#" class="back-link" id="back-link">← EXIT</a>
    </div>

    <div class="term-log" id="term-log"></div>

    <form class="term-form" id="reboot-form" autocomplete="off">
      <div class="term-input-row">
        <span class="term-label">ACCESS CODE:</span>
        <input
          class="term-input"
          type="password"
          id="code-input"
          maxlength="128"
          aria-label="Access code"
          spellcheck="false"
        />
        <button class="term-btn" type="submit" id="submit-btn">OK</button>
      </div>
      <button class="term-btn term-btn-reboot" type="submit" id="reboot-btn" disabled>
        <span class="status-dot" id="status-dot"></span>REBOOT RS200
      </button>
    </form>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    // Update WORKER_URL if the worker is ever redeployed under a different name.
    const WORKER_URL                 = 'https://barrelroll-counter-worker.naimean.workers.dev';
    const POLL_INTERVAL_MS           = 5000;
    const POLL_TIMEOUT_MS            = 120_000; // 2 minutes
    const NETWORK_DETECTION_TIMEOUT_MS = 4000;

    // ── State ─────────────────────────────────────────────────────────────────
    let pollTimer     = null;
    let pollStartTime = null;
    let lastSecret    = '';
    let rs200Detected = false;

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const logEl      = document.getElementById('term-log');
    const codeInput  = document.getElementById('code-input');
    const rebootBtn  = document.getElementById('reboot-btn');
    const submitBtn  = document.getElementById('submit-btn');
    const statusDot  = document.getElementById('status-dot');
    const backLink   = document.getElementById('back-link');
    const pageFade   = document.getElementById('page-fade');

    // ── Helpers ───────────────────────────────────────────────────────────────
    function ts() {
      return new Date().toLocaleTimeString('en-US', { hour12: false });
    }

    function log(msg, type = '') {
      const line = document.createElement('div');
      line.className = 'log-line' + (type ? ' log-' + type : '');
      line.textContent = '[' + ts() + '] ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setInputsDisabled(disabled) {
      codeInput.disabled = disabled;
      // Reboot button only becomes interactive once the RS200 network is confirmed.
      rebootBtn.disabled = disabled || !rs200Detected;
      submitBtn.disabled = disabled;
    }

    function setDotState(state) {
      statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function fadeOut(href) {
      pageFade.classList.add('visible');
      setTimeout(function() { window.location.assign(href); }, 900);
    }

    // ── API calls ─────────────────────────────────────────────────────────────
    async function apiReboot(secret) {
      const res = await fetch(WORKER_URL + '/router/reboot', {
        method:  'POST',
        headers: { 'X-Router-Secret': secret },
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw Object.assign(new Error(data.error || 'HTTP ' + res.status), { status: res.status });
      }
    }

    async function apiStatus(secret) {
      const res = await fetch(WORKER_URL + '/router/status', {
        cache:   'no-store',
        headers: { 'X-Router-Secret': secret },
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return data.pending;
    }

    // ── Polling ───────────────────────────────────────────────────────────────
    function startPolling(secret) {
      pollStartTime = Date.now();
      pollTimer = setInterval(async function() {
        if (Date.now() - pollStartTime > POLL_TIMEOUT_MS) {
          stopPolling();
          setDotState('err');
          log('TIMEOUT: bridge did not respond within 2 minutes.', 'err');
          log('Ensure bridge.js is running on the local device.', 'warn');
          setInputsDisabled(false);
          return;
        }
        try {
          const pending = await apiStatus(secret);
          if (!pending) {
            stopPolling();
            setDotState('done');
            log('BRIDGE ACKNOWLEDGED — router is rebooting.', 'ok');
            log('Connection will restore in ~60 seconds.', 'ok');
            setInputsDisabled(false);
          }
        } catch (_) {
          // Ignore transient errors during polling
        }
      }, POLL_INTERVAL_MS);
    }

    // ── Form submit ───────────────────────────────────────────────────────────
    document.getElementById('reboot-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const secret = codeInput.value;
      if (!secret) return;

      stopPolling();
      setInputsDisabled(true);
      setDotState('pending');
      lastSecret = secret;

      log('Sending reboot command...');

      try {
        await apiReboot(secret);
        log('COMMAND QUEUED — waiting for local bridge.', 'ok');
        log('Polling every 5s for bridge acknowledgement...');
        startPolling(secret);
      } catch (err) {
        setDotState('err');
        if (err.status === 401) {
          log('ACCESS DENIED — incorrect code.', 'err');
        } else {
          log('ERROR: ' + err.message, 'err');
        }
        setInputsDisabled(false);
      }
    });

    // ── Back link ─────────────────────────────────────────────────────────────
    backLink.addEventListener('click', function(e) {
      e.preventDefault();
      stopPolling();
      try { window.sessionStorage.setItem('naimean-index-fade-in', '1'); } catch (_) {}
      fadeOut('index.html');
    });

    // ── Network detection (WebRTC) ────────────────────────────────────────────
    // Uses RTCPeerConnection ICE candidates to read the visitor's local IPs
    // without any network round-trip. Works on all modern browsers.
    function getLocalIPs() {
      return new Promise(function(resolve) {
        var ips = [];
        var done = false;
        function finish() {
          if (!done) { done = true; resolve(ips); }
        }
        try {
          var pc = new RTCPeerConnection({ iceServers: [] });
          pc.createDataChannel('');
          pc.onicecandidate = function(e) {
            if (!e.candidate) { pc.close(); finish(); return; }
            var m = /([0-9]{1,3}(?:\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (m && !ips.includes(m[1])) ips.push(m[1]);
          };
          pc.createOffer().then(function(o) { return pc.setLocalDescription(o); }).catch(finish);
          setTimeout(function() { try { pc.close(); } catch (_) {} finish(); }, NETWORK_DETECTION_TIMEOUT_MS);
        } catch (_) {
          finish();
        }
      });
    }

    async function detectNetwork() {
      log('Scanning local network...');
      const ips = await getLocalIPs();
      const rs200 = ips.some(function(ip) { return ip.startsWith('192.168.1.'); });
      if (rs200) {
        rs200Detected = true;
        rebootBtn.disabled = false;
        log('RS200 NETWORK DETECTED — enter access code and press REBOOT.', 'ok');
      } else if (ips.length === 0) {
        log('Network scan unavailable — check browser permissions.', 'warn');
        log('If you are on the RS200 network, enter code and try anyway.', 'warn');
        // Allow the button if detection is unavailable so the user isn't locked out.
        rs200Detected = true;
        rebootBtn.disabled = false;
      } else {
        log('RS200 NETWORK NOT DETECTED — connect to the Nighthawk WiFi first.', 'err');
        log('Detected subnet(s): ' + Array.from(new Set(ips.map(function(ip) {
          return ip.replace(/\.\d+$/, '.x');
        }))).join(', '), 'warn');
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    log('ROUTER CONTROL TERMINAL READY.');
    codeInput.focus();
    detectNetwork();
  </script>
</body>
</html>
